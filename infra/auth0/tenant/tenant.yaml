tenant:
  friendly_name: @@TENANT_FRIENDLY_NAME@@
  support_email: @@SUPPORT_EMAIL@@
  default_redirection_uri: @@DEFAULT_REDIRECT_URI@@

resourceServers:
  - name: @@RESOURCE_SERVER_NAME@@
    identifier: @@NOVA_API_AUDIENCE@@
    signing_alg: RS256
    allow_offline_access: false
    token_lifetime: 86400
    token_lifetime_for_web: 7200
    skip_consent_for_verifiable_first_party_clients: false
    subject_type_authorization:
      user:
        policy: allow_all
      client:
        policy: require_client_grant
    scopes:
      - value: uploads:write
      - value: uploads:read
      - value: downloads:read
      - value: exports:write
      - value: exports:read
      - value: exports:cancel
      - value: jobs:enqueue
      - value: metrics:read
      - value: releases:read
      - value: resources:plan

clients:
  - name: @@TENANT_OPS_CLIENT_NAME@@
    app_type: non_interactive
    oidc_conformant: true
    description: @@TENANT_OPS_CLIENT_DESCRIPTION@@
    grant_types:
      - client_credentials
    jwt_configuration:
      alg: RS256
      secret_encoded: false

  - name: @@WEB_CLIENT_NAME@@
    app_type: regular_web
    oidc_conformant: true
    description: @@WEB_CLIENT_DESCRIPTION@@
    grant_types:
      - implicit
      - authorization_code
      - refresh_token
      - client_credentials
    callbacks:
      - @@WEB_CALLBACK_URL@@
    allowed_logout_urls:
      - @@WEB_LOGOUT_URL@@
    web_origins:
      - @@WEB_ORIGIN@@
    allowed_origins:
      - @@WEB_ORIGIN@@
    jwt_configuration:
      alg: RS256
      secret_encoded: false
