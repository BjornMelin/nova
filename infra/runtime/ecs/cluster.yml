AWSTemplateFormatVersion: "2010-09-09"
Description: ECS cluster and ALB foundation stack for Nova runtime services.
Parameters:
  Project:
    Type: String
    Description: Name of the project
    MinLength: 2
  Application:
    Type: String
    Description: Name of the application
    MinLength: 2
  EcsClusterName:
    Type: String
  LoadBalancerId:
    Type: String
    Description: Id of the load balancer
    Default: dash
  LoadBalancerName:
    Type: String
    Description: Name of the load balancer
  LoadBalancerScheme:
    Type: String
    Default: internal
    AllowedValues: [internal, internet-facing]
    Description: ALB scheme. Use internet-facing when endpoints must be public.
  HostedZoneName:
    Type: String
  HostedZoneId:
    Type: String
    Default: ""
    Description: Optional hosted zone ID used for ACM DNS validation automation.
  VpcId:
    Type: String
  SubnetList:
    Type: List<AWS::EC2::Subnet::Id>
  AlbIngressPrefixListId:
    Type: String
    Default: ""
    AllowedPattern: "^$|^pl-[0-9a-f]+$"
    ConstraintDescription: Must be empty or a valid EC2 managed prefix list ID.
    Description: Prefix list allowed to reach the ALB listeners.
  AlbIngressCidr:
    Type: String
    Default: ""
    AllowedPattern: "^$|^(\\d{1,3}\\.){3}\\d{1,3}\\/\\d{1,2}$"
    ConstraintDescription: Must be empty or a valid IPv4 CIDR (for example, 10.0.0.0/8).
    Description: CIDR block allowed to reach the ALB listeners.
  AlbIngressSourceSecurityGroupId:
    Type: String
    Default: ""
    AllowedPattern: "^$|^sg-[0-9a-f]+$"
    ConstraintDescription: Must be empty or a valid security group ID.
    Description: Source security group allowed to reach the ALB listeners.
  ListenerProtocol:
    Type: String
    Default: https
    AllowedValues: ["https", "http"]
  EnableLoadBalancerAccessLogs:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable ALB access logs to S3 when true.
  LoadBalancerLogBucket:
    Type: String
    Default: ""
  ImportKmsKeyId:
    Type: String
  LoadBalancerDNSName:
    Type: String
  TlsSecurityPolicy:
    Type: String
    Default: ELBSecurityPolicy-TLS13-1-2-2021-06
    Description: TLS security policy for HTTPS listeners.
  PublicAlbTransfersRateLimit:
    Type: Number
    Default: 2000
    MinValue: 10
    Description: Per-IP five-minute rate limit for /v1/transfers* on an internet-facing ALB.
  PublicAlbJobsRateLimit:
    Type: Number
    Default: 1000
    MinValue: 10
    Description: Per-IP five-minute rate limit for /v1/jobs* on an internet-facing ALB.

Conditions:
  IsInternetFacingLoadBalancer: !Equals [!Ref LoadBalancerScheme, "internet-facing"]
  EnableAlbAccessLogs: !Equals [!Ref EnableLoadBalancerAccessLogs, "true"]
  HasHostedZoneId: !Not [!Equals [!Ref HostedZoneId, ""]]
  HasAlbIngressPrefixListId: !Not [!Equals [!Ref AlbIngressPrefixListId, ""]]
  HasAlbIngressCidr: !Not [!Equals [!Ref AlbIngressCidr, ""]]
  HasAlbIngressSourceSecurityGroupId: !Not [!Equals [!Ref AlbIngressSourceSecurityGroupId, ""]]

Rules:
  RequireLoadBalancerLogBucketWhenLogsEnabled:
    RuleCondition: !Equals [!Ref EnableLoadBalancerAccessLogs, "true"]
    Assertions:
      - Assert: !Not [!Equals [!Ref LoadBalancerLogBucket, ""]]
        AssertDescription: Provide LoadBalancerLogBucket when EnableLoadBalancerAccessLogs=true.
  RequireExactlyOneAlbIngressSource:
    Assertions:
      - Assert: !Or
          - !And
              - !Not [!Equals [!Ref AlbIngressPrefixListId, ""]]
              - !Equals [!Ref AlbIngressCidr, ""]
              - !Equals [!Ref AlbIngressSourceSecurityGroupId, ""]
          - !And
              - !Equals [!Ref AlbIngressPrefixListId, ""]
              - !Not [!Equals [!Ref AlbIngressCidr, ""]]
              - !Equals [!Ref AlbIngressSourceSecurityGroupId, ""]
          - !And
              - !Equals [!Ref AlbIngressPrefixListId, ""]
              - !Equals [!Ref AlbIngressCidr, ""]
              - !Not [!Equals [!Ref AlbIngressSourceSecurityGroupId, ""]]
        AssertDescription: Provide exactly one ALB ingress source (prefix list, CIDR, or source security group).

Resources:
  ECSCluster:
    Type: "AWS::ECS::Cluster"
    Properties:
      ClusterName: !Ref EcsClusterName
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Configuration:
        ExecuteCommandConfiguration:
          KmsKeyId:
            Fn::ImportValue: !Ref ImportKmsKeyId
          Logging: DEFAULT
      CapacityProviders:
        - FARGATE
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Application
          Value: !Ref Application

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "security group for load balancer ${Project}-${Application}-${LoadBalancerId}"
      VpcId: !Ref VpcId
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Application
          Value: !Ref Application

  ALBSecurityGroupIngressHttpsPrefixList:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAlbIngressPrefixListId
    Properties:
      GroupId: !Ref ALBSecurityGroup
      Description: allow HTTPS ingress from managed prefix list
      IpProtocol: TCP
      FromPort: 443
      ToPort: 443
      SourcePrefixListId: !Ref AlbIngressPrefixListId

  ALBSecurityGroupIngressHttpsCidr:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAlbIngressCidr
    Properties:
      GroupId: !Ref ALBSecurityGroup
      Description: allow HTTPS ingress from CIDR
      IpProtocol: TCP
      FromPort: 443
      ToPort: 443
      CidrIp: !Ref AlbIngressCidr

  ALBSecurityGroupIngressHttpsSourceSecurityGroup:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAlbIngressSourceSecurityGroupId
    Properties:
      GroupId: !Ref ALBSecurityGroup
      Description: allow HTTPS ingress from source security group
      IpProtocol: TCP
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !Ref AlbIngressSourceSecurityGroupId

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${LoadBalancerName}"
      Scheme: !Ref LoadBalancerScheme
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets: !Ref SubnetList
      LoadBalancerAttributes:
        - Key: access_logs.s3.enabled
          Value: !If [EnableAlbAccessLogs, "true", "false"]
        - !If
          - EnableAlbAccessLogs
          - Key: access_logs.s3.bucket
            Value: !Ref LoadBalancerLogBucket
          - !Ref AWS::NoValue

  PublicAlbWebAcl:
    Type: AWS::WAFv2::WebACL
    Condition: IsInternetFacingLoadBalancer
    Properties:
      Name: !Sub "${Project}-${Application}-${LoadBalancerName}-public"
      Scope: REGIONAL
      Description: Public ALB protection baseline with route-scoped rate limiting for Nova APIs.
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${Project}-${Application}-${LoadBalancerId}-public-alb"
      Rules:
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 0
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${Project}-${Application}-${LoadBalancerId}-common-rules"
        - Name: NovaTransfersRateLimit
          Priority: 1
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              AggregateKeyType: IP
              Limit: !Ref PublicAlbTransfersRateLimit
              ScopeDownStatement:
                ByteMatchStatement:
                  FieldToMatch:
                    UriPath: {}
                  PositionalConstraint: STARTS_WITH
                  SearchString: /v1/transfers
                  TextTransformations:
                    - Priority: 0
                      Type: NONE
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${Project}-${Application}-${LoadBalancerId}-transfers-rate"
        - Name: NovaJobsRateLimit
          Priority: 2
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              AggregateKeyType: IP
              Limit: !Ref PublicAlbJobsRateLimit
              ScopeDownStatement:
                ByteMatchStatement:
                  FieldToMatch:
                    UriPath: {}
                  PositionalConstraint: STARTS_WITH
                  SearchString: /v1/jobs
                  TextTransformations:
                    - Priority: 0
                      Type: NONE
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${Project}-${Application}-${LoadBalancerId}-jobs-rate"

  PublicAlbWebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Condition: IsInternetFacingLoadBalancer
    Properties:
      ResourceArn: !Ref LoadBalancer
      WebACLArn: !GetAtt PublicAlbWebAcl.Arn

  LoadBalancerDNS:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      HostedZoneName: !Sub ${HostedZoneName}.
      Comment: Zone apex alias targeted to LoadBalancer LoadBalancer.
      RecordSets:
        - Name: !Ref LoadBalancerDNSName
          Type: A
          AliasTarget:
            HostedZoneId: !GetAtt "LoadBalancer.CanonicalHostedZoneID"
            DNSName: !GetAtt "LoadBalancer.DNSName"
        - Name: !Sub "*.${LoadBalancerDNSName}"
          Type: A
          AliasTarget:
            HostedZoneId: !GetAtt "LoadBalancer.CanonicalHostedZoneID"
            DNSName: !GetAtt "LoadBalancer.DNSName"

  AcmCertificate:
    Type: "AWS::CertificateManager::Certificate"
    Properties:
      DomainName: !Sub "${LoadBalancerDNSName}"
      ValidationMethod: DNS
      DomainValidationOptions: !If
        - HasHostedZoneId
        - - DomainName: !Ref LoadBalancerDNSName
            HostedZoneId: !Ref HostedZoneId
        - !Ref AWS::NoValue

  ALBListenerRedirectHTTP:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: "redirect"
          RedirectConfig:
            Protocol: HTTPS
            Port: 443
            Host: "#{host}"
            Path: "/#{path}"
            Query: "#{query}"
            StatusCode: "HTTP_301"
      Port: 80
      Protocol: HTTP
      LoadBalancerArn: !Ref "LoadBalancer"

  ALBListenerForwardHTTPS:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      Certificates:
        - CertificateArn: !Ref AcmCertificate
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            ContentType: "text/plain"
            StatusCode: "404"
      Port: 443
      Protocol: HTTPS
      LoadBalancerArn: !Ref "LoadBalancer"
      SslPolicy: !Ref TlsSecurityPolicy

Outputs:
  ClusterName:
    Value: !Ref ECSCluster
    Description: Name of the ECS Cluster
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:ecs:${EcsClusterName}:cluster
  ClusterArn:
    Value: !GetAtt ECSCluster.Arn
    Description: ARN of the ECS Cluster
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:ecs:${EcsClusterName}:clusterarn
  ListenerArn:
    Value: !GetAtt ALBListenerForwardHTTPS.ListenerArn
    Description: ARN of the Listener
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${LoadBalancerId}:${LoadBalancerName}:listenerarn
  LoadBalancerSg:
    Value: !Ref ALBSecurityGroup
    Description: ARN of the Listener
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${LoadBalancerId}:${LoadBalancerName}:alb:sg
  LoadBalancerDnsName:
    Value: !Join ["://", [!Ref ListenerProtocol, !GetAtt LoadBalancer.DNSName]]
    Description: DNS of the application load balancer
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${LoadBalancerId}:${LoadBalancerName}:alb:dns
  LoadBalancerFullName:
    Value: !GetAtt LoadBalancer.LoadBalancerFullName
    Description: Full name of the application load balancer
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${LoadBalancerId}${LoadBalancerName}:alb:name
  PublicAlbWebAclArn:
    Condition: IsInternetFacingLoadBalancer
    Value: !GetAtt PublicAlbWebAcl.Arn
    Description: Regional WAFv2 web ACL ARN protecting the public ALB.
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${LoadBalancerId}:${LoadBalancerName}:waf:webacl:arn
