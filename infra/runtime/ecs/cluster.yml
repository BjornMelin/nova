AWSTemplateFormatVersion: "2010-09-09"
Description: ECS cluster and ALB foundation stack for Nova runtime services.
Parameters:
  Project:
    Type: String
    Description: Name of the project
    MinLength: 2
  Application:
    Type: String
    Description: Name of the application
    MinLength: 2
  EcsClusterName:
    Type: String
  LoadBalancerId:
    Type: String
    Description: Id of the load balancer
    Default: dash
  LoadBalancerName:
    Type: String
    Description: Name of the load balancer
  LoadBalancerScheme:
    Type: String
    Default: internal
    AllowedValues: [internal]
    Description: ALB scheme. The runtime origin contract requires an internal ALB.
  HostedZoneName:
    Type: String
  HostedZoneId:
    Type: String
    Default: ""
    Description: Optional hosted zone ID used for ACM DNS validation automation.
  VpcId:
    Type: String
  SubnetList:
    Type: List<AWS::EC2::Subnet::Id>
  AlbIngressPrefixListId:
    Type: String
    Default: ""
    AllowedPattern: "^$|^pl-[0-9a-f]+$"
    ConstraintDescription: Must be empty or a valid EC2 managed prefix list ID.
    Description: Prefix list allowed to reach the ALB listeners.
  AlbIngressCidr:
    Type: String
    Default: ""
    AllowedPattern: "^$|^(\\d{1,3}\\.){3}\\d{1,3}\\/\\d{1,2}$"
    ConstraintDescription: Must be empty or a valid IPv4 CIDR (for example, 10.0.0.0/8).
    Description: CIDR block allowed to reach the ALB listeners.
  AlbIngressSourceSecurityGroupId:
    Type: String
    Default: ""
    AllowedPattern: "^$|^sg-[0-9a-f]+$"
    ConstraintDescription: Must be empty or a valid security group ID.
    Description: Source security group allowed to reach the ALB listeners.
  EnableLoadBalancerAccessLogs:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable ALB access logs to S3 when true.
  LoadBalancerLogBucket:
    Type: String
    Default: ""
  ImportKmsKeyId:
    Type: String
  LoadBalancerDNSName:
    Type: String
  TlsSecurityPolicy:
    Type: String
    Default: ELBSecurityPolicy-TLS13-1-2-2021-06
    Description: TLS security policy for HTTPS listeners.
  EnableBlueGreenTestListener:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Create a dedicated HTTPS listener for blue/green test traffic.
  BlueGreenTestListenerPort:
    Type: Number
    Default: 8443
    MinValue: 1
    MaxValue: 65535
    Description: Port used by the optional blue/green test listener.

Conditions:
  CreateBlueGreenTestListener: !Equals [!Ref EnableBlueGreenTestListener, "true"]
  EnableAlbAccessLogs: !Equals [!Ref EnableLoadBalancerAccessLogs, "true"]
  HasHostedZoneId: !Not [!Equals [!Ref HostedZoneId, ""]]
  HasAlbIngressPrefixListId: !Not [!Equals [!Ref AlbIngressPrefixListId, ""]]
  HasAlbIngressCidr: !Not [!Equals [!Ref AlbIngressCidr, ""]]
  HasAlbIngressSourceSecurityGroupId: !Not [!Equals [!Ref AlbIngressSourceSecurityGroupId, ""]]
  CreateBlueGreenTestListenerWithPrefixList: !And
    - !Condition CreateBlueGreenTestListener
    - !Condition HasAlbIngressPrefixListId
  CreateBlueGreenTestListenerWithCidr: !And
    - !Condition CreateBlueGreenTestListener
    - !Condition HasAlbIngressCidr
  CreateBlueGreenTestListenerWithSourceSecurityGroup: !And
    - !Condition CreateBlueGreenTestListener
    - !Condition HasAlbIngressSourceSecurityGroupId

Rules:
  RequireLoadBalancerLogBucketWhenLogsEnabled:
    RuleCondition: !Equals [!Ref EnableLoadBalancerAccessLogs, "true"]
    Assertions:
      - Assert: !Not [!Equals [!Ref LoadBalancerLogBucket, ""]]
        AssertDescription: Provide LoadBalancerLogBucket when EnableLoadBalancerAccessLogs=true.
  BlueGreenTestListenerPortNotReserved:
    RuleCondition: !Equals [!Ref EnableBlueGreenTestListener, "true"]
    Assertions:
      - Assert: !And
          - !Not [!Equals [!Ref BlueGreenTestListenerPort, 80]]
          - !Not [!Equals [!Ref BlueGreenTestListenerPort, 443]]
        AssertDescription: BlueGreenTestListenerPort must not be 80 or 443 when EnableBlueGreenTestListener=true.
  RequireExactlyOneAlbIngressSource:
    Assertions:
      - Assert: !Or
          - !And
              - !Not [!Equals [!Ref AlbIngressPrefixListId, ""]]
              - !Equals [!Ref AlbIngressCidr, ""]
              - !Equals [!Ref AlbIngressSourceSecurityGroupId, ""]
          - !And
              - !Equals [!Ref AlbIngressPrefixListId, ""]
              - !Not [!Equals [!Ref AlbIngressCidr, ""]]
              - !Equals [!Ref AlbIngressSourceSecurityGroupId, ""]
          - !And
              - !Equals [!Ref AlbIngressPrefixListId, ""]
              - !Equals [!Ref AlbIngressCidr, ""]
              - !Not [!Equals [!Ref AlbIngressSourceSecurityGroupId, ""]]
        AssertDescription: Provide exactly one ALB ingress source (prefix list, CIDR, or source security group).

Resources:
  ECSCluster:
    Type: "AWS::ECS::Cluster"
    Properties:
      ClusterName: !Ref EcsClusterName
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Configuration:
        ExecuteCommandConfiguration:
          KmsKeyId:
            Fn::ImportValue: !Ref ImportKmsKeyId
          Logging: DEFAULT
      CapacityProviders:
        - FARGATE
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Application
          Value: !Ref Application

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "security group for load balancer ${Project}-${Application}-${LoadBalancerId}"
      VpcId: !Ref VpcId
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Application
          Value: !Ref Application

  ALBSecurityGroupIngressHttpsPrefixList:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAlbIngressPrefixListId
    Properties:
      GroupId: !Ref ALBSecurityGroup
      Description: allow HTTPS ingress from managed prefix list
      IpProtocol: TCP
      FromPort: 443
      ToPort: 443
      SourcePrefixListId: !Ref AlbIngressPrefixListId

  ALBSecurityGroupIngressHttpsCidr:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAlbIngressCidr
    Properties:
      GroupId: !Ref ALBSecurityGroup
      Description: allow HTTPS ingress from CIDR
      IpProtocol: TCP
      FromPort: 443
      ToPort: 443
      CidrIp: !Ref AlbIngressCidr

  ALBSecurityGroupIngressHttpsSourceSecurityGroup:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAlbIngressSourceSecurityGroupId
    Properties:
      GroupId: !Ref ALBSecurityGroup
      Description: allow HTTPS ingress from source security group
      IpProtocol: TCP
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !Ref AlbIngressSourceSecurityGroupId

  ALBSecurityGroupIngressHttpPrefixList:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAlbIngressPrefixListId
    Properties:
      GroupId: !Ref ALBSecurityGroup
      Description: allow HTTP ingress from managed prefix list
      IpProtocol: TCP
      FromPort: 80
      ToPort: 80
      SourcePrefixListId: !Ref AlbIngressPrefixListId

  ALBSecurityGroupIngressHttpCidr:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAlbIngressCidr
    Properties:
      GroupId: !Ref ALBSecurityGroup
      Description: allow HTTP ingress from CIDR
      IpProtocol: TCP
      FromPort: 80
      ToPort: 80
      CidrIp: !Ref AlbIngressCidr

  ALBSecurityGroupIngressHttpSourceSecurityGroup:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAlbIngressSourceSecurityGroupId
    Properties:
      GroupId: !Ref ALBSecurityGroup
      Description: allow HTTP ingress from source security group
      IpProtocol: TCP
      FromPort: 80
      ToPort: 80
      SourceSecurityGroupId: !Ref AlbIngressSourceSecurityGroupId

  ALBSecurityGroupIngressBlueGreenTestListenerPrefixList:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: CreateBlueGreenTestListenerWithPrefixList
    Properties:
      GroupId: !Ref ALBSecurityGroup
      Description: allow ingress for the blue/green test listener port
      IpProtocol: TCP
      FromPort: !Ref BlueGreenTestListenerPort
      ToPort: !Ref BlueGreenTestListenerPort
      SourcePrefixListId: !Ref AlbIngressPrefixListId

  ALBSecurityGroupIngressBlueGreenTestListenerCidr:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: CreateBlueGreenTestListenerWithCidr
    Properties:
      GroupId: !Ref ALBSecurityGroup
      Description: allow blue/green test listener ingress from CIDR
      IpProtocol: TCP
      FromPort: !Ref BlueGreenTestListenerPort
      ToPort: !Ref BlueGreenTestListenerPort
      CidrIp: !Ref AlbIngressCidr

  ALBSecurityGroupIngressBlueGreenTestListenerSourceSecurityGroup:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: CreateBlueGreenTestListenerWithSourceSecurityGroup
    Properties:
      GroupId: !Ref ALBSecurityGroup
      Description: allow blue/green test listener ingress from source security group
      IpProtocol: TCP
      FromPort: !Ref BlueGreenTestListenerPort
      ToPort: !Ref BlueGreenTestListenerPort
      SourceSecurityGroupId: !Ref AlbIngressSourceSecurityGroupId

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${LoadBalancerName}"
      Scheme: !Ref LoadBalancerScheme
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets: !Ref SubnetList
      LoadBalancerAttributes:
        - Key: access_logs.s3.enabled
          Value: !If [EnableAlbAccessLogs, "true", "false"]
        - Key: routing.http.drop_invalid_header_fields
          Value: "true"
        - !If
          - EnableAlbAccessLogs
          - Key: access_logs.s3.bucket
            Value: !Ref LoadBalancerLogBucket
          - !Ref AWS::NoValue

  LoadBalancerDNS:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      HostedZoneName: !Sub ${HostedZoneName}.
      Comment: Zone apex alias targeted to LoadBalancer LoadBalancer.
      RecordSets:
        - Name: !Ref LoadBalancerDNSName
          Type: A
          AliasTarget:
            HostedZoneId: !GetAtt "LoadBalancer.CanonicalHostedZoneID"
            DNSName: !GetAtt "LoadBalancer.DNSName"
        - Name: !Sub "*.${LoadBalancerDNSName}"
          Type: A
          AliasTarget:
            HostedZoneId: !GetAtt "LoadBalancer.CanonicalHostedZoneID"
            DNSName: !GetAtt "LoadBalancer.DNSName"

  AcmCertificate:
    Type: "AWS::CertificateManager::Certificate"
    Properties:
      DomainName: !Sub "${LoadBalancerDNSName}"
      ValidationMethod: DNS
      DomainValidationOptions: !If
        - HasHostedZoneId
        - - DomainName: !Ref LoadBalancerDNSName
            HostedZoneId: !Ref HostedZoneId
        - !Ref AWS::NoValue

  ALBListenerRedirectHTTP:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: "redirect"
          RedirectConfig:
            Protocol: HTTPS
            Port: 443
            Host: "#{host}"
            Path: "/#{path}"
            Query: "#{query}"
            StatusCode: "HTTP_301"
      Port: 80
      Protocol: HTTP
      LoadBalancerArn: !Ref "LoadBalancer"

  ALBListenerForwardHTTPS:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      Certificates:
        - CertificateArn: !Ref AcmCertificate
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            ContentType: "text/plain"
            StatusCode: "404"
      Port: 443
      Protocol: HTTPS
      LoadBalancerArn: !Ref "LoadBalancer"
      SslPolicy: !Ref TlsSecurityPolicy

  ALBListenerForwardHTTPSTest:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: CreateBlueGreenTestListener
    Properties:
      Certificates:
        - CertificateArn: !Ref AcmCertificate
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            ContentType: "text/plain"
            StatusCode: "404"
      Port: !Ref BlueGreenTestListenerPort
      Protocol: HTTPS
      LoadBalancerArn: !Ref "LoadBalancer"
      SslPolicy: !Ref TlsSecurityPolicy

Outputs:
  ClusterName:
    Value: !Ref ECSCluster
    Description: Name of the ECS Cluster
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:ecs:${EcsClusterName}:cluster
  ClusterArn:
    Value: !GetAtt ECSCluster.Arn
    Description: ARN of the ECS Cluster
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:ecs:${EcsClusterName}:clusterarn
  ListenerArn:
    Value: !GetAtt ALBListenerForwardHTTPS.ListenerArn
    Description: ARN of the Listener
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${LoadBalancerId}:${LoadBalancerName}:listenerarn
  TestListenerArn:
    Condition: CreateBlueGreenTestListener
    Value: !GetAtt ALBListenerForwardHTTPSTest.ListenerArn
    Description: ARN of the optional blue/green test listener
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${LoadBalancerId}:${LoadBalancerName}:testlistenerarn
  LoadBalancerSg:
    Value: !Ref ALBSecurityGroup
    Description: ARN of the Listener
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${LoadBalancerId}:${LoadBalancerName}:alb:sg
  LoadBalancerArn:
    Value: !Ref LoadBalancer
    Description: ARN of the application load balancer.
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${LoadBalancerId}:${LoadBalancerName}:alb:arn
  LoadBalancerDnsHostname:
    Value: !GetAtt LoadBalancer.DNSName
    Description: Hostname of the application load balancer without protocol decoration.
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${LoadBalancerId}:${LoadBalancerName}:alb:hostname
  LoadBalancerFullName:
    Value: !GetAtt LoadBalancer.LoadBalancerFullName
    Description: Full name of the application load balancer
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${LoadBalancerId}:${LoadBalancerName}:alb:name
