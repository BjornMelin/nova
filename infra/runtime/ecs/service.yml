AWSTemplateFormatVersion: "2010-09-09"
Description: ECS service runtime stack for Nova API workloads.
Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W1030
        - W1031
Parameters:
  Environment:
    Type: String
  Project:
    Type: String
    Description: Name of the project
    MinLength: 2
  Application:
    Type: String
    Description: Name of the application
    MinLength: 2
  Service:
    Type: String
    Description: Name of the ECS service
  EcsClusterName:
    Type: String
  LoadBalancerName:
    Type: String
    Description: Name of the load balancer
  DockerRepoName:
    Type: String
  ImageDigest:
    Type: String
    Description: OCI image digest for the deployed workload image.
    AllowedPattern: "^sha256:[A-Fa-f0-9]{64}$"
  DockerContainerPort:
    Type: String
    Default: "8050"
  DockerHostPort:
    Type: String
    Default: "8050"
  VpcId:
    Type: String
  SubnetList:
    Type: List<AWS::EC2::Subnet::Id>
  AssignPublicIp:
    Type: String
    Default: DISABLED
    AllowedValues: [ENABLED, DISABLED]
    Description: awsvpc public IP assignment for ECS tasks.
  ListenerProtocol:
    Type: String
    Default: https
    AllowedValues: ["https", "http"]
  TargetProtocol:
    Type: String
    Default: http
    AllowedValues: ["https", "http"]
  TargetType:
    Type: String
    Default: ip
    AllowedValues: ["ip", "lambda"]
  TaskCpu:
    Type: String
    Default: "2048"
  TaskMemory:
    Type: String
    Default: "8192" # 8GB
  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 0
    Description: Initial desired task count for the ECS service.
  RuntimeProfile:
    Type: String
    Default: standard
    AllowedPattern: "^[A-Za-z0-9._-]+$"
    Description: Runtime profile label propagated to ECS service tags and task environment.
  ListenerRulePriority:
    Type: String
  EcsInfrastructureRoleArn:
    Type: String
    Description: IAM role ARN used by ECS to manage ALB traffic shifting for blue/green deployments.
  TestTrafficListenerArn:
    Type: String
    Default: ""
    Description: Optional ALB listener ARN used for blue/green test traffic routing.
  TestTrafficListenerRulePriority:
    Type: Number
    Default: 9999
    MinValue: 1
    MaxValue: 50000
    Description: Priority for canary host listener rule when the optional test listener is enabled.
  BlueGreenBakeTimeInMinutes:
    Type: Number
    Default: 10
    MinValue: 0
    MaxValue: 1440
    Description: Minutes to keep blue and green revisions running after production traffic shifts.
  DeploymentRollbackAlarmNamePrimary:
    Type: String
    Default: ""
    Description: Optional primary rollback alarm name bound to ECS deployment alarms.
  DeploymentRollbackAlarmNameSecondary:
    Type: String
    Default: ""
    Description: Optional secondary rollback alarm name bound to ECS deployment alarms.
  ReadinessHealthCheckPath:
    Type: String
    Default: /v1/health/ready
    Description: Readiness path used by blue/green target groups and deployment validation gates.
  TargetGroupHealthCheckTimeoutSeconds:
    Type: Number
    Default: 30
    MinValue: 2
    MaxValue: 120
    Description: ALB target-group health check timeout in seconds.
  TargetGroupHealthCheckIntervalSeconds:
    Type: Number
    Default: 60
    MinValue: 5
    MaxValue: 300
    Description: ALB target-group health check interval in seconds.
  TargetGroupHealthyThresholdCount:
    Type: Number
    Default: 2
    MinValue: 2
    MaxValue: 10
    Description: Consecutive successful health checks required to mark targets healthy.
  TargetGroupUnhealthyThresholdCount:
    Type: Number
    Default: 2
    MinValue: 2
    MaxValue: 10
    Description: Consecutive failed health checks required to mark targets unhealthy.
  TargetGroupDeregistrationDelaySeconds:
    Type: Number
    Default: 10
    MinValue: 0
    MaxValue: 3600
    Description: Delay (seconds) before deregistered targets stop receiving traffic.
  LoadBalancerId:
    Type: String
    Default: "dash"
  # AuthAppType:
  #   Type: String
  #   Default: "spa"
  # UseTaskSecret:
  #   Type: String
  #   Default: "false"
  #   AllowedValues: ["true", "false"]
  FileTransferEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      If true, attach least-privilege S3/KMS permissions for direct-to-S3 uploads/downloads
      (presigned URL + multipart) and allow the task role to sign those requests.
  FileTransferBucketName:
    Type: String
    Default: ""
    Description: Target S3 bucket name used for file transfer (required when FileTransferEnabled is true)
  FileTransferUploadPrefix:
    Type: String
    Default: "uploads/"
    Description: Object key prefix for user uploads (IAM scoping)
  FileTransferExportPrefix:
    Type: String
    Default: "exports/"
    Description: Object key prefix for exports/downloads (IAM scoping)
  FileTransferTmpPrefix:
    Type: String
    Default: "tmp/"
    Description: Object key prefix for temporary objects (IAM scoping)
  FileTransferKmsAlias:
    Type: String
    Default: ""
    Description: KMS alias used by the file transfer bucket default encryption (alias/<name>)
  FileTransferAsyncEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Attach async queue/table least-privilege IAM policy to task role.
  FileTransferJobsQueueArn:
    Type: String
    Default: ""
    AllowedPattern: "^$|^arn:(aws|aws-us-gov|aws-cn):sqs:[a-z0-9-]+:[0-9]{12}:[A-Za-z0-9_.-]+(\\.fifo)?$"
    Description: Async jobs queue ARN (required when FileTransferAsyncEnabled is true).
  FileTransferJobsTableArn:
    Type: String
    Default: ""
    AllowedPattern: "^$|^arn:(aws|aws-us-gov|aws-cn):dynamodb:[a-z0-9-]+:[0-9]{12}:table\\/[A-Za-z0-9_.-]+$"
    Description: Async jobs table ARN (required when FileTransferAsyncEnabled is true).
  FileTransferActivityTableArn:
    Type: String
    Default: ""
    AllowedPattern: "^$|^arn:(aws|aws-us-gov|aws-cn):dynamodb:[a-z0-9-]+:[0-9]{12}:table\\/[A-Za-z0-9_.-]+$"
    Description: Async activity table ARN (required when FileTransferAsyncEnabled is true).
  FileTransferCacheEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Allow service SG ingress to managed cache SG on Redis TLS port.
  FileTransferCacheSecurityGroupExportName:
    Type: String
    Default: ""
    Description: Export name for the managed cache security group ID.
  JobsQueueUrl:
    Type: String
    Default: ""
    Description: Runtime SQS queue URL injected into the API service when async is enabled.
  JobsTableName:
    Type: String
    Default: ""
    Description: Runtime DynamoDB jobs table name injected into the API service when async is enabled.
  ActivityTableName:
    Type: String
    Default: ""
    Description: Runtime DynamoDB activity table name injected into the API service when async is enabled.
  CacheRedisUrlSecretArn:
    Type: String
    Default: ""
    AllowedPattern: "^$|^arn:(aws|aws-us-gov|aws-cn):secretsmanager:[a-z0-9-]+:[0-9]{12}:secret:[A-Za-z0-9/_+=.@-]+$"
    ConstraintDescription: >-
      CacheRedisUrlSecretArn must be a base Secrets Manager secret ARN without
      json-key or version suffix segments.
    Description: Secrets Manager ARN for the CACHE_REDIS_URL value when cache is enabled.
  AuthMode:
    Type: String
    Default: "same_origin"
    AllowedValues: ["same_origin", "jwt_local"]
  OidcIssuer:
    Type: String
    Default: ""
  OidcAudience:
    Type: String
    Default: ""
  OidcJwksUrl:
    Type: String
    Default: ""
  OidcRequiredScopes:
    Type: String
    Default: ""
  OidcRequiredPermissions:
    Type: String
    Default: ""
  OidcClockSkewSeconds:
    Type: Number
    Default: 0
    MinValue: 0
  OidcVerifierThreadTokens:
    Type: Number
    Default: 40
    MinValue: 1
  BlockingIoThreadTokens:
    Type: Number
    Default: 80
    MinValue: 1
  CacheRedisMaxConnections:
    Type: Number
    Default: 64
    MinValue: 1
  CacheRedisSocketTimeoutSeconds:
    Type: Number
    Default: 0.5
    MinValue: 0
  CacheRedisSocketConnectTimeoutSeconds:
    Type: Number
    Default: 0.5
    MinValue: 0
  CacheRedisHealthCheckIntervalSeconds:
    Type: Number
    Default: 30
    MinValue: 0
  CacheRedisRetryBaseSeconds:
    Type: Number
    Default: 0.05
    MinValue: 0
  CacheRedisRetryCapSeconds:
    Type: Number
    Default: 0.5
    MinValue: 0
  CacheRedisRetryAttempts:
    Type: Number
    Default: 2
    MinValue: 0
  CacheRedisDecodeResponses:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  CacheRedisProtocol:
    Type: Number
    Default: 2
    MinValue: 2
    MaxValue: 3
  CacheLocalTtlSeconds:
    Type: Number
    Default: 120
    MinValue: 0
  CacheLocalMaxEntries:
    Type: Number
    Default: 2000
    MinValue: 1
  CacheSharedTtlSeconds:
    Type: Number
    Default: 300
    MinValue: 0
  CacheKeyPrefix:
    Type: String
    Default: "nova"
  CacheKeySchemaVersion:
    Type: String
    Default: "1"
  AuthJwtCacheMaxTtlSeconds:
    Type: Number
    Default: 120
    MinValue: 0
  IdempotencyEnabled:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
  IdempotencyTtlSeconds:
    Type: Number
    Default: 900
    MinValue: 0
  FileTransferPresignUploadTtlSeconds:
    Type: Number
    Default: 1800
    MinValue: 0
  FileTransferPresignDownloadTtlSeconds:
    Type: Number
    Default: 900
    MinValue: 0
  FileTransferMultipartThresholdBytes:
    Type: Number
    Default: 104857600
    MinValue: 0
  FileTransferPartSizeBytes:
    Type: Number
    Default: 134217728
    MinValue: 5242880
  FileTransferMaxConcurrency:
    Type: Number
    Default: 4
    MinValue: 1
  FileTransferUseAccelerateEndpoint:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  FileTransferMaxUploadBytes:
    Type: Number
    Default: 536870912000
    MinValue: 1
  ServiceDNS:
    Type: String
  UseServiceDiscovery:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: "Whether to create a ServiceDiscoveryService resource."
  Period:
    Type: Number
    Default: 300 # 5 minutes
    Description: The period over which the specified statistic is applied
  EvaluationPeriods:
    Type: Number
    Default: 1
    Description: The number of periods over which data is compared to the specified threshold
  MonitorEcsService:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
  AlarmArn:
    Type: String
    Description: "ARN of the AWS reasource to be triggered by the alarm"
  Owner:
    Type: String
    Description: "A# of owner of the dash application"

Mappings:
  Protocol:
    http:
      Upper: HTTP
      LoadBalancerPort: 80
    https:
      Upper: HTTPS
      LoadBalancerPort: 443

Rules:
  FileTransferBucketProvided:
    Assertions:
      - Assert: !Or
          - !Equals [!Ref FileTransferEnabled, "false"]
          - !Not [!Equals [!Ref FileTransferBucketName, ""]]
        AssertDescription: >-
          FileTransferBucketName is required when FileTransferEnabled is "true".
  FileTransferAsyncParamsProvided:
    Assertions:
      - Assert: !Or
          - !Equals [!Ref FileTransferAsyncEnabled, "false"]
          - !And
              - !Not [!Equals [!Ref FileTransferJobsQueueArn, ""]]
              - !Not [!Equals [!Ref FileTransferJobsTableArn, ""]]
              - !Not [!Equals [!Ref FileTransferActivityTableArn, ""]]
        AssertDescription: >-
          FileTransferJobsQueueArn, FileTransferJobsTableArn, and
          FileTransferActivityTableArn are required when
          FileTransferAsyncEnabled is "true".
  FileTransferAsyncRuntimeParamsProvided:
    Assertions:
      - Assert: !Or
          - !Equals [!Ref FileTransferAsyncEnabled, "false"]
          - !And
              - !Not [!Equals [!Ref JobsQueueUrl, ""]]
              - !Not [!Equals [!Ref JobsTableName, ""]]
              - !Not [!Equals [!Ref ActivityTableName, ""]]
        AssertDescription: >-
          JobsQueueUrl, JobsTableName, and ActivityTableName are required
          when FileTransferAsyncEnabled is "true".
  FileTransferCacheParamsProvided:
    Assertions:
      - Assert: !Or
          - !Equals [!Ref FileTransferCacheEnabled, "false"]
          - !Not
              - !Equals [!Ref FileTransferCacheSecurityGroupExportName, ""]
        AssertDescription: >-
          FileTransferCacheSecurityGroupExportName is required when
          FileTransferCacheEnabled is "true".
  FileTransferCacheSecretProvided:
    Assertions:
      - Assert: !Or
          - !Equals [!Ref FileTransferCacheEnabled, "false"]
          - !Not [!Equals [!Ref CacheRedisUrlSecretArn, ""]]
        AssertDescription: >-
          CacheRedisUrlSecretArn is required when FileTransferCacheEnabled is
          "true".
  IdempotencyRequiresSharedCache:
    Assertions:
      - Assert: !Or
          - !Equals [!Ref IdempotencyEnabled, "false"]
          - !And
              - !Equals [!Ref FileTransferCacheEnabled, "true"]
              - !Not [!Equals [!Ref CacheRedisUrlSecretArn, ""]]
        AssertDescription: >-
          IdempotencyEnabled requires FileTransferCacheEnabled to be "true"
          and CacheRedisUrlSecretArn to be configured.
  JwtLocalOidcParamsProvided:
    Assertions:
      - Assert: !Or
          - !Not [!Equals [!Ref AuthMode, "jwt_local"]]
          - !And
              - !Not [!Equals [!Ref OidcIssuer, ""]]
              - !Not [!Equals [!Ref OidcAudience, ""]]
              - !Not [!Equals [!Ref OidcJwksUrl, ""]]
        AssertDescription: >-
          OidcIssuer, OidcAudience, and OidcJwksUrl are required when AuthMode
          is "jwt_local".
  BlueGreenTrafficControlParamsProvided:
    Assertions:
      - Assert: !Not [!Equals [!Ref EcsInfrastructureRoleArn, ""]]
        AssertDescription: >-
          EcsInfrastructureRoleArn is required for ECS-native blue/green deployments.

Conditions:
  UseServiceDiscovery: !Equals [!Ref UseServiceDiscovery, "true"]
  Monitor: !Equals [!Ref MonitorEcsService, "true"]
  EnableFileTransfer: !Equals [!Ref FileTransferEnabled, "true"]
  HasFileTransferBucketName: !Not [!Equals [!Ref FileTransferBucketName, ""]]
  EnableFileTransferWithBucket: !And
    - !Condition EnableFileTransfer
    - !Condition HasFileTransferBucketName
  EnableFileTransferAsync: !Equals [!Ref FileTransferAsyncEnabled, "true"]
  EnableFileTransferCache: !Equals [!Ref FileTransferCacheEnabled, "true"]
  HasCacheRedisUrlSecretArn: !Not [!Equals [!Ref CacheRedisUrlSecretArn, ""]]
  EnableFileTransferCacheWithSecretArn: !And
    - !Condition EnableFileTransferCache
    - !Condition HasCacheRedisUrlSecretArn
  HasTestTrafficListenerArn: !Not [!Equals [!Ref TestTrafficListenerArn, ""]]
  MonitorAlternateTargetGroup: !Equals [!Ref MonitorEcsService, "true"]
  HasDeploymentRollbackAlarmNamePrimary: !Not
    - !Equals [!Ref DeploymentRollbackAlarmNamePrimary, ""]
  HasDeploymentRollbackAlarmNameSecondary: !Not
    - !Equals [!Ref DeploymentRollbackAlarmNameSecondary, ""]
  HasAnyDeploymentRollbackAlarm: !Or
    - !Condition HasDeploymentRollbackAlarmNamePrimary
    - !Condition HasDeploymentRollbackAlarmNameSecondary

Resources:
  ListenerRule:
    Type: "AWS::ElasticLoadBalancingV2::ListenerRule"
    Properties:
      Actions:
        - Type: forward
          ForwardConfig:
            TargetGroups:
              - TargetGroupArn: !Ref LoadBalancerTargetGroupBlue
                Weight: 1
              - TargetGroupArn: !Ref LoadBalancerTargetGroupGreen
                Weight: 0
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values:
              - !Sub ${ServiceDNS}
      ListenerArn:
        Fn::ImportValue: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${LoadBalancerId}:${LoadBalancerName}:listenerarn
      Priority: !Ref ListenerRulePriority

  AcmCertificate:
    Type: "AWS::CertificateManager::Certificate"
    Properties:
      DomainName: !Sub ${ServiceDNS}
      ValidationMethod: DNS

  ListenerCertList:
    Type: AWS::ElasticLoadBalancingV2::ListenerCertificate
    Properties:
      Certificates:
        - CertificateArn: !Ref AcmCertificate
      ListenerArn:
        Fn::ImportValue: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${LoadBalancerId}:${LoadBalancerName}:listenerarn

  LoadBalancerTargetGroupBlue:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckTimeoutSeconds: !Ref TargetGroupHealthCheckTimeoutSeconds
      HealthCheckIntervalSeconds: !Ref TargetGroupHealthCheckIntervalSeconds
      HealthCheckProtocol: !FindInMap [Protocol, !Ref TargetProtocol, Upper]
      HealthCheckPath: !Ref ReadinessHealthCheckPath
      TargetType: !Ref TargetType
      Port: !Ref DockerHostPort
      Protocol: !FindInMap [Protocol, !Ref TargetProtocol, Upper]
      HealthyThresholdCount: !Ref TargetGroupHealthyThresholdCount
      UnhealthyThresholdCount: !Ref TargetGroupUnhealthyThresholdCount
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: !Sub "${TargetGroupDeregistrationDelaySeconds}"
      VpcId: !Sub ${VpcId}
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Application
          Value: !Ref Application
        - Key: Service
          Value: !Ref Service
        - Key: Owner
          Value: !Ref Owner
        - Key: DeploymentColor
          Value: blue

  LoadBalancerTargetGroupGreen:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckTimeoutSeconds: !Ref TargetGroupHealthCheckTimeoutSeconds
      HealthCheckIntervalSeconds: !Ref TargetGroupHealthCheckIntervalSeconds
      HealthCheckProtocol: !FindInMap [Protocol, !Ref TargetProtocol, Upper]
      HealthCheckPath: !Ref ReadinessHealthCheckPath
      TargetType: !Ref TargetType
      Port: !Ref DockerHostPort
      Protocol: !FindInMap [Protocol, !Ref TargetProtocol, Upper]
      HealthyThresholdCount: !Ref TargetGroupHealthyThresholdCount
      UnhealthyThresholdCount: !Ref TargetGroupUnhealthyThresholdCount
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: !Sub "${TargetGroupDeregistrationDelaySeconds}"
      VpcId: !Sub ${VpcId}
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Application
          Value: !Ref Application
        - Key: Service
          Value: !Ref Service
        - Key: Owner
          Value: !Ref Owner
        - Key: DeploymentColor
          Value: green

  TestTrafficListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Condition: HasTestTrafficListenerArn
    Properties:
      Actions:
        - Type: forward
          ForwardConfig:
            TargetGroups:
              - TargetGroupArn: !Ref LoadBalancerTargetGroupBlue
                Weight: 0
              - TargetGroupArn: !Ref LoadBalancerTargetGroupGreen
                Weight: 1
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values:
              - !Sub canary.${ServiceDNS}
      ListenerArn: !Ref TestTrafficListenerArn
      Priority: !Ref TestTrafficListenerRulePriority

  # ECS
  ContainerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "security group for ecs service ${Project}-${Application}-${Service}"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref DockerContainerPort
          ToPort: !Ref DockerContainerPort
          SourceSecurityGroupId:
            Fn::ImportValue: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${LoadBalancerId}:${LoadBalancerName}:alb:sg

  FileTransferCacheIngressFromService:
    Condition: EnableFileTransferCache
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: !Sub >-
        Allow ${Project}-${Application}-${Service} ECS tasks to connect to
        managed file-transfer cache.
      GroupId:
        Fn::ImportValue: !Ref FileTransferCacheSecurityGroupExportName
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId: !Ref ContainerSecurityGroup

  DefaultLogGroup:
    Type: AWS::Logs::LogGroup
    UpdateReplacePolicy: Delete
    DeletionPolicy: Delete
    Properties:
      LogGroupName: !Sub "${Project}-${Application}/${Service}/ecs"
      RetentionInDays: 30

  EcsTaskExecutionSecretsPolicy:
    Condition: EnableFileTransferCacheWithSecretArn
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${Project}-${Application}-${Service}-ecs-task-execution-secrets-${AWS::Region}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Ref CacheRedisUrlSecretArn
          - Effect: Allow
            Action:
              - kms:Decrypt
            # KMS key ARNs are not known at template authoring time;
            # ViaService limits usage to Secrets Manager.
            Resource: "*"
            Condition:
              StringEquals:
                kms:ViaService: !Sub "secretsmanager.${AWS::Region}.${AWS::URLSuffix}"
      Roles:
        - !Sub "${Project}-${Application}-${Service}-ecs-task-execution-${AWS::Region}"

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${Project}-${Application}-${Service}-ecs-task-execution-${AWS::Region}"
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: !Ref Service
          # Cpu: 512
          # MemoryReservation: 2048
          Essential: true
          Environment:
            - Name: AWS_DEFAULT_REGION
              Value: !Sub "${AWS::Region}"
            - Name: ENVIRONMENT
              Value: !Sub "${Environment}"
            - Name: NOVA_RUNTIME_PROFILE
              Value: !Ref RuntimeProfile
            - Name: FILE_TRANSFER_ENABLED
              Value: !Ref FileTransferEnabled
            - Name: AUTH_MODE
              Value: !Ref AuthMode
            - Name: OIDC_ISSUER
              Value: !Ref OidcIssuer
            - Name: OIDC_AUDIENCE
              Value: !Ref OidcAudience
            - Name: OIDC_JWKS_URL
              Value: !Ref OidcJwksUrl
            - Name: OIDC_REQUIRED_SCOPES
              Value: !Ref OidcRequiredScopes
            - Name: OIDC_REQUIRED_PERMISSIONS
              Value: !Ref OidcRequiredPermissions
            - Name: OIDC_CLOCK_SKEW_SECONDS
              Value: !Ref OidcClockSkewSeconds
            - Name: OIDC_VERIFIER_THREAD_TOKENS
              Value: !Ref OidcVerifierThreadTokens
            - Name: BLOCKING_IO_THREAD_TOKENS
              Value: !Ref BlockingIoThreadTokens
            - Name: CACHE_REDIS_MAX_CONNECTIONS
              Value: !Ref CacheRedisMaxConnections
            - Name: CACHE_REDIS_SOCKET_TIMEOUT_SECONDS
              Value: !Ref CacheRedisSocketTimeoutSeconds
            - Name: CACHE_REDIS_SOCKET_CONNECT_TIMEOUT_SECONDS
              Value: !Ref CacheRedisSocketConnectTimeoutSeconds
            - Name: CACHE_REDIS_HEALTH_CHECK_INTERVAL_SECONDS
              Value: !Ref CacheRedisHealthCheckIntervalSeconds
            - Name: CACHE_REDIS_RETRY_BASE_SECONDS
              Value: !Ref CacheRedisRetryBaseSeconds
            - Name: CACHE_REDIS_RETRY_CAP_SECONDS
              Value: !Ref CacheRedisRetryCapSeconds
            - Name: CACHE_REDIS_RETRY_ATTEMPTS
              Value: !Ref CacheRedisRetryAttempts
            - Name: CACHE_REDIS_DECODE_RESPONSES
              Value: !Ref CacheRedisDecodeResponses
            - Name: CACHE_REDIS_PROTOCOL
              Value: !Ref CacheRedisProtocol
            - Name: CACHE_LOCAL_TTL_SECONDS
              Value: !Ref CacheLocalTtlSeconds
            - Name: CACHE_LOCAL_MAX_ENTRIES
              Value: !Ref CacheLocalMaxEntries
            - Name: CACHE_SHARED_TTL_SECONDS
              Value: !Ref CacheSharedTtlSeconds
            - Name: CACHE_KEY_PREFIX
              Value: !Ref CacheKeyPrefix
            - Name: CACHE_KEY_SCHEMA_VERSION
              Value: !Ref CacheKeySchemaVersion
            - Name: AUTH_JWT_CACHE_MAX_TTL_SECONDS
              Value: !Ref AuthJwtCacheMaxTtlSeconds
            - Name: IDEMPOTENCY_ENABLED
              Value: !Ref IdempotencyEnabled
            - Name: IDEMPOTENCY_TTL_SECONDS
              Value: !Ref IdempotencyTtlSeconds
            - Name: FILE_TRANSFER_PRESIGN_UPLOAD_TTL_SECONDS
              Value: !Ref FileTransferPresignUploadTtlSeconds
            - Name: FILE_TRANSFER_PRESIGN_DOWNLOAD_TTL_SECONDS
              Value: !Ref FileTransferPresignDownloadTtlSeconds
            - Name: FILE_TRANSFER_MULTIPART_THRESHOLD_BYTES
              Value: !Ref FileTransferMultipartThresholdBytes
            - Name: FILE_TRANSFER_PART_SIZE_BYTES
              Value: !Ref FileTransferPartSizeBytes
            - Name: FILE_TRANSFER_MAX_CONCURRENCY
              Value: !Ref FileTransferMaxConcurrency
            - Name: FILE_TRANSFER_USE_ACCELERATE_ENDPOINT
              Value: !Ref FileTransferUseAccelerateEndpoint
            - Name: FILE_TRANSFER_MAX_UPLOAD_BYTES
              Value: !Ref FileTransferMaxUploadBytes
            - Name: JOBS_ENABLED
              Value: !If [EnableFileTransferAsync, "true", "false"]
            - Name: JOBS_QUEUE_BACKEND
              Value: !If [EnableFileTransferAsync, "sqs", "memory"]
            - Name: JOBS_REPOSITORY_BACKEND
              Value: !If [EnableFileTransferAsync, "dynamodb", "memory"]
            - Name: JOBS_RUNTIME_MODE
              Value: "api"
            - !If
              - EnableFileTransferAsync
              - Name: JOBS_SQS_QUEUE_URL
                Value: !Ref JobsQueueUrl
              - !Ref AWS::NoValue
            - !If
              - EnableFileTransferAsync
              - Name: JOBS_DYNAMODB_TABLE
                Value: !Ref JobsTableName
              - !Ref AWS::NoValue
            - Name: ACTIVITY_STORE_BACKEND
              Value: !If [EnableFileTransferAsync, "dynamodb", "memory"]
            - !If
              - EnableFileTransferAsync
              - Name: ACTIVITY_ROLLUPS_TABLE
                Value: !Ref ActivityTableName
              - !Ref AWS::NoValue
            - !If
              - EnableFileTransferWithBucket
              - Name: FILE_TRANSFER_BUCKET
                Value: !Ref FileTransferBucketName
              - !Ref AWS::NoValue
            - !If
              - EnableFileTransferWithBucket
              - Name: FILE_TRANSFER_UPLOAD_PREFIX
                Value: !Ref FileTransferUploadPrefix
              - !Ref AWS::NoValue
            - !If
              - EnableFileTransferWithBucket
              - Name: FILE_TRANSFER_EXPORT_PREFIX
                Value: !Ref FileTransferExportPrefix
              - !Ref AWS::NoValue
            - !If
              - EnableFileTransferWithBucket
              - Name: FILE_TRANSFER_TMP_PREFIX
                Value: !Ref FileTransferTmpPrefix
              - !Ref AWS::NoValue
          Secrets:
            - !If
              - EnableFileTransferCache
              - Name: CACHE_REDIS_URL
                ValueFrom: !Ref CacheRedisUrlSecretArn
              - !Ref AWS::NoValue

          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref "DefaultLogGroup"
              awslogs-region: !Sub "${AWS::Region}"
              awslogs-stream-prefix: !Sub "${Project}-${Application}"
          Ulimits: []
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${DockerRepoName}@${ImageDigest}
          PortMappings:
            - ContainerPort: !Ref DockerHostPort
              HostPort: !Ref DockerHostPort
              Protocol: tcp
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
  ServiceDiscoveryService:
    Condition: UseServiceDiscovery
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name:  !Sub "${Project}-${Application}-${Service}"
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 60
        NamespaceId: !ImportValue
          Fn::Sub: "${AWS::AccountId}:${AWS::Region}:${Project}:${VpcId}:cloudmap:namespace:id"
      HealthCheckCustomConfig:
        FailureThreshold: 1
  ECSService:
    Type: AWS::ECS::Service
    Properties:
      PropagateTags: SERVICE
      PlatformVersion: LATEST
      DesiredCount: !Ref DesiredCount
      DeploymentController:
        Type: ECS
      TaskDefinition: !Ref "TaskDefinition"
      DeploymentConfiguration:
        Strategy: BLUE_GREEN
        BakeTimeInMinutes: !Ref BlueGreenBakeTimeInMinutes
        Alarms: !If
          - HasAnyDeploymentRollbackAlarm
          - AlarmNames:
              - !If
                - HasDeploymentRollbackAlarmNamePrimary
                - !Ref DeploymentRollbackAlarmNamePrimary
                - !Ref AWS::NoValue
              - !If
                - HasDeploymentRollbackAlarmNameSecondary
                - !Ref DeploymentRollbackAlarmNameSecondary
                - !Ref AWS::NoValue
            Enable: true
            Rollback: true
          - !Ref AWS::NoValue
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref SubnetList
          AssignPublicIp: !Ref AssignPublicIp
          SecurityGroups:
            - !Ref ContainerSecurityGroup
      ServiceName: !Sub ${Project}-${Application}-${Service}
      Cluster: !Ref EcsClusterName
      LaunchType: FARGATE
      HealthCheckGracePeriodSeconds: 90
      LoadBalancers:
        - ContainerName: !Ref Service
          ContainerPort: !Ref DockerContainerPort
          TargetGroupArn: !Ref "LoadBalancerTargetGroupBlue"
          AdvancedConfiguration:
            AlternateTargetGroupArn: !Ref LoadBalancerTargetGroupGreen
            ProductionListenerRule: !Ref ListenerRule
            TestListenerRule: !If
              - HasTestTrafficListenerArn
              - !Ref TestTrafficListenerRule
              - !Ref AWS::NoValue
            RoleArn: !Ref EcsInfrastructureRoleArn
      EnableExecuteCommand: true
      ServiceRegistries:
        - !If [UseServiceDiscovery, { RegistryArn: !GetAtt ServiceDiscoveryService.Arn }, !Ref "AWS::NoValue" ]
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Application
          Value: !Ref Application
        - Key: Service
          Value: !Ref Service
        - Key: RuntimeProfile
          Value: !Ref RuntimeProfile
        - Key: ImageUri
          Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${DockerRepoName}@${ImageDigest}

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Project}-${Application}-${Service}-ecs-task-${AWS::Region}"
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Application
          Value: !Ref Application
        - Key: Service
          Value: !Ref Service
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Action:
              - sts:AssumeRole
            Principal:
              Service:
                - ecs-tasks.amazonaws.com

  EcsExecTaskPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${Project}-${Application}-${Service}-ecs-task-exec"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: EcsExecSessionChannels
            Effect: Allow
            Action:
              - ssmmessages:CreateControlChannel
              - ssmmessages:CreateDataChannel
              - ssmmessages:OpenControlChannel
              - ssmmessages:OpenDataChannel
            Resource: "*"
      Roles:
        - !Ref ECSTaskRole

  FileTransferTaskPolicy:
    Condition: EnableFileTransfer
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${Project}-${Application}-${Service}-ecs-task-file-transfer"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: FileTransferS3Objects
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:AbortMultipartUpload
              - s3:ListMultipartUploadParts
            Resource:
              - !Sub "arn:${AWS::Partition}:s3:::${FileTransferBucketName}/${FileTransferUploadPrefix}*"
              - !Sub "arn:${AWS::Partition}:s3:::${FileTransferBucketName}/${FileTransferExportPrefix}*"
              - !Sub "arn:${AWS::Partition}:s3:::${FileTransferBucketName}/${FileTransferTmpPrefix}*"
          - Sid: FileTransferKms
            Effect: Allow
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            # KMS data-plane permissions must target key ARNs (not alias ARNs). If we want alias scoping,
            # we must do it via conditions (kms:ResourceAliases / kms:RequestAlias).
            # Ref: https://docs.aws.amazon.com/kms/latest/developerguide/cmks-in-iam-policies.html
            Resource: !Sub "arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*"
            Condition:
              StringEquals:
                kms:ViaService: !Sub "s3.${AWS::Region}.amazonaws.com"
                kms:CallerAccount: !Ref AWS::AccountId
              ForAnyValue:StringLike:
                kms:ResourceAliases:
                  - !Sub "alias/${FileTransferKmsAlias}"
      Roles:
        - !Ref ECSTaskRole

  FileTransferAsyncTaskPolicy:
    Condition: EnableFileTransferAsync
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${Project}-${Application}-${Service}-ecs-task-file-transfer-async"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: FileTransferJobsQueueWrite
            Effect: Allow
            Action:
              - sqs:GetQueueUrl
              - sqs:GetQueueAttributes
              - sqs:SendMessage
            Resource:
              - !Ref FileTransferJobsQueueArn
          - Sid: FileTransferAsyncDynamoTables
            Effect: Allow
            Action:
              - dynamodb:ConditionCheckItem
              - dynamodb:DeleteItem
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:Query
              - dynamodb:UpdateItem
            Resource:
              - !Ref FileTransferJobsTableArn
              - !Sub "${FileTransferJobsTableArn}/index/*"
              - !Ref FileTransferActivityTableArn
              - !Sub "${FileTransferActivityTableArn}/index/*"
      Roles:
        - !Ref ECSTaskRole


  CPUUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${Project}-${Application}-${Service}-cpu-util
      AlarmDescription: "Alarm if CPU utilization of the service exceeds the threshold"
      Namespace: "AWS/ApplicationELB"
      MetricName: CPUUtilization
      Dimensions:
        - Name: "ClusterName"
          Value: !Ref EcsClusterName
        - Name: "ServiceName"
          Value: !Ref Service
      Statistic: Average
      Period: !Ref Period
      EvaluationPeriods: !Ref EvaluationPeriods
      Threshold: "90"
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !If [Monitor, !Ref AlarmArn, !Ref "AWS::NoValue" ]

