Outputs:
  EcsDnsName:
    Value: !Sub "${ListenerProtocol}://${ServiceDNS}"
    Description: DNS of the ecs service
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${Service}:ecs:dns
  BlueTargetGroupArn:
    Value: !Ref LoadBalancerTargetGroupBlue
    Description: Blue target-group ARN used by ECS service traffic.
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${Service}:ecs:targetgroup:blue:arn
  BlueTargetGroupName:
    Value: !GetAtt LoadBalancerTargetGroupBlue.TargetGroupName
    Description: Blue target-group name resolved for ECS-native blue/green wiring.
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${Service}:ecs:targetgroup:blue:name
  GreenTargetGroupArn:
    Value: !Ref LoadBalancerTargetGroupGreen
    Description: Green target-group ARN used during blue/green deployments.
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${Service}:ecs:targetgroup:green:arn
  GreenTargetGroupName:
    Value: !GetAtt LoadBalancerTargetGroupGreen.TargetGroupName
    Description: Green target-group name resolved for ECS-native blue/green wiring.
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:${Application}:${Service}:ecs:targetgroup:green:name
