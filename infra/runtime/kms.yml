Parameters:
  Project:
    Type: String
    Description: Name of the project
    MinLength: 2
  KmsAlias:
    Type: String
    Description: Alias of the KMS key
    MinLength: 2
Resources:
  KmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "KMS Key for stack ${AWS::StackName}"
      Tags:
        - Key: Project
          Value: !Ref Project
      KeyPolicy:
        Statement:
          - Action: kms:*
            Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Resource: "*"
        Version: "2012-10-17"
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
  Alias:
    Type: "AWS::KMS::Alias"
    Properties:
      AliasName: !Sub alias/${KmsAlias}
      TargetKeyId: !Ref KmsKey
Outputs:
  KmsKeyId:
    Value: !GetAtt KmsKey.KeyId
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:KmsKeyId
  KmsKeyArn:
    Value: !GetAtt KmsKey.Arn
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:KmsKeyArn
  KmsKeyAlias:
    Value: !Sub alias/${KmsAlias}
    Export:
      Name: !Sub ${AWS::AccountId}:${AWS::Region}:${Project}:KmsKeyAlias
