AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  File transfer bucket for direct-to-S3 uploads/downloads (presigned URL + multipart).

Parameters:
  Project:
    Type: String
    Description: Name of the project
    MinLength: 2
  Application:
    Type: String
    Description: Name of the application
    MinLength: 2
  Service:
    Type: String
    Description: Name of the service
    MinLength: 2
  Environment:
    Type: String
    Description: Deployment environment label (dev/prod/etc)
    MinLength: 2

  BucketBaseName:
    Type: String
    Description: >-
      S3 bucket base name (a region/account suffix is appended for uniqueness).
      Must be DNS-compliant and contain only lowercase letters, numbers, and dashes.
    MinLength: 3

  KmsAlias:
    Type: String
    Description: KMS key alias used for default bucket encryption (alias/<KmsAlias>)
    MinLength: 2

  EnableTransferAcceleration:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable S3 Transfer Acceleration on the bucket

  BucketKeyEnabled:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >-
      When using SSE-KMS, enables S3 Bucket Keys to reduce KMS request volume and cost.

  AbortIncompleteMultipartUploadDays:
    Type: Number
    Default: 7
    MinValue: 1
    Description: Days after initiation to abort incomplete multipart uploads

  EnableTmpFilesExpiration:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Enable expiration of tmp files (prefix-scoped)
  TmpPrefix:
    Type: String
    Default: "tmp/"
    Description: Prefix for expiring temporary files
  TmpExpirationDays:
    Type: Number
    Default: 1
    MinValue: 1
    Description: Expiration days for TmpPrefix objects

  CorsAllowedOrigins:
    Type: CommaDelimitedList
    Default: "https://example.invalid"
    Description: >-
      Allowed browser origins (comma-separated). For production, set explicit app origin(s)
      (avoid "*" unless the bucket contents are intentionally public).
  CorsAllowedMethods:
    Type: CommaDelimitedList
    Default: "GET,PUT,POST,HEAD,DELETE"
    Description: Allowed CORS methods (comma-separated)
  CorsAllowedHeaders:
    Type: CommaDelimitedList
    Default: "content-type,x-amz-*"
    Description: >-
      Allowed CORS request headers (comma-separated). Prefer enumerating only what's needed;
      "x-amz-*" enables Amazon-specific headers.
  CorsExposedHeaders:
    Type: CommaDelimitedList
    Default: "ETag"
    Description: Response headers exposed to browsers (comma-separated)
  CorsMaxAgeSeconds:
    Type: Number
    Default: 3000
    MinValue: 0
    Description: Browser cache time for CORS preflight responses

Conditions:
  EnableAcceleration: !Equals [!Ref EnableTransferAcceleration, "true"]
  EnableTmpExpiration: !Equals [!Ref EnableTmpFilesExpiration, "true"]
  EnableBucketKey: !Equals [!Ref BucketKeyEnabled, "true"]

Resources:
  FileTransferBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub ${BucketBaseName}-${AWS::Region}-${AWS::AccountId}
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Application
          Value: !Ref Application
        - Key: Service
          Value: !Ref Service
        - Key: Environment
          Value: !Ref Environment
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: True
        BlockPublicPolicy: True
        IgnorePublicAcls: True
        RestrictPublicBuckets: True
      AccelerateConfiguration:
        AccelerationStatus: !If [EnableAcceleration, Enabled, Suspended]
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: !If [EnableBucketKey, true, false]
            ServerSideEncryptionByDefault:
              SSEAlgorithm: "aws:kms"
              KMSMasterKeyID: !Sub alias/${KmsAlias}
      VersioningConfiguration:
        Status: Enabled
      CorsConfiguration:
        CorsRules:
          - Id: FileTransferCors
            AllowedOrigins: !Ref CorsAllowedOrigins
            AllowedMethods: !Ref CorsAllowedMethods
            AllowedHeaders: !Ref CorsAllowedHeaders
            ExposedHeaders: !Ref CorsExposedHeaders
            MaxAge: !Ref CorsMaxAgeSeconds
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: !Ref AbortIncompleteMultipartUploadDays
          - !If
            - EnableTmpExpiration
            - Id: ExpireTmpFiles
              Status: Enabled
              Prefix: !Ref TmpPrefix
              ExpirationInDays: !Ref TmpExpirationDays
            - !Ref AWS::NoValue

  FileTransferBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FileTransferBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt FileTransferBucket.Arn
              - !Sub "${FileTransferBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: "false"

Outputs:
  BucketName:
    Value: !Ref FileTransferBucket
    Description: Name of the S3 bucket
  BucketArn:
    Value: !GetAtt FileTransferBucket.Arn
    Description: ARN of the S3 bucket
