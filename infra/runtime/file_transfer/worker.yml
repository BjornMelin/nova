AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  File transfer async worker ECS service (SQS consumer) without ALB attachment.

Parameters:
  Project:
    Type: String
    MinLength: 2
  Application:
    Type: String
    MinLength: 2
  Service:
    Type: String
    MinLength: 2
  WorkerServiceName:
    Type: String
    MinLength: 2
  Environment:
    Type: String
    MinLength: 2

  EcsClusterName:
    Type: String
  DockerRepoName:
    Type: String
  DockerImageTag:
    Type: String
    Default: latest

  VpcId:
    Type: String
  SubnetList:
    Type: List<AWS::EC2::Subnet::Id>

  TaskCpu:
    Type: String
    Default: "1024"
  TaskMemory:
    Type: String
    Default: "2048"
  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 0

  WorkerCommand:
    Type: CommaDelimitedList
    Default: "nova-file-worker"

  JobsQueueArn:
    Type: String
  JobsQueueUrl:
    Type: String
    MinLength: 3
    AllowedPattern: "^https://[^/]+/[0-9]{12}/[A-Za-z0-9_-]+(\\.fifo)?$"
    ConstraintDescription: Must be a valid SQS queue URL with account ID and queue name.
  JobsRegion:
    Type: String
  JobsWorkerUpdateTokenSecretArn:
    Type: String
    AllowedPattern: "^arn:[^\\s]+$"
    Description: >-
      Secrets Manager ARN or SSM parameter ARN containing JOBS_WORKER_UPDATE_TOKEN.
    ConstraintDescription: Must be an ARN for a Secrets Manager secret or SSM parameter.
  JobsApiBaseUrl:
    Type: String
  FileTransferBucketName:
    Type: String
  FileTransferUploadPrefix:
    Type: String
    Default: "uploads/"
  FileTransferExportPrefix:
    Type: String
    Default: "exports/"
  FileTransferTmpPrefix:
    Type: String
    Default: "tmp/"
  FileTransferKmsAlias:
    Type: String
  ImportKmsKeyArn:
    Type: String
    Default: ""
  SyncProcessingMaxBytes:
    Type: String
    Default: "209715200"
  JobsSqsMaxNumberOfMessages:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 10
  JobsSqsWaitTimeSeconds:
    Type: Number
    Default: 20
    MinValue: 0
    MaxValue: 20
  JobsSqsVisibilityTimeoutSeconds:
    Type: Number
    Default: 120
    MinValue: 0
    MaxValue: 43200

  WorkerMinTaskCount:
    Type: Number
    Default: 1
    MinValue: 0
  WorkerMaxTaskCount:
    Type: Number
    Default: 20
    MinValue: 1
  WorkerScaleOutQueueDepthTarget:
    Type: Number
    Default: 100
    MinValue: 2
  WorkerScaleOutQueueAgeSecondsTarget:
    Type: Number
    Default: 60
    MinValue: 1
  WorkerScaleInCooldownSeconds:
    Type: Number
    Default: 120
    MinValue: 0
  WorkerScaleOutCooldownSeconds:
    Type: Number
    Default: 60
    MinValue: 0

Conditions:
  HasImportKmsKeyArn: !Not [!Equals [!Ref ImportKmsKeyArn, ""]]

Resources:
  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    UpdateReplacePolicy: Delete
    DeletionPolicy: Delete
    Properties:
      LogGroupName: !Sub "${Project}-${Application}/${WorkerServiceName}/ecs"
      RetentionInDays: 30
      KmsKeyId: !If
        - HasImportKmsKeyArn
        - Fn::ImportValue: !Ref ImportKmsKeyArn
        - !Ref AWS::NoValue

  WorkerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "security group for ${Project}-${Application}-${WorkerServiceName}"
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          Description: HTTPS egress for AWS APIs and configured upstream runtime endpoints.
          CidrIp: 0.0.0.0/0

  WorkerTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  WorkerTaskExecutionRoleSecretsPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${Project}-${Application}-${WorkerServiceName}-ecs-execution-secrets"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ReadWorkerUpdateTokenSecret
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - ssm:GetParameters
            Resource: !Ref JobsWorkerUpdateTokenSecretArn
          - Sid: DecryptWorkerUpdateTokenSecret
            Effect: Allow
            Action:
              - kms:Decrypt
            Resource: "*"
            Condition:
              StringEquals:
                kms:CallerAccount: !Ref AWS::AccountId
              ForAnyValue:StringEquals:
                kms:ViaService:
                  - !Sub "secretsmanager.${AWS::Region}.amazonaws.com"
                  - !Sub "ssm.${AWS::Region}.amazonaws.com"
      Roles:
        - !Ref WorkerTaskExecutionRole

  WorkerTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action:
              - sts:AssumeRole

  WorkerTaskPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${Project}-${Application}-${WorkerServiceName}-ecs-task-policy"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: JobsQueueConsume
            Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:ChangeMessageVisibility
              - sqs:GetQueueAttributes
            Resource:
              - !Ref JobsQueueArn
          - Sid: FileTransferS3Objects
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:AbortMultipartUpload
              - s3:ListMultipartUploadParts
            Resource:
              - !Sub "arn:${AWS::Partition}:s3:::${FileTransferBucketName}/${FileTransferUploadPrefix}*"
              - !Sub "arn:${AWS::Partition}:s3:::${FileTransferBucketName}/${FileTransferExportPrefix}*"
              - !Sub "arn:${AWS::Partition}:s3:::${FileTransferBucketName}/${FileTransferTmpPrefix}*"
          - Sid: FileTransferKms
            Effect: Allow
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: !Sub "arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*"
            Condition:
              StringEquals:
                kms:ViaService: !Sub "s3.${AWS::Region}.amazonaws.com"
                kms:CallerAccount: !Ref AWS::AccountId
              StringLike:
                kms:EncryptionContext:aws:s3:arn:
                  - !Sub "arn:${AWS::Partition}:s3:::${FileTransferBucketName}/${FileTransferUploadPrefix}*"
                  - !Sub "arn:${AWS::Partition}:s3:::${FileTransferBucketName}/${FileTransferExportPrefix}*"
                  - !Sub "arn:${AWS::Partition}:s3:::${FileTransferBucketName}/${FileTransferTmpPrefix}*"
              ForAnyValue:StringLike:
                kms:ResourceAliases:
                  - !Sub "alias/${FileTransferKmsAlias}"
      Roles:
        - !Ref WorkerTaskRole

  WorkerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !GetAtt WorkerTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt WorkerTaskRole.Arn
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      ContainerDefinitions:
        - Name: !Ref WorkerServiceName
          Essential: true
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${DockerRepoName}:${DockerImageTag}"
          Command: !Ref WorkerCommand
          Environment:
            - Name: ENV
              Value: !Ref Environment
            - Name: AWS_DEFAULT_REGION
              Value: !Ref JobsRegion
            - Name: JOBS_RUNTIME_MODE
              Value: worker
            - Name: JOBS_API_BASE_URL
              Value: !Ref JobsApiBaseUrl
            - Name: JOBS_ENABLED
              Value: "true"
            - Name: JOBS_QUEUE_BACKEND
              Value: sqs
            - Name: JOBS_SQS_QUEUE_URL
              Value: !Ref JobsQueueUrl
            - Name: JOBS_SQS_MAX_NUMBER_OF_MESSAGES
              Value: !Ref JobsSqsMaxNumberOfMessages
            - Name: JOBS_SQS_WAIT_TIME_SECONDS
              Value: !Ref JobsSqsWaitTimeSeconds
            - Name: JOBS_SQS_VISIBILITY_TIMEOUT_SECONDS
              Value: !Ref JobsSqsVisibilityTimeoutSeconds
            - Name: IDEMPOTENCY_ENABLED
              Value: "false"
            - Name: IDEMPOTENCY_MODE
              Value: local_only
            - Name: FILE_TRANSFER_BUCKET
              Value: !Ref FileTransferBucketName
            - Name: FILE_TRANSFER_UPLOAD_PREFIX
              Value: !Ref FileTransferUploadPrefix
            - Name: FILE_TRANSFER_EXPORT_PREFIX
              Value: !Ref FileTransferExportPrefix
            - Name: FILE_TRANSFER_TMP_PREFIX
              Value: !Ref FileTransferTmpPrefix
            - Name: APP_SYNC_PROCESSING_MAX_BYTES
              Value: !Ref SyncProcessingMaxBytes
          Secrets:
            - Name: JOBS_WORKER_UPDATE_TOKEN
              ValueFrom: !Ref JobsWorkerUpdateTokenSecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref WorkerLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: !Sub "${Project}-${Application}"

  WorkerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${Project}-${Application}-${WorkerServiceName}"
      Cluster: !Ref EcsClusterName
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      TaskDefinition: !Ref WorkerTaskDefinition
      EnableExecuteCommand: true
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 0
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref SubnetList
          SecurityGroups:
            - !Ref WorkerSecurityGroup
      PropagateTags: SERVICE
      PlatformVersion: LATEST
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Application
          Value: !Ref Application
        - Key: Service
          Value: !Ref Service
        - Key: WorkerService
          Value: !Ref WorkerServiceName

  WorkerScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn:
      - WorkerService
    Properties:
      ServiceNamespace: ecs
      ScalableDimension: ecs:service:DesiredCount
      ResourceId: !Sub "service/${EcsClusterName}/${Project}-${Application}-${WorkerServiceName}"
      MinCapacity: !Ref WorkerMinTaskCount
      MaxCapacity: !Ref WorkerMaxTaskCount

  WorkerQueueBootstrapScaleOutPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${Project}-${Application}-${WorkerServiceName}-queue-bootstrap"
      PolicyType: StepScaling
      ScalingTargetId: !Ref WorkerScalableTarget
      StepScalingPolicyConfiguration:
        AdjustmentType: ChangeInCapacity
        Cooldown: !Ref WorkerScaleOutCooldownSeconds
        MetricAggregationType: Maximum
        StepAdjustments:
          - MetricIntervalLowerBound: 0
            ScalingAdjustment: 1

  WorkerQueueBurstScaleOutPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${Project}-${Application}-${WorkerServiceName}-queue-burst"
      PolicyType: StepScaling
      ScalingTargetId: !Ref WorkerScalableTarget
      StepScalingPolicyConfiguration:
        AdjustmentType: ChangeInCapacity
        Cooldown: !Ref WorkerScaleOutCooldownSeconds
        MetricAggregationType: Maximum
        StepAdjustments:
          - MetricIntervalLowerBound: 0
            ScalingAdjustment: 1

  WorkerQueueSurgeScaleOutPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${Project}-${Application}-${WorkerServiceName}-queue-surge"
      PolicyType: StepScaling
      ScalingTargetId: !Ref WorkerScalableTarget
      StepScalingPolicyConfiguration:
        AdjustmentType: ChangeInCapacity
        Cooldown: !Ref WorkerScaleOutCooldownSeconds
        MetricAggregationType: Maximum
        StepAdjustments:
          - MetricIntervalLowerBound: 0
            ScalingAdjustment: 5

  WorkerQueueScaleInPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${Project}-${Application}-${WorkerServiceName}-queue-empty"
      PolicyType: StepScaling
      ScalingTargetId: !Ref WorkerScalableTarget
      StepScalingPolicyConfiguration:
        AdjustmentType: ChangeInCapacity
        Cooldown: !Ref WorkerScaleInCooldownSeconds
        MetricAggregationType: Maximum
        StepAdjustments:
          - MetricIntervalUpperBound: 0
            ScalingAdjustment: -1

  WorkerQueueBootstrapDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "Scale ${WorkerServiceName} from zero when queue depth is non-zero."
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !Select [4, !Split ["/", !Ref JobsQueueUrl]]
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref WorkerQueueBootstrapScaleOutPolicy

  WorkerQueueBurstDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "Scale ${WorkerServiceName} out when backlog reaches the burst queue-depth threshold."
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !Select [4, !Split ["/", !Ref JobsQueueUrl]]
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: !Ref WorkerScaleOutQueueDepthTarget
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref WorkerQueueBurstScaleOutPolicy

  WorkerQueueSurgeDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "Scale ${WorkerServiceName} aggressively when queue depth indicates surge load."
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !Select [4, !Split ["/", !Ref JobsQueueUrl]]
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 500
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref WorkerQueueSurgeScaleOutPolicy

  WorkerQueueScaleInAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "Scale ${WorkerServiceName} in after the queue has remained empty for the sustained scale-in window."
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !Select [4, !Split ["/", !Ref JobsQueueUrl]]
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 5
      DatapointsToAlarm: 5
      Threshold: 0
      ComparisonOperator: LessThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref WorkerQueueScaleInPolicy

  WorkerQueueAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "Alert when ${WorkerServiceName} oldest queue message age exceeds the configured threshold."
      Namespace: AWS/SQS
      MetricName: ApproximateAgeOfOldestMessage
      Dimensions:
        - Name: QueueName
          Value: !Select [4, !Split ["/", !Ref JobsQueueUrl]]
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 3
      DatapointsToAlarm: 3
      Threshold: !Ref WorkerScaleOutQueueAgeSecondsTarget
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

Outputs:
  WorkerServiceName:
    Value: !Ref WorkerService
  WorkerTaskDefinitionArn:
    Value: !Ref WorkerTaskDefinition
  WorkerTaskRoleArn:
    Value: !GetAtt WorkerTaskRole.Arn
