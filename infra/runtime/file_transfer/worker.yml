AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  File transfer async worker ECS service (SQS consumer) without ALB attachment.

Parameters:
  Project:
    Type: String
    MinLength: 2
  Application:
    Type: String
    MinLength: 2
  Service:
    Type: String
    MinLength: 2
  WorkerServiceName:
    Type: String
    MinLength: 2
  Environment:
    Type: String
    MinLength: 2

  EcsClusterName:
    Type: String
  DockerRepoName:
    Type: String
  ImageDigest:
    Type: String
    AllowedPattern: "^sha256:[A-Fa-f0-9]{64}$"
    Description: OCI image digest for the worker workload image.

  VpcId:
    Type: String
  SubnetList:
    Type: List<AWS::EC2::Subnet::Id>

  TaskCpu:
    Type: String
    Default: "1024"
  TaskMemory:
    Type: String
    Default: "2048"
  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 0

  JobsQueueArn:
    Type: String
  JobsQueueUrl:
    Type: String
    MinLength: 3
    AllowedPattern: "^https://[^/]+/[0-9]{12}/[A-Za-z0-9_-]+(\\.fifo)?$"
    ConstraintDescription: Must be a valid SQS queue URL with account ID and queue name.
  JobsTableName:
    Type: String
    MinLength: 3
  JobsTableArn:
    Type: String
    AllowedPattern: "^arn:(aws|aws-us-gov|aws-cn):dynamodb:[a-z0-9-]+:[0-9]{12}:table\\/[A-Za-z0-9_.-]+$"
  ActivityTableName:
    Type: String
    MinLength: 3
  ActivityTableArn:
    Type: String
    AllowedPattern: "^arn:(aws|aws-us-gov|aws-cn):dynamodb:[a-z0-9-]+:[0-9]{12}:table\\/[A-Za-z0-9_.-]+$"
  JobsVisibilityTimeoutSeconds:
    Type: Number
    Default: 120
    MinValue: 1
    MaxValue: 43200
  FileTransferBucketName:
    Type: String
  FileTransferUploadPrefix:
    Type: String
    Default: "uploads/"
  FileTransferExportPrefix:
    Type: String
    Default: "exports/"
  FileTransferTmpPrefix:
    Type: String
    Default: "tmp/"
  FileTransferKmsAlias:
    Type: String
  ImportKmsKeyArn:
    Type: String
    Default: ""
  WorkerMinTaskCount:
    Type: Number
    Default: 1
    MinValue: 0
  WorkerMaxTaskCount:
    Type: Number
    Default: 20
    MinValue: 1
  WorkerScaleOutQueueDepthTarget:
    Type: Number
    Default: 10
    MinValue: 1
  WorkerScaleOutQueueAgeSecondsTarget:
    Type: Number
    Default: 60
    MinValue: 1
  WorkerScaleInCooldownSeconds:
    Type: Number
    Default: 120
    MinValue: 0
  WorkerScaleOutCooldownSeconds:
    Type: Number
    Default: 60
    MinValue: 0

Conditions:
  HasImportKmsKeyArn: !Not [!Equals [!Ref ImportKmsKeyArn, ""]]

Resources:
  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    UpdateReplacePolicy: Delete
    DeletionPolicy: Delete
    Properties:
      LogGroupName: !Sub "${Project}-${Application}/${WorkerServiceName}/ecs"
      RetentionInDays: 30
      KmsKeyId: !If
        - HasImportKmsKeyArn
        - Fn::ImportValue: !Ref ImportKmsKeyArn
        - !Ref AWS::NoValue

  WorkerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "security group for ${Project}-${Application}-${WorkerServiceName}"
      VpcId: !Ref VpcId

  WorkerTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  WorkerTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action:
              - sts:AssumeRole

  WorkerEcsExecTaskPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${Project}-${Application}-${WorkerServiceName}-ecs-task-exec"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: EcsExecSessionChannels
            Effect: Allow
            Action:
              - ssmmessages:CreateControlChannel
              - ssmmessages:CreateDataChannel
              - ssmmessages:OpenControlChannel
              - ssmmessages:OpenDataChannel
            Resource: "*"
      Roles:
        - !Ref WorkerTaskRole

  WorkerTaskPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${Project}-${Application}-${WorkerServiceName}-ecs-task-policy"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: JobsQueueConsume
            Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:ChangeMessageVisibility
              - sqs:GetQueueAttributes
              - sqs:GetQueueUrl
            Resource:
              - !Ref JobsQueueArn
          - Sid: WorkerDirectPersistenceDynamoTables
            Effect: Allow
            Action:
              - dynamodb:ConditionCheckItem
              - dynamodb:DeleteItem
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:Query
              - dynamodb:UpdateItem
            Resource:
              - !Ref JobsTableArn
              - !Sub "${JobsTableArn}/index/*"
              - !Ref ActivityTableArn
              - !Sub "${ActivityTableArn}/index/*"
          - Sid: FileTransferS3Objects
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:AbortMultipartUpload
              - s3:ListMultipartUploadParts
            Resource:
              - !Sub "arn:${AWS::Partition}:s3:::${FileTransferBucketName}/${FileTransferUploadPrefix}*"
              - !Sub "arn:${AWS::Partition}:s3:::${FileTransferBucketName}/${FileTransferExportPrefix}*"
              - !Sub "arn:${AWS::Partition}:s3:::${FileTransferBucketName}/${FileTransferTmpPrefix}*"
          - Sid: FileTransferKms
            Effect: Allow
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: !Sub "arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*"
            Condition:
              StringEquals:
                kms:ViaService: !Sub "s3.${AWS::Region}.amazonaws.com"
                kms:CallerAccount: !Ref AWS::AccountId
              ForAnyValue:StringLike:
                kms:ResourceAliases:
                  - !Sub "alias/${FileTransferKmsAlias}"
      Roles:
        - !Ref WorkerTaskRole

  WorkerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !GetAtt WorkerTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt WorkerTaskRole.Arn
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      ContainerDefinitions:
        - Name: !Ref WorkerServiceName
          Essential: true
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${DockerRepoName}@${ImageDigest}"
          Command:
            - "nova-file-worker"
          Environment:
            - Name: ENVIRONMENT
              Value: !Ref Environment
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
            - Name: JOBS_ENABLED
              Value: "true"
            - Name: JOBS_RUNTIME_MODE
              Value: "worker"
            - Name: JOBS_QUEUE_BACKEND
              Value: "sqs"
            - Name: JOBS_SQS_QUEUE_URL
              Value: !Ref JobsQueueUrl
            - Name: JOBS_REPOSITORY_BACKEND
              Value: "dynamodb"
            - Name: JOBS_DYNAMODB_TABLE
              Value: !Ref JobsTableName
            - Name: ACTIVITY_STORE_BACKEND
              Value: "dynamodb"
            - Name: ACTIVITY_ROLLUPS_TABLE
              Value: !Ref ActivityTableName
            - Name: JOBS_SQS_VISIBILITY_TIMEOUT_SECONDS
              Value: !Ref JobsVisibilityTimeoutSeconds
            - Name: FILE_TRANSFER_BUCKET
              Value: !Ref FileTransferBucketName
            - Name: FILE_TRANSFER_UPLOAD_PREFIX
              Value: !Ref FileTransferUploadPrefix
            - Name: FILE_TRANSFER_EXPORT_PREFIX
              Value: !Ref FileTransferExportPrefix
            - Name: FILE_TRANSFER_TMP_PREFIX
              Value: !Ref FileTransferTmpPrefix
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref WorkerLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: !Sub "${Project}-${Application}"

  WorkerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${Project}-${Application}-${WorkerServiceName}"
      Cluster: !Ref EcsClusterName
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      TaskDefinition: !Ref WorkerTaskDefinition
      EnableExecuteCommand: true
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 0
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref SubnetList
          SecurityGroups:
            - !Ref WorkerSecurityGroup
      PropagateTags: SERVICE
      PlatformVersion: LATEST
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Application
          Value: !Ref Application
        - Key: Service
          Value: !Ref Service
        - Key: WorkerService
          Value: !Ref WorkerServiceName

  WorkerScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn:
      - WorkerService
    Properties:
      ServiceNamespace: ecs
      ScalableDimension: ecs:service:DesiredCount
      ResourceId: !Sub "service/${EcsClusterName}/${Project}-${Application}-${WorkerServiceName}"
      MinCapacity: !Ref WorkerMinTaskCount
      MaxCapacity: !Ref WorkerMaxTaskCount

  WorkerQueueDepthTargetTrackingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${Project}-${Application}-${WorkerServiceName}-queue-depth-target"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref WorkerScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: !Ref WorkerScaleOutQueueDepthTarget
        ScaleInCooldown: !Ref WorkerScaleInCooldownSeconds
        ScaleOutCooldown: !Ref WorkerScaleOutCooldownSeconds
        CustomizedMetricSpecification:
          Namespace: AWS/SQS
          MetricName: ApproximateNumberOfMessagesVisible
          Statistic: Average
          Dimensions:
            - Name: QueueName
              Value: !Select [4, !Split ["/", !Ref JobsQueueUrl]]

  WorkerQueueAgeTargetTrackingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${Project}-${Application}-${WorkerServiceName}-queue-age-target"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref WorkerScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: !Ref WorkerScaleOutQueueAgeSecondsTarget
        ScaleInCooldown: !Ref WorkerScaleInCooldownSeconds
        ScaleOutCooldown: !Ref WorkerScaleOutCooldownSeconds
        CustomizedMetricSpecification:
          Namespace: AWS/SQS
          MetricName: ApproximateAgeOfOldestMessage
          Statistic: Average
          Dimensions:
            - Name: QueueName
              Value: !Select [4, !Split ["/", !Ref JobsQueueUrl]]

Outputs:
  WorkerServiceName:
    Value: !Ref WorkerService
  WorkerTaskDefinitionArn:
    Value: !Ref WorkerTaskDefinition
  WorkerTaskRoleArn:
    Value: !GetAtt WorkerTaskRole.Arn
