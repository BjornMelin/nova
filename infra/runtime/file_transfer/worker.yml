AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  File transfer async worker ECS service (SQS consumer) without ALB attachment.

Parameters:
  Project:
    Type: String
    MinLength: 2
  Application:
    Type: String
    MinLength: 2
  Service:
    Type: String
    MinLength: 2
  WorkerServiceName:
    Type: String
    MinLength: 2
  Environment:
    Type: String
    MinLength: 2

  EcsClusterName:
    Type: String
  DockerRepoName:
    Type: String
  DockerImageTag:
    Type: String
    Default: latest

  VpcId:
    Type: String
  SubnetList:
    Type: List<AWS::EC2::Subnet::Id>

  TaskCpu:
    Type: String
    Default: "1024"
  TaskMemory:
    Type: String
    Default: "2048"
  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 0

  WorkerCommand:
    Type: CommaDelimitedList
    Default: "python,src/worker.py"

  JobsQueueArn:
    Type: String
  JobsQueueUrl:
    Type: String
  JobsQueueName:
    Type: String
    MinLength: 3
  JobsRegion:
    Type: String
  FileTransferApiBaseUrl:
    Type: String
  FileTransferBucketName:
    Type: String
  FileTransferUploadPrefix:
    Type: String
    Default: "uploads/"
  FileTransferExportPrefix:
    Type: String
    Default: "exports/"
  FileTransferTmpPrefix:
    Type: String
    Default: "tmp/"
  FileTransferKmsAlias:
    Type: String
  ImportKmsKeyArn:
    Type: String
    Default: ""
  SyncProcessingMaxBytes:
    Type: String
    Default: "209715200"

  WorkerMinTaskCount:
    Type: Number
    Default: 1
    MinValue: 0
  WorkerMaxTaskCount:
    Type: Number
    Default: 20
    MinValue: 1
  WorkerScaleOutQueueDepthTarget:
    Type: Number
    Default: 10
    MinValue: 1
  WorkerScaleOutQueueAgeSecondsTarget:
    Type: Number
    Default: 60
    MinValue: 1
  WorkerScaleInCooldownSeconds:
    Type: Number
    Default: 120
    MinValue: 0
  WorkerScaleOutCooldownSeconds:
    Type: Number
    Default: 60
    MinValue: 0

Conditions:
  HasImportKmsKeyArn: !Not [!Equals [!Ref ImportKmsKeyArn, ""]]

Resources:
  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    UpdateReplacePolicy: Delete
    DeletionPolicy: Delete
    Properties:
      LogGroupName: !Sub "${Project}-${Application}/${WorkerServiceName}/ecs"
      RetentionInDays: 30
      KmsKeyId: !If
        - HasImportKmsKeyArn
        - Fn::ImportValue: !Ref ImportKmsKeyArn
        - !Ref AWS::NoValue

  WorkerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "security group for ${Project}-${Application}-${WorkerServiceName}"
      VpcId: !Ref VpcId

  WorkerTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  WorkerTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action:
              - sts:AssumeRole

  WorkerTaskPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${Project}-${Application}-${WorkerServiceName}-ecs-task-policy"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: JobsQueueConsume
            Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:ChangeMessageVisibility
              - sqs:GetQueueAttributes
              - sqs:GetQueueUrl
            Resource:
              - !Ref JobsQueueArn
          - Sid: FileTransferS3Objects
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:AbortMultipartUpload
              - s3:ListMultipartUploadParts
              - s3:CreateMultipartUpload
              - s3:UploadPart
              - s3:CompleteMultipartUpload
            Resource:
              - !Sub "arn:${AWS::Partition}:s3:::${FileTransferBucketName}/${FileTransferUploadPrefix}*"
              - !Sub "arn:${AWS::Partition}:s3:::${FileTransferBucketName}/${FileTransferExportPrefix}*"
              - !Sub "arn:${AWS::Partition}:s3:::${FileTransferBucketName}/${FileTransferTmpPrefix}*"
          - Sid: FileTransferKms
            Effect: Allow
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: !Sub "arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*"
            Condition:
              StringEquals:
                kms:ViaService: !Sub "s3.${AWS::Region}.amazonaws.com"
                kms:CallerAccount: !Ref AWS::AccountId
              ForAnyValue:StringLike:
                kms:ResourceAliases:
                  - !Sub "alias/${FileTransferKmsAlias}"
      Roles:
        - !Ref WorkerTaskRole

  WorkerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !GetAtt WorkerTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt WorkerTaskRole.Arn
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      ContainerDefinitions:
        - Name: !Ref WorkerServiceName
          Essential: true
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${DockerRepoName}:${DockerImageTag}"
          Command: !Ref WorkerCommand
          Environment:
            - Name: ENV
              Value: !Ref Environment
            - Name: AWS_DEFAULT_REGION
              Value: !Ref JobsRegion
            - Name: FILE_TRANSFER_API_BASE_URL
              Value: !Ref FileTransferApiBaseUrl
            - Name: FILE_TRANSFER_JOBS_QUEUE_URL
              Value: !Ref JobsQueueUrl
            - Name: FILE_TRANSFER_JOBS_REGION
              Value: !Ref JobsRegion
            - Name: FILE_TRANSFER_BUCKET
              Value: !Ref FileTransferBucketName
            - Name: FILE_TRANSFER_UPLOAD_PREFIX
              Value: !Ref FileTransferUploadPrefix
            - Name: FILE_TRANSFER_EXPORT_PREFIX
              Value: !Ref FileTransferExportPrefix
            - Name: FILE_TRANSFER_TMP_PREFIX
              Value: !Ref FileTransferTmpPrefix
            - Name: APP_SYNC_PROCESSING_MAX_BYTES
              Value: !Ref SyncProcessingMaxBytes
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref WorkerLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: !Sub "${Project}-${Application}"

  WorkerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${Project}-${Application}-${WorkerServiceName}"
      Cluster: !Ref EcsClusterName
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      TaskDefinition: !Ref WorkerTaskDefinition
      EnableExecuteCommand: true
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 0
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref SubnetList
          SecurityGroups:
            - !Ref WorkerSecurityGroup
      PropagateTags: SERVICE
      PlatformVersion: LATEST
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Application
          Value: !Ref Application
        - Key: Service
          Value: !Ref Service
        - Key: WorkerService
          Value: !Ref WorkerServiceName

  WorkerScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      ServiceNamespace: ecs
      ScalableDimension: ecs:service:DesiredCount
      ResourceId: !Sub "service/${EcsClusterName}/${Project}-${Application}-${WorkerServiceName}"
      MinCapacity: !Ref WorkerMinTaskCount
      MaxCapacity: !Ref WorkerMaxTaskCount

  WorkerQueueDepthTargetTrackingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref WorkerScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: !Ref WorkerScaleOutQueueDepthTarget
        ScaleInCooldown: !Ref WorkerScaleInCooldownSeconds
        ScaleOutCooldown: !Ref WorkerScaleOutCooldownSeconds
        CustomizedMetricSpecification:
          Namespace: AWS/SQS
          MetricName: ApproximateNumberOfMessagesVisible
          Statistic: Average
          Dimensions:
            - Name: QueueName
              Value: !Ref JobsQueueName

  WorkerQueueAgeTargetTrackingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref WorkerScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: !Ref WorkerScaleOutQueueAgeSecondsTarget
        ScaleInCooldown: !Ref WorkerScaleInCooldownSeconds
        ScaleOutCooldown: !Ref WorkerScaleOutCooldownSeconds
        CustomizedMetricSpecification:
          Namespace: AWS/SQS
          MetricName: ApproximateAgeOfOldestMessage
          Statistic: Average
          Dimensions:
            - Name: QueueName
              Value: !Ref JobsQueueName

Outputs:
  WorkerServiceName:
    Value: !Ref WorkerService
  WorkerTaskDefinitionArn:
    Value: !Ref WorkerTaskDefinition
  WorkerTaskRoleArn:
    Value: !GetAtt WorkerTaskRole.Arn
