AWSTemplateFormatVersion: "2010-09-09"
Description: Nova CI/CD IAM roles for hybrid GitHub + AWS promotion.

Parameters:
  Project:
    Type: String
  Application:
    Type: String
  RepositoryOwner:
    Type: String
  RepositoryName:
    Type: String
  MainBranchName:
    Type: String
    Default: main
  FoundationStackName:
    Type: String
    Default: ""
    Description: Optional stack name for importing shared CI/CD foundation outputs.
  GitHubOidcProviderArn:
    Type: String
  ReleaseSigningSecretArn:
    Type: String
  ArtifactBucketName:
    Type: String
    Default: ""
    Description: Optional explicit artifact bucket. If empty, imported from foundation.
  CodeArtifactDomainName:
    Type: String
    Default: ""
    Description: Optional explicit CodeArtifact domain. If empty, imported from foundation.
  CodeArtifactRepositoryName:
    Type: String
    Default: ""
    Description: Optional explicit CodeArtifact repository. If empty, imported from foundation.
  CodeArtifactPromotionSourceRepositoryName:
    Type: String
    MinLength: 1
    Description: CodeArtifact source repository for staged package promotion.
  CodeArtifactPromotionDestinationRepositoryName:
    Type: String
    MinLength: 1
    Description: CodeArtifact destination repository for prod package promotion.
  EcrRepositoryArn:
    Type: String
    Default: ""
    AllowedPattern: "^$|^arn:(aws|aws-us-gov|aws-cn):ecr:[a-z0-9-]+:[0-9]{12}:repository\\/[A-Za-z0-9._\\/-]+$"
    ConstraintDescription: Must be empty or a valid ECR repository ARN.
  ExistingConnectionArn:
    Type: String
    Default: ""
  ManualApprovalTopicArn:
    Type: String
    Default: ""
  ReleaseValidationTrustedPrincipalArn:
    Type: String
    Default: ""
    AllowedPattern: "^$|^arn:(aws|aws-us-gov|aws-cn):iam::[0-9]{12}:(role\\/[A-Za-z0-9+=,.@_\\/-]+|user\\/[A-Za-z0-9+=,.@_\\/-]+|root)$"
    ConstraintDescription: Must be empty or a valid IAM principal ARN (role, user, or root).
    Description: IAM principal ARN allowed to assume the release validation
      read role. Leave blank to skip creating the role.

Conditions:
  HasFoundationStackName: !Not [!Equals [!Ref FoundationStackName, ""]]
  HasArtifactBucketName: !Not [!Equals [!Ref ArtifactBucketName, ""]]
  HasCodeArtifactDomainName: !Not [!Equals [!Ref CodeArtifactDomainName, ""]]
  HasCodeArtifactRepositoryName: !Not [!Equals [!Ref CodeArtifactRepositoryName, ""]]
  HasEcrRepositoryArn: !Not [!Equals [!Ref EcrRepositoryArn, ""]]
  HasExistingConnectionArn: !Not [!Equals [!Ref ExistingConnectionArn, ""]]
  HasManualApprovalTopicArn: !Not [!Equals [!Ref ManualApprovalTopicArn, ""]]
  HasResolvedManualApprovalTopicArn: !Or
    - !Condition HasManualApprovalTopicArn
    - !Condition HasFoundationStackName
  HasReleaseValidationTrustedPrincipalArn: !Not [!Equals [!Ref ReleaseValidationTrustedPrincipalArn, ""]]

Rules:
  RequireArtifactBucketInput:
    Assertions:
      - Assert: !Or
          - !Not [!Equals [!Ref ArtifactBucketName, ""]]
          - !Not [!Equals [!Ref FoundationStackName, ""]]
        AssertDescription: Provide ArtifactBucketName or FoundationStackName.
  RequireCodeArtifactDomainInput:
    Assertions:
      - Assert: !Or
          - !Not [!Equals [!Ref CodeArtifactDomainName, ""]]
          - !Not [!Equals [!Ref FoundationStackName, ""]]
        AssertDescription: Provide CodeArtifactDomainName or FoundationStackName.
  RequireCodeArtifactRepositoryInput:
    Assertions:
      - Assert: !Or
          - !Not [!Equals [!Ref CodeArtifactRepositoryName, ""]]
          - !Not [!Equals [!Ref FoundationStackName, ""]]
        AssertDescription: Provide CodeArtifactRepositoryName or FoundationStackName.
  RequireDistinctCodeArtifactPromotionRepositories:
    Assertions:
      - Assert: !Not
          - !Equals
              - !Ref CodeArtifactPromotionSourceRepositoryName
              - !Ref CodeArtifactPromotionDestinationRepositoryName
        AssertDescription: Promotion source and destination repositories must differ.
  RequireEcrRepositoryArnInput:
    Assertions:
      - Assert: !Or
          - !Not [!Equals [!Ref EcrRepositoryArn, ""]]
          - !Not [!Equals [!Ref FoundationStackName, ""]]
        AssertDescription: Provide EcrRepositoryArn or FoundationStackName.

Resources:
  GitHubOIDCReleaseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${Project}-${Application}-github-oidc-release-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  - !Sub "repo:${RepositoryOwner}/${RepositoryName}:ref:refs/heads/${MainBranchName}"
      ManagedPolicyArns:
        - !Ref GitHubOIDCReleaseManagedPolicy

  GitHubOIDCReleaseManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${Project}-${Application}-github-oidc-release-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !Ref ReleaseSigningSecretArn
          - Effect: Allow
            Action:
              - codepipeline:StartPipelineExecution
              - codepipeline:GetPipelineState
              - codepipeline:ListPipelineExecutions
              - codepipeline:GetPipelineExecution
              - codepipeline:PutApprovalResult
            Resource:
              - !Sub "arn:${AWS::Partition}:codepipeline:${AWS::Region}:${AWS::AccountId}:${Project}-${Application}-*"
          - Effect: Allow
            Action:
              - codeartifact:GetAuthorizationToken
            Resource:
              - !Sub
                - "arn:${AWS::Partition}:codeartifact:${AWS::Region}:${AWS::AccountId}:domain/${ResolvedCodeArtifactDomainName}"
                - ResolvedCodeArtifactDomainName: !If
                    - HasCodeArtifactDomainName
                    - !Ref CodeArtifactDomainName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactDomainName"
          - Effect: Allow
            Action:
              - codeartifact:GetRepositoryEndpoint
            Resource:
              - !Sub
                - "arn:${AWS::Partition}:codeartifact:${AWS::Region}:${AWS::AccountId}:repository/${ResolvedCodeArtifactDomainName}/${ResolvedCodeArtifactRepositoryName}"
                - ResolvedCodeArtifactDomainName: !If
                    - HasCodeArtifactDomainName
                    - !Ref CodeArtifactDomainName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactDomainName"
                  ResolvedCodeArtifactRepositoryName: !If
                    - HasCodeArtifactRepositoryName
                    - !Ref CodeArtifactRepositoryName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactRepositoryName"
          - Effect: Allow
            Action:
              - codeartifact:PublishPackageVersion
              - codeartifact:PutPackageMetadata
              - codeartifact:DescribePackageVersion
            Resource:
              - !Sub
                - "arn:${AWS::Partition}:codeartifact:${AWS::Region}:${AWS::AccountId}:package/${ResolvedCodeArtifactDomainName}/${ResolvedCodeArtifactRepositoryName}/pypi/*"
                - ResolvedCodeArtifactDomainName: !If
                    - HasCodeArtifactDomainName
                    - !Ref CodeArtifactDomainName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactDomainName"
                  ResolvedCodeArtifactRepositoryName: !If
                    - HasCodeArtifactRepositoryName
                    - !Ref CodeArtifactRepositoryName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactRepositoryName"
              - !Sub
                - "arn:${AWS::Partition}:codeartifact:${AWS::Region}:${AWS::AccountId}:package/${ResolvedCodeArtifactDomainName}/${ResolvedCodeArtifactRepositoryName}/npm/nova/*"
                - ResolvedCodeArtifactDomainName: !If
                    - HasCodeArtifactDomainName
                    - !Ref CodeArtifactDomainName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactDomainName"
                  ResolvedCodeArtifactRepositoryName: !If
                    - HasCodeArtifactRepositoryName
                    - !Ref CodeArtifactRepositoryName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactRepositoryName"
          - Effect: Allow
            Action:
              - codeartifact:ReadFromRepository
            Resource:
              - !Sub
                - "arn:${AWS::Partition}:codeartifact:${AWS::Region}:${AWS::AccountId}:repository/${ResolvedCodeArtifactDomainName}/${PromotionSourceRepositoryName}"
                - ResolvedCodeArtifactDomainName: !If
                    - HasCodeArtifactDomainName
                    - !Ref CodeArtifactDomainName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactDomainName"
                  PromotionSourceRepositoryName: !Ref CodeArtifactPromotionSourceRepositoryName
          - Effect: Allow
            Action:
              - codeartifact:CopyPackageVersions
            Resource:
              - !Sub
                - "arn:${AWS::Partition}:codeartifact:${AWS::Region}:${AWS::AccountId}:repository/${ResolvedCodeArtifactDomainName}/${PromotionDestinationRepositoryName}"
                - ResolvedCodeArtifactDomainName: !If
                    - HasCodeArtifactDomainName
                    - !Ref CodeArtifactDomainName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactDomainName"
                  PromotionDestinationRepositoryName: !Ref CodeArtifactPromotionDestinationRepositoryName
              - !Sub
                - "arn:${AWS::Partition}:codeartifact:${AWS::Region}:${AWS::AccountId}:package/${ResolvedCodeArtifactDomainName}/${PromotionSourceRepositoryName}/pypi/*"
                - ResolvedCodeArtifactDomainName: !If
                    - HasCodeArtifactDomainName
                    - !Ref CodeArtifactDomainName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactDomainName"
                  PromotionSourceRepositoryName: !Ref CodeArtifactPromotionSourceRepositoryName
              - !Sub
                - "arn:${AWS::Partition}:codeartifact:${AWS::Region}:${AWS::AccountId}:package/${ResolvedCodeArtifactDomainName}/${PromotionSourceRepositoryName}/npm/nova/*"
                - ResolvedCodeArtifactDomainName: !If
                    - HasCodeArtifactDomainName
                    - !Ref CodeArtifactDomainName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactDomainName"
                  PromotionSourceRepositoryName: !Ref CodeArtifactPromotionSourceRepositoryName
              - !Sub
                - "arn:${AWS::Partition}:codeartifact:${AWS::Region}:${AWS::AccountId}:package/${ResolvedCodeArtifactDomainName}/${PromotionDestinationRepositoryName}/pypi/*"
                - ResolvedCodeArtifactDomainName: !If
                    - HasCodeArtifactDomainName
                    - !Ref CodeArtifactDomainName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactDomainName"
                  PromotionDestinationRepositoryName: !Ref CodeArtifactPromotionDestinationRepositoryName
              - !Sub
                - "arn:${AWS::Partition}:codeartifact:${AWS::Region}:${AWS::AccountId}:package/${ResolvedCodeArtifactDomainName}/${PromotionDestinationRepositoryName}/npm/nova/*"
                - ResolvedCodeArtifactDomainName: !If
                    - HasCodeArtifactDomainName
                    - !Ref CodeArtifactDomainName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactDomainName"
                  PromotionDestinationRepositoryName: !Ref CodeArtifactPromotionDestinationRepositoryName
          - Effect: Allow
            Action:
              - sts:GetServiceBearerToken
            Resource: "*"
            Condition:
              StringEquals:
                sts:AWSServiceName: codeartifact.amazonaws.com

  CodePipelineServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${Project}-${Application}-nova-codepipeline-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref CodePipelineServiceManagedPolicy

  CodePipelineServiceManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${Project}-${Application}-nova-codepipeline-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:GetObjectVersion
              - s3:PutObject
            Resource:
              - !Sub
                - arn:${AWS::Partition}:s3:::${ResolvedArtifactBucketName}/*
                - ResolvedArtifactBucketName: !If
                    - HasArtifactBucketName
                    - !Ref ArtifactBucketName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-ArtifactBucketName"
          - Effect: Allow
            Action:
              - s3:ListBucket
            Resource:
              - !Sub
                - arn:${AWS::Partition}:s3:::${ResolvedArtifactBucketName}
                - ResolvedArtifactBucketName: !If
                    - HasArtifactBucketName
                    - !Ref ArtifactBucketName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-ArtifactBucketName"
          - Effect: Allow
            Action:
              - codebuild:StartBuild
              - codebuild:BatchGetBuilds
            Resource:
              - !Sub "arn:${AWS::Partition}:codebuild:${AWS::Region}:${AWS::AccountId}:project/${Project}-${Application}-*"
          - Effect: Allow
            Action:
              - cloudformation:CreateStack
              - cloudformation:CreateChangeSet
              - cloudformation:UpdateStack
              - cloudformation:DeleteChangeSet
              - cloudformation:DescribeChangeSet
              - cloudformation:DescribeStacks
              - cloudformation:ExecuteChangeSet
            Resource:
              - !Sub "arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${Project}-${Application}-nova-*"
          - !If
            - HasResolvedManualApprovalTopicArn
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !If
                - HasManualApprovalTopicArn
                - !Ref ManualApprovalTopicArn
                - !ImportValue
                  Fn::Sub: "${FoundationStackName}-ManualApprovalTopicArn"
            - !Ref AWS::NoValue
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource:
              - !GetAtt CloudFormationExecutionRoleDev.Arn
              - !GetAtt CloudFormationExecutionRoleProd.Arn
            Condition:
              StringEquals:
                iam:PassedToService:
                  - cloudformation.amazonaws.com
          - Effect: Allow
            Action:
              - codestar-connections:UseConnection
              - codeconnections:UseConnection
            Resource: !If
              - HasExistingConnectionArn
              - !Ref ExistingConnectionArn
              - - !Sub "arn:${AWS::Partition}:codestar-connections:${AWS::Region}:${AWS::AccountId}:connection/*"
                - !Sub "arn:${AWS::Partition}:codeconnections:${AWS::Region}:${AWS::AccountId}:connection/*"

  CodeBuildReleaseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${Project}-${Application}-nova-codebuild-release-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref CodeBuildReleaseManagedPolicy

  CodeBuildReleaseManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${Project}-${Application}-nova-codebuild-release-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource:
              - !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:GetObjectVersion
              - s3:PutObject
            Resource:
              - !Sub
                - arn:${AWS::Partition}:s3:::${ResolvedArtifactBucketName}/*
                - ResolvedArtifactBucketName: !If
                    - HasArtifactBucketName
                    - !Ref ArtifactBucketName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-ArtifactBucketName"
          - Effect: Allow
            Action:
              - s3:ListBucket
            Resource:
              - !Sub
                - arn:${AWS::Partition}:s3:::${ResolvedArtifactBucketName}
                - ResolvedArtifactBucketName: !If
                    - HasArtifactBucketName
                    - !Ref ArtifactBucketName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-ArtifactBucketName"
          - Effect: Allow
            Action:
              - ecr:BatchCheckLayerAvailability
              - ecr:BatchGetImage
              - ecr:DescribeImages
              - ecr:CompleteLayerUpload
              - ecr:InitiateLayerUpload
              - ecr:PutImage
              - ecr:UploadLayerPart
            Resource:
              - !If
                - HasEcrRepositoryArn
                - !Ref EcrRepositoryArn
                - !ImportValue
                  Fn::Sub: "${FoundationStackName}-EcrRepositoryArn"
          - Effect: Allow
            Action:
              - ecr:GetAuthorizationToken
            Resource: "*"
          - Effect: Allow
            Action:
              - codeartifact:GetAuthorizationToken
            Resource:
              - !Sub
                - "arn:${AWS::Partition}:codeartifact:${AWS::Region}:${AWS::AccountId}:domain/${ResolvedCodeArtifactDomainName}"
                - ResolvedCodeArtifactDomainName: !If
                    - HasCodeArtifactDomainName
                    - !Ref CodeArtifactDomainName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactDomainName"
          - Effect: Allow
            Action:
              - codeartifact:ReadFromRepository
              - codeartifact:GetRepositoryEndpoint
            Resource:
              - !Sub
                - "arn:${AWS::Partition}:codeartifact:${AWS::Region}:${AWS::AccountId}:repository/${ResolvedCodeArtifactDomainName}/${ResolvedCodeArtifactRepositoryName}"
                - ResolvedCodeArtifactDomainName: !If
                    - HasCodeArtifactDomainName
                    - !Ref CodeArtifactDomainName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactDomainName"
                  ResolvedCodeArtifactRepositoryName: !If
                    - HasCodeArtifactRepositoryName
                    - !Ref CodeArtifactRepositoryName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactRepositoryName"
          - Effect: Allow
            Action:
              - codeartifact:PublishPackageVersion
              - codeartifact:PutPackageMetadata
              - codeartifact:DescribePackageVersion
            Resource:
              - !Sub
                - "arn:${AWS::Partition}:codeartifact:${AWS::Region}:${AWS::AccountId}:package/${ResolvedCodeArtifactDomainName}/${ResolvedCodeArtifactRepositoryName}/pypi/*"
                - ResolvedCodeArtifactDomainName: !If
                    - HasCodeArtifactDomainName
                    - !Ref CodeArtifactDomainName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactDomainName"
                  ResolvedCodeArtifactRepositoryName: !If
                    - HasCodeArtifactRepositoryName
                    - !Ref CodeArtifactRepositoryName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactRepositoryName"
              - !Sub
                - "arn:${AWS::Partition}:codeartifact:${AWS::Region}:${AWS::AccountId}:package/${ResolvedCodeArtifactDomainName}/${ResolvedCodeArtifactRepositoryName}/npm/nova/*"
                - ResolvedCodeArtifactDomainName: !If
                    - HasCodeArtifactDomainName
                    - !Ref CodeArtifactDomainName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactDomainName"
                  ResolvedCodeArtifactRepositoryName: !If
                    - HasCodeArtifactRepositoryName
                    - !Ref CodeArtifactRepositoryName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactRepositoryName"
          - Effect: Allow
            Action:
              - codeartifact:CreatePackageGroup
              - codeartifact:DescribePackageGroup
              - codeartifact:UpdatePackageGroup
              - codeartifact:UpdatePackageGroupOriginConfiguration
            Resource:
              - !Sub
                - "arn:${AWS::Partition}:codeartifact:${AWS::Region}:${AWS::AccountId}:package-group/${ResolvedCodeArtifactDomainName}/*"
                - ResolvedCodeArtifactDomainName: !If
                    - HasCodeArtifactDomainName
                    - !Ref CodeArtifactDomainName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-CodeArtifactDomainName"
          - Effect: Allow
            Action:
              - sts:GetServiceBearerToken
            Resource: "*"
            Condition:
              StringEquals:
                sts:AWSServiceName: codeartifact.amazonaws.com

  EcsInfrastructureRoleForLoadBalancers:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${Project}-${Application}-ecs-lb-infra-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonECSInfrastructureRolePolicyForLoadBalancers

  CloudFormationExecutionRoleDev:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${Project}-${Application}-nova-cfn-dev-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref CloudFormationExecutionRoleDevManagedPolicy

  CloudFormationExecutionRoleDevManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${Project}-${Application}-nova-cfn-dev-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - ecs:DescribeServices
            Resource:
              - !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:service/*"
          - Effect: Allow
            Action:
              - ecs:DescribeTaskDefinition
            Resource:
              - !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:task-definition/*"
          - Effect: Allow
            Action:
              - ecs:RegisterTaskDefinition
              - ecs:TagResource
              - ecs:UntagResource
            Resource:
              - !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:task-definition/*"
          - Effect: Allow
            Action:
              - ecs:UpdateService
            Resource:
              - !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:service/*"
          - Effect: Allow
            Action:
              - ssm:PutParameter
              - ssm:DeleteParameter
              - ssm:AddTagsToResource
              - ssm:RemoveTagsFromResource
            Resource:
              - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/nova/dev/*/image-digest"
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource:
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${Project}-${Application}-*-ecs-task-${AWS::Region}"
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${Project}-${Application}-*-ecs-task-execution-${AWS::Region}"
            Condition:
              StringEquals:
                iam:PassedToService:
                  - ecs-tasks.amazonaws.com
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource:
              - !GetAtt EcsInfrastructureRoleForLoadBalancers.Arn
            Condition:
              StringEquals:
                iam:PassedToService:
                  - ecs.amazonaws.com

  CloudFormationExecutionRoleProd:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${Project}-${Application}-nova-cfn-prod-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref CloudFormationExecutionRoleProdManagedPolicy

  CloudFormationExecutionRoleProdManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${Project}-${Application}-nova-cfn-prod-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - ecs:DescribeServices
            Resource:
              - !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:service/*"
          - Effect: Allow
            Action:
              - ecs:DescribeTaskDefinition
            Resource:
              - !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:task-definition/*"
          - Effect: Allow
            Action:
              - ecs:RegisterTaskDefinition
              - ecs:TagResource
              - ecs:UntagResource
            Resource:
              - !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:task-definition/*"
          - Effect: Allow
            Action:
              - ecs:UpdateService
            Resource:
              - !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:service/*"
          - Effect: Allow
            Action:
              - ssm:PutParameter
              - ssm:DeleteParameter
              - ssm:AddTagsToResource
              - ssm:RemoveTagsFromResource
            Resource:
              - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/nova/prod/*/image-digest"
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource:
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${Project}-${Application}-*-ecs-task-${AWS::Region}"
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${Project}-${Application}-*-ecs-task-execution-${AWS::Region}"
            Condition:
              StringEquals:
                iam:PassedToService:
                  - ecs-tasks.amazonaws.com
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource:
              - !GetAtt EcsInfrastructureRoleForLoadBalancers.Arn
            Condition:
              StringEquals:
                iam:PassedToService:
                  - ecs.amazonaws.com


  ReleaseValidationReadRole:
    Type: AWS::IAM::Role
    Condition: HasReleaseValidationTrustedPrincipalArn
    Properties:
      RoleName: !Sub ${Project}-${Application}-release-validation-read-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref ReleaseValidationTrustedPrincipalArn
            Action: sts:AssumeRole

  ReleaseValidationReadManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: HasReleaseValidationTrustedPrincipalArn
    Properties:
      ManagedPolicyName: !Sub ${Project}-${Application}-release-validation-read
      Roles:
        - !Ref ReleaseValidationReadRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: CodeConnectionsRead
            Effect: Allow
            Action:
              - codeconnections:GetConnection
            Resource: !If
              - HasExistingConnectionArn
              - !Ref ExistingConnectionArn
              - - !Sub "arn:${AWS::Partition}:codeconnections:${AWS::Region}:${AWS::AccountId}:connection/*"
                - !Sub "arn:${AWS::Partition}:codestar-connections:${AWS::Region}:${AWS::AccountId}:connection/*"
          - Sid: CodePipelineGlobalList
            Effect: Allow
            Action:
              - codepipeline:ListPipelines
            Resource: "*"
          - Sid: CodePipelineScopedRead
            Effect: Allow
            Action:
              - codepipeline:ListPipelineExecutions
              - codepipeline:ListActionExecutions
              - codepipeline:GetPipeline
              - codepipeline:GetPipelineState
              - codepipeline:GetPipelineExecution
            Resource:
              - !Sub "arn:${AWS::Partition}:codepipeline:${AWS::Region}:${AWS::AccountId}:${Project}-${Application}-*"
          - Sid: ValidationRuntimeStackRead
            Effect: Allow
            Action:
              - cloudformation:DescribeStacks
            Resource:
              - !Sub "arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${Project}-*/*"
          - Sid: ValidationRuntimeEcsListRead
            Effect: Allow
            Action:
              - ecs:DescribeClusters
              - ecs:ListClusters
              - ecs:ListServices
            Resource: "*"
          - Sid: ValidationRuntimeServiceRead
            Effect: Allow
            Action:
              - ecs:DescribeServices
            Resource:
              - !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:service/*"
          - Sid: ValidationRuntimeTaskDefinitionRead
            Effect: Allow
            Action:
              - ecs:DescribeTaskDefinition
            Resource:
              - !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:task-definition/*"
          - Sid: ValidationRuntimeObservabilityRead
            Effect: Allow
            Action:
              - elasticloadbalancing:DescribeListeners
              - elasticloadbalancing:DescribeRules
              - elasticloadbalancing:DescribeTargetHealth
              - elasticloadbalancing:DescribeTargetGroups
              - elasticloadbalancing:DescribeLoadBalancers
              - cloudwatch:GetDashboard
              - cloudwatch:DescribeAlarms
              - cloudwatch:GetMetricData
              - cloudwatch:ListDashboards
            Resource: "*"
          - Sid: ValidationRuntimeWafRead
            Effect: Allow
            Action:
              - wafv2:GetWebACL
              - wafv2:GetWebACLForResource
              - wafv2:ListWebACLs
            Resource: "*"
          - Sid: ValidationRuntimeInfrastructureRoleRead
            Effect: Allow
            Action:
              - iam:GetRole
            Resource:
              - !GetAtt EcsInfrastructureRoleForLoadBalancers.Arn

Outputs:
  GitHubOIDCReleaseRoleArn:
    Value: !GetAtt GitHubOIDCReleaseRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-GitHubOIDCReleaseRoleArn"
  CodePipelineServiceRoleArn:
    Value: !GetAtt CodePipelineServiceRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-CodePipelineServiceRoleArn"
  CodeBuildReleaseRoleArn:
    Value: !GetAtt CodeBuildReleaseRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-CodeBuildReleaseRoleArn"
  EcsInfrastructureRoleForLoadBalancersArn:
    Value: !GetAtt EcsInfrastructureRoleForLoadBalancers.Arn
    Export:
      Name: !Sub "${AWS::StackName}-EcsInfrastructureRoleForLoadBalancersArn"
  CloudFormationExecutionRoleDevArn:
    Value: !GetAtt CloudFormationExecutionRoleDev.Arn
    Export:
      Name: !Sub "${AWS::StackName}-CloudFormationExecutionRoleDevArn"
  CloudFormationExecutionRoleProdArn:
    Value: !GetAtt CloudFormationExecutionRoleProd.Arn
    Export:
      Name: !Sub "${AWS::StackName}-CloudFormationExecutionRoleProdArn"
  ReleaseValidationReadRoleArn:
    Condition: HasReleaseValidationTrustedPrincipalArn
    Value: !GetAtt ReleaseValidationReadRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ReleaseValidationReadRoleArn"
