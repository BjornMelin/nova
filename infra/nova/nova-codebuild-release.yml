AWSTemplateFormatVersion: "2010-09-09"
Description: Nova release and deployment validation CodeBuild projects.

Parameters:
  Project:
    Type: String
  Application:
    Type: String
  FoundationStackName:
    Type: String
    Default: ""
    Description: Optional stack name for importing shared CI/CD foundation outputs.
  IamRolesStackName:
    Type: String
    Default: ""
    Description: Optional IAM stack name for importing CodeBuild role ARN.
  CodeBuildServiceRoleArn:
    Type: String
    Default: ""
    Description: Optional explicit CodeBuild service role ARN override.
  CodeArtifactDomainName:
    Type: String
    Default: ""
    Description: Optional explicit CodeArtifact domain. If empty, imported from foundation.
  CodeArtifactStagingRepositoryName:
    Type: String
    MinLength: 1
    AllowedPattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]{0,99}$"
    ConstraintDescription: Must be a valid CodeArtifact repository name.
    Description: CodeArtifact staging repository used for release publication.
  EcrRepositoryUri:
    Type: String
    Default: ""
    Description: Optional explicit ECR repository URI. If empty, imported from foundation.
  EcrRepositoryName:
    Type: String
    Default: ""
    Description: Optional explicit ECR repository name. If empty, imported from foundation.
  CodeBuildLogRetentionInDays:
    Type: Number
    Default: 14
    AllowedValues:
      - 1
      - 3
      - 5
      - 7
      - 14
      - 30
      - 60
      - 90
      - 120
      - 150
      - 180
      - 365
      - 400
      - 545
      - 731
      - 1096
      - 1827
      - 2192
      - 2557
      - 2922
      - 3288
      - 3653
    Description: Retention period for CodeBuild CloudWatch log groups in days.
  FileDockerfilePath:
    Type: String
    Default: apps/nova_file_api_service/Dockerfile
    Description: Relative POSIX path to the file API Dockerfile.
    AllowedPattern: "^(?!/)(?!.*\\.\\.)[A-Za-z0-9._/-]+$"
    ConstraintDescription: Must be a relative path without parent traversal.
  DockerBuildContext:
    Type: String
    Default: .
    Description: Relative POSIX path to the Docker build context.
    AllowedPattern: "^(?!/)(?!.*\\.\\.)[A-Za-z0-9._/-]+$"
    ConstraintDescription: Must be a relative path without parent traversal.
  ReleaseBuildspecPath:
    Type: String
    Default: buildspecs/buildspec-release.yml
    AllowedPattern: "^(?!/)(?!.*\\.\\.)[A-Za-z0-9._/-]+$"
    ConstraintDescription: Must be a relative path without parent traversal.
  ValidateBuildspecPath:
    Type: String
    Default: buildspecs/buildspec-deploy-validate.yml
    AllowedPattern: "^(?!/)(?!.*\\.\\.)[A-Za-z0-9._/-]+$"
    ConstraintDescription: Must be a relative path without parent traversal.
  ReleaseBuildProjectName:
    Type: String
    Default: ""
  DeployValidateProjectName:
    Type: String
    Default: ""

Conditions:
  HasIamRolesStackName: !Not [!Equals [!Ref IamRolesStackName, ""]]
  HasCodeBuildServiceRoleArn: !Not [!Equals [!Ref CodeBuildServiceRoleArn, ""]]
  HasCodeArtifactDomainName: !Not [!Equals [!Ref CodeArtifactDomainName, ""]]
  HasEcrRepositoryUri: !Not [!Equals [!Ref EcrRepositoryUri, ""]]
  HasEcrRepositoryName: !Not [!Equals [!Ref EcrRepositoryName, ""]]
  HasReleaseBuildProjectName: !Not [!Equals [!Ref ReleaseBuildProjectName, ""]]
  HasDeployValidateProjectName: !Not [!Equals [!Ref DeployValidateProjectName, ""]]

Rules:
  HasCodeBuildServiceRoleArnOrIamRolesStackName:
    Assertions:
      - Assert: !Or
          - !Not [!Equals [!Ref CodeBuildServiceRoleArn, ""]]
          - !Not [!Equals [!Ref IamRolesStackName, ""]]
        AssertDescription: Provide CodeBuildServiceRoleArn or IamRolesStackName.
  RequireCodeArtifactDomainInput:
    Assertions:
      - Assert: !Or
          - !Not [!Equals [!Ref CodeArtifactDomainName, ""]]
          - !Not [!Equals [!Ref FoundationStackName, ""]]
        AssertDescription: Provide CodeArtifactDomainName or FoundationStackName.
  RequireEcrRepositoryUriInput:
    Assertions:
      - Assert: !Or
          - !Not [!Equals [!Ref EcrRepositoryUri, ""]]
          - !Not [!Equals [!Ref FoundationStackName, ""]]
        AssertDescription: Provide EcrRepositoryUri or FoundationStackName.
  RequireEcrRepositoryNameInput:
    Assertions:
      - Assert: !Or
          - !Not [!Equals [!Ref EcrRepositoryName, ""]]
          - !Not [!Equals [!Ref FoundationStackName, ""]]
        AssertDescription: Provide EcrRepositoryName or FoundationStackName.

Resources:
  ReleaseBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !If
        - HasReleaseBuildProjectName
        - !Sub "/aws/codebuild/${ReleaseBuildProjectName}-${AWS::StackName}"
        - !Sub "/aws/codebuild/${Project}-${Application}-nova-release-build-${AWS::StackName}"
      RetentionInDays: !Ref CodeBuildLogRetentionInDays

  NovaReleaseBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !If
        - HasReleaseBuildProjectName
        - !Ref ReleaseBuildProjectName
        - !Sub ${Project}-${Application}-nova-release-build
      Description: Builds immutable artifacts and publishes changed units.
      ServiceRole: !If
        - HasCodeBuildServiceRoleArn
        - !Ref CodeBuildServiceRoleArn
        - !If
          - HasIamRolesStackName
          - !ImportValue
            Fn::Sub: "${IamRolesStackName}-CodeBuildReleaseRoleArn"
          - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${Project}-${Application}-nova-codebuild-release-role"
      Source:
        Type: CODEPIPELINE
        BuildSpec: !Ref ReleaseBuildspecPath
      Artifacts:
        Type: CODEPIPELINE
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref ReleaseBuildLogGroup
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: CODEARTIFACT_DOMAIN
            Type: PLAINTEXT
            Value: !If
              - HasCodeArtifactDomainName
              - !Ref CodeArtifactDomainName
              - !ImportValue
                Fn::Sub: "${FoundationStackName}-CodeArtifactDomainName"
          - Name: CODEARTIFACT_STAGING_REPOSITORY
            Type: PLAINTEXT
            Value: !Ref CodeArtifactStagingRepositoryName
          - Name: ECR_REPOSITORY_URI
            Type: PLAINTEXT
            Value: !If
              - HasEcrRepositoryUri
              - !Ref EcrRepositoryUri
              - !ImportValue
                Fn::Sub: "${FoundationStackName}-EcrRepositoryUri"
          - Name: ECR_REPOSITORY_NAME
            Type: PLAINTEXT
            Value: !If
              - HasEcrRepositoryName
              - !Ref EcrRepositoryName
              - !ImportValue
                Fn::Sub: "${FoundationStackName}-EcrRepositoryName"
          - Name: FILE_DOCKERFILE_PATH
            Type: PLAINTEXT
            Value: !Ref FileDockerfilePath
          - Name: DOCKERFILE_PATH
            Type: PLAINTEXT
            Value: !Ref FileDockerfilePath
          - Name: DOCKER_BUILD_CONTEXT
            Type: PLAINTEXT
            Value: !Ref DockerBuildContext
      TimeoutInMinutes: 60

  DeployValidateLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !If
        - HasDeployValidateProjectName
        - !Sub "/aws/codebuild/${DeployValidateProjectName}-${AWS::StackName}"
        - !Sub "/aws/codebuild/${Project}-${Application}-nova-deploy-validate-${AWS::StackName}"
      RetentionInDays: !Ref CodeBuildLogRetentionInDays

  NovaDeployValidateBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !If
        - HasDeployValidateProjectName
        - !Ref DeployValidateProjectName
        - !Sub ${Project}-${Application}-nova-deploy-validate
      Description: Validates post-deploy readiness and operational endpoints.
      ServiceRole: !If
        - HasCodeBuildServiceRoleArn
        - !Ref CodeBuildServiceRoleArn
        - !If
          - HasIamRolesStackName
          - !ImportValue
            Fn::Sub: "${IamRolesStackName}-CodeBuildReleaseRoleArn"
          - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${Project}-${Application}-nova-codebuild-release-role"
      Source:
        Type: CODEPIPELINE
        BuildSpec: !Ref ValidateBuildspecPath
      Artifacts:
        Type: CODEPIPELINE
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref DeployValidateLogGroup
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
      TimeoutInMinutes: 30

Outputs:
  ReleaseBuildProjectName:
    Value: !Ref NovaReleaseBuildProject
    Export:
      Name: !Sub "${AWS::StackName}-ReleaseBuildProjectName"
  ReleaseBuildProjectArn:
    Value: !GetAtt NovaReleaseBuildProject.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ReleaseBuildProjectArn"
  DeployValidateProjectName:
    Value: !Ref NovaDeployValidateBuildProject
    Export:
      Name: !Sub "${AWS::StackName}-DeployValidateProjectName"
  DeployValidateProjectArn:
    Value: !GetAtt NovaDeployValidateBuildProject.Arn
    Export:
      Name: !Sub "${AWS::StackName}-DeployValidateProjectArn"
