AWSTemplateFormatVersion: "2010-09-09"
Description: Persist promoted Nova image digest in SSM Parameter Store.

Parameters:
  ServiceName:
    Type: String
    MinLength: 1
    MaxLength: 63
    AllowedPattern: "^[A-Za-z0-9](?:[A-Za-z0-9_.-]{0,61}[A-Za-z0-9])?$"
    ConstraintDescription: >-
      Use 1-63 characters with only letters, numbers, dot, underscore, or
      hyphen, and do not end with punctuation.
  ImageDigest:
    Type: String
    MinLength: 71
    MaxLength: 71
    AllowedPattern: "^sha256:[A-Fa-f0-9]{64}$"
    ConstraintDescription: Must be a valid OCI digest (sha256:...).
  Environment:
    Type: String
    AllowedValues:
      - dev
      - prod

Resources:
  DeploymentMarker:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/nova/${Environment}/${ServiceName}/image-digest"
      Type: String
      Value: !Ref ImageDigest

Outputs:
  ImageDigest:
    Value: !Ref ImageDigest
