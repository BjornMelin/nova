AWSTemplateFormatVersion: "2010-09-09"
Description: Nova hybrid CI/CD pipeline (Dev -> Manual Approval -> Prod).

Parameters:
  Project:
    Type: String
  Application:
    Type: String
  RepositoryOwner:
    Type: String
  RepositoryName:
    Type: String
  MainBranchName:
    Type: String
    Default: main
  ArtifactBucketName:
    Type: String
  ConnectionName:
    Type: String
  ExistingConnectionArn:
    Type: String
    Default: ""
  ReleaseBuildProjectName:
    Type: String
  DeployValidateProjectName:
    Type: String
  DeployServiceName:
    Type: String
  DeployDevStackName:
    Type: String
  DeployProdStackName:
    Type: String
  DevServiceBaseUrl:
    Type: String
  ProdServiceBaseUrl:
    Type: String
  ValidationCanonicalPaths:
    Type: String
    Default: /v1/health/live,/v1/health/ready,/metrics/summary,/v1/capabilities,/v1/releases/info
    Description: Comma-delimited canonical routes validated as live post-deploy.
  ValidationLegacy404Paths:
    Type: String
    Default: /healthz,/readyz,/api/transfers/uploads/initiate,/api/jobs,/api/v1/transfers/uploads/initiate
    Description: Comma-delimited legacy routes that must return HTTP 404.
  ManualApprovalTopicArn:
    Type: String
    Default: ""

Conditions:
  UseExistingConnection: !Not [!Equals [!Ref ExistingConnectionArn, ""]]
  CreateConnection: !Equals [!Ref ExistingConnectionArn, ""]
  HasApprovalTopic: !Not [!Equals [!Ref ManualApprovalTopicArn, ""]]

Resources:
  CodeConnection:
    Type: AWS::CodeConnections::Connection
    Condition: CreateConnection
    Properties:
      ConnectionName: !Ref ConnectionName
      ProviderType: GitHub

  NovaPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${Project}-${Application}-nova-release-pipeline
      RoleArn: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${Project}-${Application}-nova-codepipeline-role"
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucketName
      Stages:
        - Name: Source
          Actions:
            - Name: ApplicationSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              Configuration:
                ConnectionArn: !If
                  - UseExistingConnection
                  - !Ref ExistingConnectionArn
                  - !GetAtt CodeConnection.ConnectionArn
                FullRepositoryId: !Sub ${RepositoryOwner}/${RepositoryName}
                BranchName: !Ref MainBranchName
                OutputArtifactFormat: CODE_ZIP
              OutputArtifacts:
                - Name: AppSourceOutput
              RunOrder: 1


        - Name: Build
          Actions:
            - Name: ReleaseBuild
              Namespace: ReleaseBuild
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref ReleaseBuildProjectName
              InputArtifacts:
                - Name: AppSourceOutput
              OutputArtifacts:
                - Name: BuildOutput
              RunOrder: 1

        - Name: DeployDev
          Actions:
            - Name: DeployDevStack
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: "1"
              Configuration:
                ActionMode: CREATE_UPDATE
                Capabilities: CAPABILITY_NAMED_IAM
                RoleArn: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${Project}-${Application}-nova-cfn-dev-role"
                StackName: !Ref DeployDevStackName
                TemplatePath: AppSourceOutput::infra/nova/deploy/image-digest-ssm.yml
                ParameterOverrides: !Sub >-
                  {"ServiceName":"${DeployServiceName}",
                  "Environment":"dev",
                  "ImageDigest":"#{ReleaseBuild.IMAGE_DIGEST}"}
              InputArtifacts:
                - Name: AppSourceOutput
              RunOrder: 1

        - Name: ValidateDev
          Actions:
            - Name: ValidateDevDeployment
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref DeployValidateProjectName
                EnvironmentVariables: !Sub >-
                  [{"name":"VALIDATION_BASE_URL",
                  "value":"${DevServiceBaseUrl}","type":"PLAINTEXT"},
                  {"name":"SERVICE_BASE_URL",
                  "value":"${DevServiceBaseUrl}","type":"PLAINTEXT"},
                  {"name":"VALIDATION_CANONICAL_PATHS",
                  "value":"${ValidationCanonicalPaths}","type":"PLAINTEXT"},
                  {"name":"VALIDATION_LEGACY_404_PATHS",
                  "value":"${ValidationLegacy404Paths}","type":"PLAINTEXT"}]
              InputArtifacts:
                - Name: AppSourceOutput
              RunOrder: 1

        - !If
          - HasApprovalTopic
          - Name: ManualApproval
            Actions:
              - Name: ApproveProdPromotion
                ActionTypeId:
                  Category: Approval
                  Owner: AWS
                  Provider: Manual
                  Version: "1"
                Configuration:
                  NotificationArn: !Ref ManualApprovalTopicArn
                  CustomData: Approve promotion of immutable release artifact.
                RunOrder: 1
          - !Ref AWS::NoValue

        - Name: DeployProd
          Actions:
            - Name: DeployProdStack
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: "1"
              Configuration:
                ActionMode: CREATE_UPDATE
                Capabilities: CAPABILITY_NAMED_IAM
                RoleArn: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${Project}-${Application}-nova-cfn-prod-role"
                StackName: !Ref DeployProdStackName
                TemplatePath: AppSourceOutput::infra/nova/deploy/image-digest-ssm.yml
                ParameterOverrides: !Sub >-
                  {"ServiceName":"${DeployServiceName}",
                  "Environment":"prod",
                  "ImageDigest":"#{ReleaseBuild.IMAGE_DIGEST}"}
              InputArtifacts:
                - Name: AppSourceOutput
              RunOrder: 1

        - Name: ValidateProd
          Actions:
            - Name: ValidateProdDeployment
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref DeployValidateProjectName
                EnvironmentVariables: !Sub >-
                  [{"name":"VALIDATION_BASE_URL",
                  "value":"${ProdServiceBaseUrl}","type":"PLAINTEXT"},
                  {"name":"SERVICE_BASE_URL",
                  "value":"${ProdServiceBaseUrl}","type":"PLAINTEXT"},
                  {"name":"VALIDATION_CANONICAL_PATHS",
                  "value":"${ValidationCanonicalPaths}","type":"PLAINTEXT"},
                  {"name":"VALIDATION_LEGACY_404_PATHS",
                  "value":"${ValidationLegacy404Paths}","type":"PLAINTEXT"}]
              InputArtifacts:
                - Name: AppSourceOutput
              RunOrder: 1

Outputs:
  PipelineName:
    Value: !Ref NovaPipeline
  ConnectionArn:
    Value: !If
      - UseExistingConnection
      - !Ref ExistingConnectionArn
      - !GetAtt CodeConnection.ConnectionArn
  ConnectionActivationNote:
    Value: >-
      If a new connection was created, activate it once in the AWS console
      (status must transition from PENDING to AVAILABLE).
