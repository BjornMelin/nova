AWSTemplateFormatVersion: "2010-09-09"
Description: Nova hybrid CI/CD pipeline (Dev -> Manual Approval -> Prod).
Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W6001

Parameters:
  Project:
    Type: String
  Application:
    Type: String
  RepositoryOwner:
    Type: String
  RepositoryName:
    Type: String
  MainBranchName:
    Type: String
    Default: main
  FoundationStackName:
    Type: String
    Default: ""
    Description: Optional stack name for importing shared CI/CD foundation outputs.
  IamRolesStackName:
    Type: String
    Default: ""
    Description: Optional IAM stack name for importing role output values.
  CodeBuildStackName:
    Type: String
    Default: ""
    Description: Optional CodeBuild stack name for importing build project names.
  ArtifactBucketName:
    Type: String
    Default: ""
    Description: Optional explicit artifact bucket name. If empty, imported from foundation.
  ConnectionName:
    Type: String
    Default: ""
    Description: Optional explicit connection name. If empty, imported from foundation.
  ExistingConnectionArn:
    Type: String
    Default: ""
  CodePipelineServiceRoleArn:
    Type: String
    Default: ""
    Description: Optional explicit CodePipeline role ARN override.
  CloudFormationExecutionRoleDevArn:
    Type: String
    Default: ""
    Description: Optional explicit CloudFormation dev execution role ARN override.
  CloudFormationExecutionRoleProdArn:
    Type: String
    Default: ""
    Description: Optional explicit CloudFormation prod execution role ARN override.
  ReleaseBuildProjectName:
    Type: String
    Default: ""
  DeployValidateProjectName:
    Type: String
    Default: ""
  DeployServiceName:
    Type: String
  DeployDevStackName:
    Type: String
  DeployProdStackName:
    Type: String
  DevServiceBaseUrl:
    Type: String
    AllowedPattern: "^https://(?![^\\s]*httpbin)(?![^\\s]*placeholder)(?![^\\s]*example\\.com)(?![^\\s]*<)(?![^\\s]*>)[^\\s]+$"
    ConstraintDescription: Must be an HTTPS URL and not a placeholder/test host.
  ProdServiceBaseUrl:
    Type: String
    AllowedPattern: "^https://(?![^\\s]*httpbin)(?![^\\s]*placeholder)(?![^\\s]*example\\.com)(?![^\\s]*<)(?![^\\s]*>)[^\\s]+$"
    ConstraintDescription: Must be an HTTPS URL and not a placeholder/test host.
  ValidationCanonicalPaths:
    Type: String
    Default: /v1/health/live,/v1/health/ready,/metrics/summary,/v1/capabilities,/v1/releases/info
    Description: Comma-delimited canonical routes validated as live post-deploy.
  ValidationLegacy404Paths:
    Type: String
    Default: /healthz,/readyz,/api/transfers/uploads/initiate,/api/jobs,/api/v1/transfers/uploads/initiate
    Description: Comma-delimited legacy routes that must return HTTP 404.
  ManualApprovalTopicArn:
    Type: String
    Default: ""

Conditions:
  HasFoundationStackName: !Not [!Equals [!Ref FoundationStackName, ""]]
  HasIamRolesStackName: !Not [!Equals [!Ref IamRolesStackName, ""]]
  HasArtifactBucketName: !Not [!Equals [!Ref ArtifactBucketName, ""]]
  HasConnectionName: !Not [!Equals [!Ref ConnectionName, ""]]
  HasCodePipelineServiceRoleArn: !Not [!Equals [!Ref CodePipelineServiceRoleArn, ""]]
  HasCloudFormationExecutionRoleDevArn: !Not [!Equals [!Ref CloudFormationExecutionRoleDevArn, ""]]
  HasCloudFormationExecutionRoleProdArn: !Not [!Equals [!Ref CloudFormationExecutionRoleProdArn, ""]]
  HasReleaseBuildProjectName: !Not [!Equals [!Ref ReleaseBuildProjectName, ""]]
  HasDeployValidateProjectName: !Not [!Equals [!Ref DeployValidateProjectName, ""]]
  HasExistingConnectionArn: !Not [!Equals [!Ref ExistingConnectionArn, ""]]
  CreateConnection: !And
    - !Not [!Condition HasExistingConnectionArn]
    - !Not [!Condition HasFoundationStackName]
  HasApprovalTopic: !Not [!Equals [!Ref ManualApprovalTopicArn, ""]]
  HasResolvedApprovalTopic: !Or
    - !Condition HasApprovalTopic
    - !Condition HasFoundationStackName

Rules:
  RequireArtifactBucketInput:
    Assertions:
      - Assert: !Or
          - !Not [!Equals [!Ref ArtifactBucketName, ""]]
          - !Not [!Equals [!Ref FoundationStackName, ""]]
        AssertDescription: Provide ArtifactBucketName or FoundationStackName.
  RequireConnectionNameWhenCreatingConnection:
    RuleCondition: !Equals [!Ref ExistingConnectionArn, ""]
    Assertions:
      - Assert: !Or
          - !Not [!Equals [!Ref ConnectionName, ""]]
          - !Not [!Equals [!Ref FoundationStackName, ""]]
        AssertDescription: Provide ConnectionName or FoundationStackName when ExistingConnectionArn is empty.
  RequireReleaseBuildProjectInput:
    Assertions:
      - Assert: !Or
          - !Not [!Equals [!Ref ReleaseBuildProjectName, ""]]
          - !Not [!Equals [!Ref CodeBuildStackName, ""]]
        AssertDescription: Provide ReleaseBuildProjectName or CodeBuildStackName.
  RequireDeployValidateProjectInput:
    Assertions:
      - Assert: !Or
          - !Not [!Equals [!Ref DeployValidateProjectName, ""]]
          - !Not [!Equals [!Ref CodeBuildStackName, ""]]
        AssertDescription: Provide DeployValidateProjectName or CodeBuildStackName.

Resources:
  CodeConnection:
    Type: AWS::CodeConnections::Connection
    Condition: CreateConnection
    Properties:
      ConnectionName: !If
        - HasConnectionName
        - !Ref ConnectionName
        - !ImportValue
          Fn::Sub: "${FoundationStackName}-ConnectionName"
      ProviderType: GitHub

  NovaPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${Project}-${Application}-nova-release-pipeline
      RoleArn: !If
        - HasCodePipelineServiceRoleArn
        - !Ref CodePipelineServiceRoleArn
        - !If
          - HasIamRolesStackName
          - !ImportValue
            Fn::Sub: "${IamRolesStackName}-CodePipelineServiceRoleArn"
          - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${Project}-${Application}-nova-codepipeline-role"
      ArtifactStore:
        Type: S3
        Location: !If
          - HasArtifactBucketName
          - !Ref ArtifactBucketName
          - !ImportValue
            Fn::Sub: "${FoundationStackName}-ArtifactBucketName"
      Stages:
        - Name: Source
          Actions:
            - Name: ApplicationSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              Configuration:
                ConnectionArn: !If
                  - HasExistingConnectionArn
                  - !Ref ExistingConnectionArn
                  - !If
                    - HasFoundationStackName
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-ConnectionArn"
                    - !GetAtt CodeConnection.ConnectionArn
                FullRepositoryId: !Sub ${RepositoryOwner}/${RepositoryName}
                BranchName: !Ref MainBranchName
                OutputArtifactFormat: CODE_ZIP
              OutputArtifacts:
                - Name: AppSourceOutput
              RunOrder: 1


        - Name: Build
          Actions:
            - Name: ReleaseBuild
              Namespace: ReleaseBuild
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !If
                  - HasReleaseBuildProjectName
                  - !Ref ReleaseBuildProjectName
                  - !ImportValue
                    Fn::Sub: "${CodeBuildStackName}-ReleaseBuildProjectName"
              InputArtifacts:
                - Name: AppSourceOutput
              OutputArtifacts:
                - Name: BuildOutput
              RunOrder: 1

        - Name: DeployDev
          Actions:
            - Name: DeployDevStack
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: "1"
              Configuration:
                ActionMode: CREATE_UPDATE
                Capabilities: CAPABILITY_NAMED_IAM
                RoleArn: !If
                  - HasCloudFormationExecutionRoleDevArn
                  - !Ref CloudFormationExecutionRoleDevArn
                  - !If
                    - HasIamRolesStackName
                    - !ImportValue
                      Fn::Sub: "${IamRolesStackName}-CloudFormationExecutionRoleDevArn"
                    - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${Project}-${Application}-nova-cfn-dev-role"
                StackName: !Ref DeployDevStackName
                TemplatePath: AppSourceOutput::infra/nova/deploy/image-digest-ssm.yml
                ParameterOverrides: !Sub >-
                  {"ServiceName":"${DeployServiceName}",
                  "Environment":"dev",
                  "ImageDigest":"#{ReleaseBuild.IMAGE_DIGEST}"}
              InputArtifacts:
                - Name: AppSourceOutput
              RunOrder: 1

        - Name: ValidateDev
          Actions:
            - Name: ValidateDevDeployment
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !If
                  - HasDeployValidateProjectName
                  - !Ref DeployValidateProjectName
                  - !ImportValue
                    Fn::Sub: "${CodeBuildStackName}-DeployValidateProjectName"
                EnvironmentVariables: !Sub >-
                  [{"name":"VALIDATION_BASE_URL",
                  "value":"${DevServiceBaseUrl}","type":"PLAINTEXT"},
                  {"name":"SERVICE_BASE_URL",
                  "value":"${DevServiceBaseUrl}","type":"PLAINTEXT"},
                  {"name":"VALIDATION_CANONICAL_PATHS",
                  "value":"${ValidationCanonicalPaths}","type":"PLAINTEXT"},
                  {"name":"VALIDATION_LEGACY_404_PATHS",
                  "value":"${ValidationLegacy404Paths}","type":"PLAINTEXT"}]
              InputArtifacts:
                - Name: AppSourceOutput
              RunOrder: 1

        - Name: ManualApproval
          Actions:
            - Name: ApproveProdPromotion
              ActionTypeId:
                Category: Approval
                Owner: AWS
                Provider: Manual
                Version: "1"
              Configuration:
                NotificationArn: !If
                  - HasResolvedApprovalTopic
                  - !If
                    - HasApprovalTopic
                    - !Ref ManualApprovalTopicArn
                    - !ImportValue
                      Fn::Sub: "${FoundationStackName}-ManualApprovalTopicArn"
                  - !Ref AWS::NoValue
                CustomData: Approve promotion of immutable release artifact.
              RunOrder: 1

        - Name: DeployProd
          Actions:
            - Name: DeployProdStack
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: "1"
              Configuration:
                ActionMode: CREATE_UPDATE
                Capabilities: CAPABILITY_NAMED_IAM
                RoleArn: !If
                  - HasCloudFormationExecutionRoleProdArn
                  - !Ref CloudFormationExecutionRoleProdArn
                  - !If
                    - HasIamRolesStackName
                    - !ImportValue
                      Fn::Sub: "${IamRolesStackName}-CloudFormationExecutionRoleProdArn"
                    - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${Project}-${Application}-nova-cfn-prod-role"
                StackName: !Ref DeployProdStackName
                TemplatePath: AppSourceOutput::infra/nova/deploy/image-digest-ssm.yml
                ParameterOverrides: !Sub >-
                  {"ServiceName":"${DeployServiceName}",
                  "Environment":"prod",
                  "ImageDigest":"#{ReleaseBuild.IMAGE_DIGEST}"}
              InputArtifacts:
                - Name: AppSourceOutput
              RunOrder: 1

        - Name: ValidateProd
          Actions:
            - Name: ValidateProdDeployment
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !If
                  - HasDeployValidateProjectName
                  - !Ref DeployValidateProjectName
                  - !ImportValue
                    Fn::Sub: "${CodeBuildStackName}-DeployValidateProjectName"
                EnvironmentVariables: !Sub >-
                  [{"name":"VALIDATION_BASE_URL",
                  "value":"${ProdServiceBaseUrl}","type":"PLAINTEXT"},
                  {"name":"SERVICE_BASE_URL",
                  "value":"${ProdServiceBaseUrl}","type":"PLAINTEXT"},
                  {"name":"VALIDATION_CANONICAL_PATHS",
                  "value":"${ValidationCanonicalPaths}","type":"PLAINTEXT"},
                  {"name":"VALIDATION_LEGACY_404_PATHS",
                  "value":"${ValidationLegacy404Paths}","type":"PLAINTEXT"}]
              InputArtifacts:
                - Name: AppSourceOutput
              RunOrder: 1

Outputs:
  PipelineName:
    Value: !Ref NovaPipeline
  ConnectionArn:
    Value: !If
      - HasExistingConnectionArn
      - !Ref ExistingConnectionArn
      - !If
        - HasFoundationStackName
        - !ImportValue
          Fn::Sub: "${FoundationStackName}-ConnectionArn"
        - !GetAtt CodeConnection.ConnectionArn
  ConnectionActivationNote:
    Value: >-
      If a new connection was created, activate it once in the AWS console
      (status must transition from PENDING to AVAILABLE).
