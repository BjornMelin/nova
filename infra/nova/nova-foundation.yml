AWSTemplateFormatVersion: "2010-09-09"
Description: Nova CI/CD foundation stack (artifact bucket, approval topic, optional CodeConnection).

Parameters:
  Project:
    Type: String
  Application:
    Type: String
  ExistingArtifactBucketName:
    Type: String
    Default: ""
    Description: Existing artifact bucket name. If set, no bucket resource is created.
  ArtifactBucketName:
    Type: String
    Default: ""
    AllowedPattern: "^$|^[a-z0-9][a-z0-9.-]*[a-z0-9]$"
    Description: New artifact bucket name to create when ExistingArtifactBucketName is empty.
  CodeArtifactDomainName:
    Type: String
    MinLength: 1
  CodeArtifactRepositoryName:
    Type: String
    MinLength: 1
  CodeArtifactInternalNpmScope:
    Type: String
    Default: nova
    MinLength: 1
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"
    ConstraintDescription: Must be a valid lowercase npm scope without @.
  EcrRepositoryArn:
    Type: String
    AllowedPattern: "^arn:(aws|aws-us-gov|aws-cn):ecr:[a-z0-9-]+:[0-9]{12}:repository\\/[A-Za-z0-9._\\/-]+$"
    ConstraintDescription: Must be a valid ECR repository ARN.
  EcrRepositoryName:
    Type: String
    MinLength: 1
  EcrRepositoryUri:
    Type: String
    MinLength: 1
  ConnectionName:
    Type: String
    Default: nova-codeconnection
  ExistingConnectionArn:
    Type: String
    Default: ""
  ManualApprovalTopicArn:
    Type: String
    Default: ""
  ManualApprovalTopicName:
    Type: String
    Default: ""
  ManualApprovalKmsKeyArn:
    Type: String
    Default: alias/aws/sns
    Description: KMS key ARN or alias used for SNS server-side encryption.

Conditions:
  HasExistingArtifactBucketName: !Not [!Equals [!Ref ExistingArtifactBucketName, ""]]
  CreateArtifactBucket: !And
    - !Not [!Condition HasExistingArtifactBucketName]
    - !Condition HasArtifactBucketName
  HasArtifactBucketName: !Not [!Equals [!Ref ArtifactBucketName, ""]]
  HasExistingConnectionArn: !Not [!Equals [!Ref ExistingConnectionArn, ""]]
  ShouldExportConnectionName: !Not [!Condition HasExistingConnectionArn]
  CreateConnection: !Not [!Condition HasExistingConnectionArn]
  HasManualApprovalTopicArn: !Not [!Equals [!Ref ManualApprovalTopicArn, ""]]
  HasManualApprovalTopicName: !Not [!Equals [!Ref ManualApprovalTopicName, ""]]
  CreateManualApprovalTopic: !Not [!Condition HasManualApprovalTopicArn]

Rules:
  RequireArtifactBucketInput:
    Assertions:
      - Assert: !Or
          - !Not [!Equals [!Ref ExistingArtifactBucketName, ""]]
          - !Not [!Equals [!Ref ArtifactBucketName, ""]]
        AssertDescription: Provide ExistingArtifactBucketName or ArtifactBucketName.
      - Assert: !Not
          - !And
            - !Not [!Equals [!Ref ExistingArtifactBucketName, ""]]
            - !Not [!Equals [!Ref ArtifactBucketName, ""]]
        AssertDescription: Provide only one of ExistingArtifactBucketName or ArtifactBucketName.
  RequireArtifactBucketNameWhenCreating:
    RuleCondition: !Equals [!Ref ExistingArtifactBucketName, ""]
    Assertions:
      - Assert: !Not [!Equals [!Ref ArtifactBucketName, ""]]
        AssertDescription: ArtifactBucketName is required when ExistingArtifactBucketName is empty.

Resources:
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Condition: CreateArtifactBucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref ArtifactBucketName
      LifecycleConfiguration:
        Rules:
          - Id: ArtifactBucketLifecyclePolicy
            Status: Enabled
            Prefix: ""
            ExpirationInDays: 30
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Application
          Value: !Ref Application

  CodeConnection:
    Type: AWS::CodeConnections::Connection
    Condition: CreateConnection
    Properties:
      ConnectionName: !Ref ConnectionName
      ProviderType: GitHub

  ManualApprovalTopic:
    Type: AWS::SNS::Topic
    Condition: CreateManualApprovalTopic
    Properties:
      TopicName: !If
        - HasManualApprovalTopicName
        - !Ref ManualApprovalTopicName
        - !Sub ${Project}-${Application}-nova-manual-approval
      KmsMasterKeyId: !Ref ManualApprovalKmsKeyArn

  InternalNpmPackageGroup:
    Type: AWS::CodeArtifact::PackageGroup
    Properties:
      Description: Internal Nova npm namespace origin controls
      DomainName: !Ref CodeArtifactDomainName
      Pattern: !Sub /npm/${CodeArtifactInternalNpmScope}/*
      OriginConfiguration:
        Restrictions:
          Publish:
            RestrictionMode: ALLOW
          ExternalUpstream:
            RestrictionMode: BLOCK
          InternalUpstream:
            RestrictionMode: BLOCK
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Application
          Value: !Ref Application

Outputs:
  ArtifactBucketName:
    Value: !If
      - HasExistingArtifactBucketName
      - !Ref ExistingArtifactBucketName
      - !Ref ArtifactBucket
    Export:
      Name: !Sub "${AWS::StackName}-ArtifactBucketName"

  CodeArtifactDomainName:
    Value: !Ref CodeArtifactDomainName
    Export:
      Name: !Sub "${AWS::StackName}-CodeArtifactDomainName"

  CodeArtifactRepositoryName:
    Value: !Ref CodeArtifactRepositoryName
    Export:
      Name: !Sub "${AWS::StackName}-CodeArtifactRepositoryName"

  EcrRepositoryArn:
    Value: !Ref EcrRepositoryArn
    Export:
      Name: !Sub "${AWS::StackName}-EcrRepositoryArn"

  EcrRepositoryName:
    Value: !Ref EcrRepositoryName
    Export:
      Name: !Sub "${AWS::StackName}-EcrRepositoryName"

  EcrRepositoryUri:
    Value: !Ref EcrRepositoryUri
    Export:
      Name: !Sub "${AWS::StackName}-EcrRepositoryUri"

  ConnectionName:
    Condition: ShouldExportConnectionName
    Value: !Ref ConnectionName
    Export:
      Name: !Sub "${AWS::StackName}-ConnectionName"

  ConnectionArn:
    Value: !If
      - HasExistingConnectionArn
      - !Ref ExistingConnectionArn
      - !GetAtt CodeConnection.ConnectionArn
    Export:
      Name: !Sub "${AWS::StackName}-ConnectionArn"

  ExistingConnectionArn:
    Value: !If
      - HasExistingConnectionArn
      - !Ref ExistingConnectionArn
      - ""
    Export:
      Name: !Sub "${AWS::StackName}-ExistingConnectionArn"

  ManualApprovalTopicArn:
    Value: !If
      - HasManualApprovalTopicArn
      - !Ref ManualApprovalTopicArn
      - !Ref ManualApprovalTopic
    Export:
      Name: !Sub "${AWS::StackName}-ManualApprovalTopicArn"
