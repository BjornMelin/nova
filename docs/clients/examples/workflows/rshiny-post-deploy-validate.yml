name: R Shiny Post Deploy Validate

on:
  workflow_dispatch:
    inputs:
      nova_deploy_output_json:
        description: Nova deploy-output JSON payload to validate.
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    # Pin to immutable workflow revision to prevent mutable tag drift.
    uses: REPLACE_WITH_NOVA_REPO/.github/workflows/reusable-post-deploy-validate.yml@REPLACE_WITH_IMMUTABLE_SHA
    with:
      deploy_repo: REPLACE_WITH_NOVA_REPO
      deploy_output_json: ${{ inputs.nova_deploy_output_json }}
      validation_canonical_paths: /v1/health/live,/v1/health/ready,/v1/capabilities,/v1/releases/info
      validation_legacy_404_paths: /healthz,/readyz,/api/transfers/uploads/initiate,/api/jobs,/api/v1/transfers/uploads/initiate
