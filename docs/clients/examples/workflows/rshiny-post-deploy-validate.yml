name: R Shiny Post Deploy Validate

on:
  workflow_dispatch:
    inputs:
      nova_deploy_run_id:
        description: Nova Deploy Runtime workflow run id to validate.
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    # Pin to immutable workflow revision to prevent mutable tag drift.
    uses: 3M-Cloud/nova/.github/workflows/reusable-post-deploy-validate.yml@<pin-to-an-immutable-revision>
    with:
      deploy_repo: 3M-Cloud/nova
      deploy_run_id: ${{ inputs.nova_deploy_run_id }}
      validation_canonical_paths: /v1/health/live,/v1/health/ready,/metrics/summary,/v1/capabilities,/v1/releases/info
      validation_legacy_404_paths: /healthz,/readyz,/api/transfers/uploads/initiate,/api/jobs,/api/v1/transfers/uploads/initiate
