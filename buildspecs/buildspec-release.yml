version: 0.2

env:
  shell: bash
  exported-variables:
    - FILE_IMAGE_DIGEST
    - AUTH_IMAGE_DIGEST
    - PUBLISHED_PACKAGES
    - RELEASE_MANIFEST_SHA256
    - CHANGED_UNITS
  variables:
    FILE_DOCKERFILE_PATH: apps/nova_file_api_service/Dockerfile
    AUTH_DOCKERFILE_PATH: apps/nova_auth_api_service/Dockerfile
    DOCKER_BUILD_CONTEXT: .

phases:
  install:
    runtime-versions:
      python: "3.12"
    commands:
      - pip install --upgrade pip
      - pip install uv twine

  pre_build:
    commands:
      - set -euo pipefail
      - uv sync --frozen
      - |
        if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
          RELEASE_HEAD_COMMIT="$(git rev-parse HEAD)"
          if ! git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            if git remote get-url origin >/dev/null 2>&1; then
              git fetch --no-tags --depth=2 origin || true
            fi
          fi
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            RELEASE_BASE_COMMIT="$(git rev-parse HEAD^)"
            uv run python -m scripts.release.changed_units \
              --repo-root . \
              --base-commit "$RELEASE_BASE_COMMIT" \
              --head-ref "$RELEASE_HEAD_COMMIT" \
              --output changed-units.json
          else
            echo "Unable to resolve HEAD^; falling back to manifest-driven baseline."
            uv run python -m scripts.release.changed_units \
              --repo-root . \
              --head-ref "$RELEASE_HEAD_COMMIT" \
              --output changed-units.json
          fi
        else
          RELEASE_HEAD_COMMIT="${CODEBUILD_RESOLVED_SOURCE_VERSION:-CODEPIPELINE_ARTIFACT}"
          echo "No git metadata in source artifact; generating first-release changed-units fallback."
          uv run python - <<'PYCODE'
        import os
        from pathlib import Path

        from scripts.release import common

        repo_root = Path(".").resolve()
        units = common.load_workspace_units(repo_root)
        changed_units = [
            {
                "unit_id": unit_id,
                "project": unit.project_name,
                "path": unit_id,
                "version": unit.version,
            }
            for unit_id, unit in sorted(units.items())
        ]
        payload = {
            "schema_version": "1.0",
            "generated_at": common.iso_timestamp(),
            "base_commit": None,
            "head_commit": os.environ.get(
                "CODEBUILD_RESOLVED_SOURCE_VERSION",
                "CODEPIPELINE_ARTIFACT",
            ),
            "first_release": True,
            "changed_files": [],
            "changed_units": changed_units,
        }
        common.write_json(repo_root / "changed-units.json", payload)
        print(
            f"changed-units fallback: first_release=True "
            f"count={len(changed_units)}"
        )
        PYCODE
        fi
      - uv run python -m scripts.release.version_plan --repo-root . --changed-units changed-units.json --output version-plan.json
      - |
        CHANGED_UNITS="$(python - <<'PY'
        import json
        from pathlib import Path

        payload = json.loads(
            Path("changed-units.json").read_text(encoding="utf-8")
        )
        print(
            json.dumps(
                payload["changed_units"],
                separators=(",", ":"),
            )
        )
        PY
        )"
        export CHANGED_UNITS
      - ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
      - REGION="${AWS_REGION:-${AWS_DEFAULT_REGION:-us-east-1}}"
      - ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com"
      - |
        if [ -z "${CODEARTIFACT_DOMAIN:-}" ] || [ -z "${CODEARTIFACT_REPOSITORY:-}" ]; then
          echo "CODEARTIFACT_DOMAIN and CODEARTIFACT_REPOSITORY are required."
          exit 1
        fi
      - aws codeartifact login --tool twine --domain "$CODEARTIFACT_DOMAIN" --domain-owner "$ACCOUNT_ID" --repository "$CODEARTIFACT_REPOSITORY"
      - |
        if [ -z "${ECR_REPOSITORY_URI:-}" ] && [ -n "${ECR_REPOSITORY_NAME:-}" ]; then
          ECR_REPOSITORY_URI="${ECR_REGISTRY}/${ECR_REPOSITORY_NAME}"
        fi
        if [ -z "${ECR_REPOSITORY_URI:-}" ]; then
          echo "ECR_REPOSITORY_URI or ECR_REPOSITORY_NAME must be set."
          exit 1
        fi
        if [ -z "${ECR_REPOSITORY_NAME:-}" ]; then
          ECR_REPOSITORY_NAME="${ECR_REPOSITORY_URI#*/}"
        fi
        export ECR_REPOSITORY_URI ECR_REPOSITORY_NAME
      - aws ecr get-login-password --region "$REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

  build:
    commands:
      - |
        set -euo pipefail
        PUBLISHED_PACKAGES=""
        mapfile -t UNITS < <(python - <<'PY'
        import json
        from pathlib import Path

        payload = json.loads(
            Path("changed-units.json").read_text(encoding="utf-8")
        )
        for item in payload.get("changed_units", []):
            unit_path = str(item.get("path", ""))
            if unit_path.startswith("packages/"):
                print(unit_path)
        PY
        )
        for unit in "${UNITS[@]}"; do
          [ -n "$unit" ] || continue
          uv build "$unit" --out-dir "$unit/dist" --clear
          mapfile -t DIST_FILES < <(
            find "$unit/dist" -maxdepth 1 -type f \
              \( -name '*.whl' -o -name '*.tar.gz' \) | sort
          )
          if [ "${#DIST_FILES[@]}" -eq 0 ]; then
            echo "No build artifacts for $unit"
            exit 1
          fi
          twine upload --repository codeartifact --non-interactive "${DIST_FILES[@]}"
          if [ -n "$PUBLISHED_PACKAGES" ]; then
            PUBLISHED_PACKAGES="$PUBLISHED_PACKAGES,$unit"
          else
            PUBLISHED_PACKAGES="$unit"
          fi
        done
        export PUBLISHED_PACKAGES
      - |
        IMAGE_TAG_BASE="${IMAGE_TAG:-${CODEBUILD_RESOLVED_SOURCE_VERSION:-manual}}"

        build_and_resolve_digest() {
          local dockerfile_path="$1"
          local image_tag="$2"
          docker build \
            -f "${dockerfile_path}" \
            -t "${ECR_REPOSITORY_URI}:${image_tag}" \
            "${DOCKER_BUILD_CONTEXT}"
          docker push "${ECR_REPOSITORY_URI}:${image_tag}"
          aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY_NAME}" \
            --image-ids imageTag="${image_tag}" \
            --query 'imageDetails[0].imageDigest' \
            --output text
        }

        FILE_IMAGE_DIGEST="$(build_and_resolve_digest "${FILE_DOCKERFILE_PATH}" "${IMAGE_TAG_BASE}-file")"
        AUTH_IMAGE_DIGEST="$(build_and_resolve_digest "${AUTH_DOCKERFILE_PATH}" "${IMAGE_TAG_BASE}-auth")"

        if [ -z "$FILE_IMAGE_DIGEST" ] || [ "$FILE_IMAGE_DIGEST" = "None" ]; then
          echo "Unable to resolve pushed file API image digest."
          exit 1
        fi
        if [ -z "$AUTH_IMAGE_DIGEST" ] || [ "$AUTH_IMAGE_DIGEST" = "None" ]; then
          echo "Unable to resolve pushed auth API image digest."
          exit 1
        fi
        export FILE_IMAGE_DIGEST AUTH_IMAGE_DIGEST

  post_build:
    commands:
      - set -euo pipefail
      - test -f docs/plan/release/RELEASE-VERSION-MANIFEST.md
      - RELEASE_MANIFEST_SHA256="$(sha256sum docs/plan/release/RELEASE-VERSION-MANIFEST.md | awk '{print $1}')"
      - export RELEASE_MANIFEST_SHA256

artifacts:
  files:
    - changed-units.json
    - version-plan.json
    - docs/plan/release/RELEASE-VERSION-MANIFEST.md
