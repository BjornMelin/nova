version: 0.2

env:
  shell: bash
  exported-variables:
    - VALIDATION_STATUS

phases:
  install:
    runtime-versions:
      python: "3.12"
    commands:
      - python3 --version

  pre_build:
    commands:
      - test -n "${VALIDATION_BASE_URL:-${SERVICE_BASE_URL:-}}"

  build:
    commands:
      - |
        set -euo pipefail
        if python3 scripts/release/validate_route_contract.py \
          --report-path deploy-validation-report.json
        then
          export VALIDATION_STATUS=passed
        else
          export VALIDATION_STATUS=failed
          exit 1
        fi

artifacts:
  files:
    - deploy-validation-report.json
    - docs/release/RELEASE-VERSION-MANIFEST.md
