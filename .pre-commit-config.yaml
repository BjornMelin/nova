fail_fast: false
minimum_pre_commit_version: "3.2.0"
default_install_hook_types:
  - pre-commit
  - pre-push
default_stages:
  - pre-commit

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-json
      - id: check-toml

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.12
    hooks:
      - id: uv-lock

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.36.1
    hooks:
      - id: check-github-workflows
      - id: check-github-actions

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.10
    hooks:
      - id: actionlint

  - repo: https://github.com/aws-cloudformation/cfn-lint
    rev: v1.46.0
    hooks:
      - id: cfn-lint
        files: ^infra/(nova/.*\.yml|runtime/.*\.yml)$

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck

  - repo: https://github.com/crate-ci/typos
    rev: v1.43.3
    hooks:
      - id: typos

  - repo: local
    hooks:
      - id: typing-gates
        name: typing gates
        entry: scripts/checks/run_typing_gates.sh
        language: system
        pass_filenames: false
        stages: [pre-push, manual]
      - id: quality-gates
        name: quality gates
        entry: scripts/checks/run_quality_gates.sh
        language: system
        pass_filenames: false
        stages: [manual]
      - id: sdk-conformance
        name: sdk conformance
        entry: scripts/checks/run_sdk_conformance.sh
        language: system
        pass_filenames: false
        stages: [manual]
      - id: infra-contracts
        name: infra contracts
        entry: scripts/checks/run_infra_contracts.sh
        language: system
        pass_filenames: false
        stages: [manual]
      - id: docker-release-images
        name: docker release images
        entry: scripts/checks/run_docker_release_images.sh
        language: system
        pass_filenames: false
        stages: [manual]
