name: Reusable Post Deploy Validate

on:
  workflow_call:
    inputs:
      deploy_run_id:
        description: Workflow run id that produced the authoritative deploy-output artifact.
        required: false
        type: string
      deploy_repo:
        description: Repository that owns the deploy-output artifact (owner/repo).
        required: false
        default: ""
        type: string
      deploy_artifact_name:
        description: Artifact name containing deploy-output.json and deploy-output.sha256.
        required: false
        default: deploy-output
        type: string
      deploy_output_json:
        description: Optional inline deploy-output JSON payload.
        required: false
        default: ""
        type: string
      deploy_output_path:
        description: Optional workspace path to a pre-fetched deploy-output JSON file.
        required: false
        default: ""
        type: string
      aws_role_to_assume:
        description: Optional read-only AWS role ARN used for live runtime observability checks.
        required: false
        default: ""
        type: string
      validation_canonical_paths:
        description: Comma-delimited public canonical paths that must satisfy runtime truth checks.
        required: false
        default: /v1/health/live,/v1/health/ready,/v1/capabilities,/v1/releases/info
        type: string
      validation_protected_paths:
        description: Comma-delimited auth-gate probes in METHOD /path form.
        required: false
        default: POST /v1/exports
        type: string
      validation_legacy_404_paths:
        description: Comma-delimited legacy paths that must return 404.
        required: false
        default: /healthz,/readyz,/api/transfers/uploads/initiate,/api/jobs,/api/v1/transfers/uploads/initiate
        type: string
      validation_cors_preflight_path:
        description: Protected path used for browser CORS preflight validation.
        required: false
        default: /v1/exports
        type: string
      validation_cors_origin:
        description: Origin used when validating browser CORS preflight behavior.
        required: false
        default: ""
        type: string
      report_path:
        description: JSON report output path in the workflow workspace.
        required: false
        default: post-deploy-validation-report.json
        type: string
      artifact_name:
        description: Uploaded artifact name for the validation report.
        required: false
        default: post-deploy-validation-report
        type: string
    outputs:
      validation_status:
        description: Validation status from deploy-output-bound runtime truth checks (passed|failed).
        value: ${{ jobs.post-deploy-validate.outputs.validation_status }}
      aws_runtime_checks_status:
        description: Status from optional AWS-backed runtime observability checks (passed|failed|skipped).
        value: ${{ jobs.post-deploy-validate.outputs.aws_runtime_checks_status }}
      report_path:
        description: Report path used when writing the JSON validation output.
        value: ${{ jobs.post-deploy-validate.outputs.report_path }}
      artifact_name:
        description: Uploaded artifact name containing the validation report.
        value: ${{ jobs.post-deploy-validate.outputs.artifact_name }}

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  post-deploy-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      validation_status: ${{ steps.set-outputs.outputs.validation_status }}
      aws_runtime_checks_status: ${{ steps.set-outputs.outputs.aws_runtime_checks_status }}
      report_path: ${{ steps.set-outputs.outputs.report_path }}
      artifact_name: ${{ steps.set-outputs.outputs.artifact_name }}
    steps:
      - name: Resolve workflow source repository
        id: workflow-source
        run: |
          set -euo pipefail
          workflow_ref="${GITHUB_WORKFLOW_REF}"
          workflow_repo="${workflow_ref%%/.github/workflows/*}"
          if [[ -z "${workflow_repo}" || "${workflow_repo}" == "${workflow_ref}" ]]; then
            echo "Unable to parse workflow repository from GITHUB_WORKFLOW_REF=${workflow_ref}" >&2
            exit 1
          fi
          echo "workflow_repo=${workflow_repo}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          repository: ${{ steps.workflow-source.outputs.workflow_repo }}
          ref: ${{ github.workflow_sha }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # astral-sh/setup-uv@v8.0.0
        with:
          version-file: pyproject.toml
          enable-cache: true
          prune-cache: true

      - name: Sync
        run: uv sync --locked --all-packages --all-extras --dev

      - id: prepare-deploy-output
        name: Prepare deploy-output authority input
        env:
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_DEPLOY_ARTIFACT_NAME: ${{ inputs.deploy_artifact_name }}
          INPUT_DEPLOY_OUTPUT_JSON: ${{ inputs.deploy_output_json }}
          INPUT_DEPLOY_OUTPUT_PATH: ${{ inputs.deploy_output_path }}
          INPUT_DEPLOY_REPO: ${{ inputs.deploy_repo }}
          INPUT_DEPLOY_RUN_ID: ${{ inputs.deploy_run_id }}
        run: |
          set -euo pipefail
          mkdir -p .artifacts/deploy-output

          deploy_output_path=""
          deploy_output_sha256_path=""
          source_count=0

          if [[ -n "${INPUT_DEPLOY_RUN_ID}" ]]; then
            source_count=$((source_count + 1))
            deploy_repo="${INPUT_DEPLOY_REPO}"
            if [[ -z "${deploy_repo}" ]]; then
              deploy_repo="${GITHUB_REPOSITORY}"
            fi
            uv run python -m scripts.release.download_run_artifact \
              --repo "${deploy_repo}" \
              --run-id "${INPUT_DEPLOY_RUN_ID}" \
              --artifact-name "${INPUT_DEPLOY_ARTIFACT_NAME}" \
              --output-dir .artifacts/deploy-output
            deploy_output_path=".artifacts/deploy-output/deploy-output.json"
            deploy_output_sha256_path=".artifacts/deploy-output/deploy-output.sha256"
          fi

          if [[ -n "${INPUT_DEPLOY_OUTPUT_JSON}" ]]; then
            source_count=$((source_count + 1))
            deploy_output_path=".artifacts/deploy-output/deploy-output-inline.json"
            uv run python -c 'import json, os; from pathlib import Path; payload = json.loads(os.environ["INPUT_DEPLOY_OUTPUT_JSON"]); Path(".artifacts/deploy-output/deploy-output-inline.json").write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")'
          fi

          if [[ -n "${INPUT_DEPLOY_OUTPUT_PATH}" ]]; then
            source_count=$((source_count + 1))
            if [[ ! -f "${INPUT_DEPLOY_OUTPUT_PATH}" ]]; then
              echo "deploy_output_path does not exist: ${INPUT_DEPLOY_OUTPUT_PATH}" >&2
              exit 1
            fi
            deploy_output_path="${INPUT_DEPLOY_OUTPUT_PATH}"
            sibling_sha256="${INPUT_DEPLOY_OUTPUT_PATH%.json}.sha256"
            if [[ -f "${sibling_sha256}" ]]; then
              deploy_output_sha256_path="${sibling_sha256}"
            fi
          fi

          if [[ "${source_count}" -ne 1 ]]; then
            echo "Provide exactly one deploy-output source: deploy_run_id, deploy_output_json, or deploy_output_path." >&2
            exit 1
          fi

          if [[ ! -f "${deploy_output_path}" ]]; then
            echo "Resolved deploy-output path is missing: ${deploy_output_path}" >&2
            exit 1
          fi

          echo "deploy_output_path=${deploy_output_path}" >> "$GITHUB_OUTPUT"
          echo "deploy_output_sha256_path=${deploy_output_sha256_path}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials for live runtime checks
        if: inputs.aws_role_to_assume != ''
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-region: us-east-1
          role-to-assume: ${{ inputs.aws_role_to_assume }}
          role-session-name: ${{ github.run_id }}
          unset-current-credentials: true

      - id: run-validation
        name: Validate runtime against deploy-output authority
        continue-on-error: true
        env:
          AWS_RUNTIME_CHECKS_MODE: ${{ inputs.aws_role_to_assume != '' && 'required' || 'skip' }}
        run: |
          set -euo pipefail
          validation_args=(
            --deploy-output-path "${{ steps.prepare-deploy-output.outputs.deploy_output_path }}"
            --canonical-paths "${{ inputs.validation_canonical_paths }}"
            --protected-paths "${{ inputs.validation_protected_paths }}"
            --legacy-404-paths "${{ inputs.validation_legacy_404_paths }}"
            --cors-preflight-path "${{ inputs.validation_cors_preflight_path }}"
            --cors-origin "${{ inputs.validation_cors_origin }}"
            --aws-runtime-checks "${AWS_RUNTIME_CHECKS_MODE}"
            --report-path "${{ inputs.report_path }}"
          )
          if [[ -n "${{ steps.prepare-deploy-output.outputs.deploy_output_sha256_path }}" ]]; then
            validation_args+=(
              --deploy-output-sha256-path "${{ steps.prepare-deploy-output.outputs.deploy_output_sha256_path }}"
            )
          fi
          uv run python scripts/release/validate_runtime_release.py "${validation_args[@]}"

      - id: set-outputs
        if: always()
        env:
          VALIDATION_STEP_OUTCOME: ${{ steps.run-validation.outcome }}
        run: |
          set -euo pipefail
          validation_status="failed"
          aws_runtime_checks_status="skipped"
          if [[ -f "${{ inputs.report_path }}" ]]; then
            aws_runtime_checks_status="$(
              uv run python -c 'import json, pathlib, sys
              report = json.loads(
                  pathlib.Path(sys.argv[1]).read_text(encoding="utf-8")
              )
              print(report.get("aws_runtime_checks_status", "skipped"))' \
                "${{ inputs.report_path }}"
            )"
          fi
          if [[ "$VALIDATION_STEP_OUTCOME" == "success" ]]; then
            validation_status="passed"
          fi
          echo "validation_status=${validation_status}" >> "$GITHUB_OUTPUT"
          echo "aws_runtime_checks_status=${aws_runtime_checks_status}" >> "$GITHUB_OUTPUT"
          echo "report_path=${{ inputs.report_path }}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${{ inputs.artifact_name }}" >> "$GITHUB_OUTPUT"

      - id: report-exists
        if: always()
        run: |
          set -euo pipefail
          if [[ -f "${{ inputs.report_path }}" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - if: always() && steps.report-exists.outputs.exists == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.report_path }}

      - name: Fail job when runtime truth validation fails
        if: steps.run-validation.outcome != 'success'
        run: |
          echo "Post-deploy runtime validation failed." >&2
          exit 1
