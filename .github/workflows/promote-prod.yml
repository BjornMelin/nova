name: Promote Prod

on:
  workflow_dispatch:
    inputs:
      pipeline_name:
        description: AWS CodePipeline name
        required: true
        type: string
      manifest_sha256:
        description: SHA256 for docs/plan/release/RELEASE-VERSION-MANIFEST.md
        required: true
        type: string
      changed_units_json:
        description: JSON object from staged gate artifact
        required: true
        type: string
      version_plan_json:
        description: JSON object from staged gate artifact
        required: true
        type: string
      promotion_candidates_json:
        description: JSON array from codeartifact-promotion-candidates artifact
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  promote-prod:
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/reusable-promote-prod.yml
    with:
      pipeline_name: ${{ inputs.pipeline_name }}
      manifest_sha256: ${{ inputs.manifest_sha256 }}
      changed_units_json: ${{ inputs.changed_units_json }}
      version_plan_json: ${{ inputs.version_plan_json }}
      promotion_candidates_json: ${{ inputs.promotion_candidates_json }}
      codeartifact_domain: ${{ vars.CODEARTIFACT_DOMAIN }}
      codeartifact_staging_repository: ${{ vars.CODEARTIFACT_STAGING_REPOSITORY }}
      codeartifact_prod_repository: ${{ vars.CODEARTIFACT_PROD_REPOSITORY }}
      aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
    secrets:
      release_aws_role_arn: ${{ secrets.RELEASE_AWS_ROLE_ARN }}
