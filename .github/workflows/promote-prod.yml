name: Promote Prod

on:
  workflow_dispatch:
    inputs:
      pipeline_name:
        description: AWS CodePipeline name
        required: true
        type: string
      token:
        description: Approval token from get-pipeline-state output
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  promote-prod:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      RELEASE_AWS_ROLE_ARN: ${{ secrets.RELEASE_AWS_ROLE_ARN }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.RELEASE_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          aws codepipeline put-approval-result \
            --pipeline-name "${{ inputs.pipeline_name }}" \
            --stage-name "ManualApproval" \
            --action-name "ApproveProdPromotion" \
            --token "${{ inputs.token }}" \
            --result summary="Approved via promote-prod workflow",status=Approved
