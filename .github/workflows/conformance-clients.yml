name: Conformance Clients

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  generated-clients:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"
      - name: Verify generated TS/R client catalogs
        run: uv run python scripts/release/generate_clients.py --check
      - name: Verify generated OpenAPI artifacts
        run: uv run python scripts/contracts/export_openapi.py --check
      - name: Verify generated Python SDK artifacts
        run: uv run python scripts/release/generate_python_clients.py --check

  typescript-core-packages:
    runs-on: ubuntu-latest
    needs: generated-clients
    strategy:
      matrix:
        package_name:
          - "@nova/sdk-fetch"
          - "@nova/sdk-file-core"
          - "@nova/sdk-auth-core"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install package dependencies
        run: npm ci
      - name: Build sdk-fetch dependency graph
        run: npm run -w @nova/sdk-fetch build
      - name: Typecheck package
        run: npm run -w ${{ matrix.package_name }} typecheck

  typescript-sdk-smoke:
    runs-on: ubuntu-latest
    needs: generated-clients
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build TypeScript SDK packages
        run: |
          set -euo pipefail
          for pkg in \
            packages/nova_sdk_fetch \
            packages/nova_sdk_file_core \
            packages/nova_sdk_auth_core
          do
            (
              cd "$pkg"
              npm install --no-package-lock
              npm run build
            )
          done
      - name: Smoke test TypeScript SDK exports
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT
          cd "${tmp_dir}"
          cat > package.json <<'EOF'
          {
            "name": "nova-typescript-sdk-smoke",
            "private": true,
            "type": "module"
          }
          EOF
          npm install --no-package-lock \
            "${GITHUB_WORKSPACE}/packages/nova_sdk_fetch" \
            "${GITHUB_WORKSPACE}/packages/nova_sdk_file_core" \
            "${GITHUB_WORKSPACE}/packages/nova_sdk_auth_core"
          node --input-type=module <<'EOF'
          import { buildOperationUrl as buildAuthUrl, operations as authOperations } from "@nova/sdk-auth-core";
          import { buildOperationUrl as buildFileUrl, operations as fileOperations } from "@nova/sdk-file-core";
          import { buildOperationDescriptorUrl } from "@nova/sdk-fetch";

          const legacyFileUrl = buildFileUrl(
            "https://nova.example/",
            "/v1/jobs/{job_id}",
            { job_id: "job-123" },
            { include: "events" },
          );
          if (
            legacyFileUrl
            !== "https://nova.example/v1/jobs/job-123?include=events"
          ) {
            throw new Error(`unexpected legacy file URL: ${legacyFileUrl}`);
          }

          const legacyAuthUrl = buildAuthUrl(
            "https://nova.example/",
            authOperations.verify_token.path,
          );
          if (legacyAuthUrl !== "https://nova.example/v1/token/verify") {
            throw new Error(`unexpected legacy auth URL: ${legacyAuthUrl}`);
          }

          const descriptorUrl = buildOperationDescriptorUrl(
            "https://nova.example/",
            fileOperations.get_job_status,
            { job_id: "job-123" },
            { include: "events" },
          );
          if (
            descriptorUrl
            !== "https://nova.example/v1/jobs/job-123?include=events"
          ) {
            throw new Error(`unexpected descriptor URL: ${descriptorUrl}`);
          }
          EOF

  dash-conformance:
    runs-on: ubuntu-latest
    needs: generated-clients
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"
      - name: Validate Dash lane fixtures
        run: uv run python scripts/conformance/validate_lane.py --lane dash
      - name: Validate contract fixtures against runtime models
        run: uv run pytest -q scripts/release/tests/test_contract_fixtures_v1.py

  shiny-conformance:
    runs-on: ubuntu-latest
    needs: generated-clients
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"
      - name: Validate Shiny lane fixtures
        run: uv run python scripts/conformance/validate_lane.py --lane shiny
      - uses: r-lib/actions/setup-r@v2
      - name: Source generated R file SDK
        run: |
          Rscript -e 'source("packages/nova_sdk_r_file/R/generated.R"); source("packages/nova_sdk_r_file/R/client.R"); stopifnot(length(nova_file_operation_catalog()) > 0L)'
      - name: Source generated R auth SDK
        run: |
          Rscript -e 'source("packages/nova_sdk_r_auth/R/generated.R"); source("packages/nova_sdk_r_auth/R/client.R"); stopifnot(length(nova_auth_operation_catalog()) > 0L)'

  typescript-conformance:
    runs-on: ubuntu-latest
    needs: generated-clients
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install TypeScript conformance dependencies
        run: npm ci
      - name: Typecheck TypeScript conformance and generated catalogs
        run: npm run -w @nova/contracts-ts-conformance typecheck
      - name: Verify TypeScript fixture conformance
        run: npm run -w @nova/contracts-ts-conformance verify
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"
      - name: Validate TypeScript lane fixtures
        run: uv run python scripts/conformance/validate_lane.py --lane typescript
