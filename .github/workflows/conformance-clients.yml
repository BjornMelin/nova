name: Conformance Clients

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: conformance-clients-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  classify-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      changed_files_json: ${{ steps.scope.outputs.changed_files_json }}
      affected_units_json: ${{ steps.scope.outputs.affected_units_json }}
      run_generated_clients: ${{ steps.scope.outputs.run_generated_clients }}
      run_dash_conformance: ${{ steps.scope.outputs.run_dash_conformance }}
      run_shiny_conformance: ${{ steps.scope.outputs.run_shiny_conformance }}
      run_typescript_conformance: ${{ steps.scope.outputs.run_typescript_conformance }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect workflow scopes
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.sha }}
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          python3 scripts/ci/detect_workflow_scopes.py \
            --event-name "${EVENT_NAME}" \
            --head-sha "${HEAD_SHA}" \
            --base-sha "${BASE_SHA}"

  generated-clients:
    needs: classify-changes
    if: >-
      github.event_name == 'push' ||
      needs.classify-changes.outputs.run_generated_clients == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"
          save-cache: "false"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install root npm dependencies
        run: npm ci
      - name: Enforce TypeScript module policy
        run: uv run python scripts/conformance/check_typescript_module_policy.py
      - name: Verify generated TS/R client catalogs
        run: uv run python scripts/release/generate_clients.py --check
      - name: Verify generated OpenAPI artifacts
        run: uv run python scripts/contracts/export_openapi.py --check
      - name: Verify generated Python SDK artifacts
        run: uv run python scripts/release/generate_python_clients.py --check

  typescript-core-packages:
    needs:
      - classify-changes
      - generated-clients
    if: >-
      github.event_name == 'push' ||
      needs.classify-changes.outputs.run_typescript_conformance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install package dependencies
        run: npm ci
      - name: Build TypeScript SDK dependency graph
        run: npm run build:typescript:sdk-graph
      - name: Typecheck packages
        run: |
          npm run -w @nova/sdk-fetch typecheck
          npm run -w @nova/sdk-file typecheck
      - name: Pack TypeScript SDK tarballs
        run: |
          set -euo pipefail
          mkdir -p .artifacts/npm
          npm pack -w @nova/sdk-fetch --pack-destination .artifacts/npm
          npm pack -w @nova/sdk-file --pack-destination .artifacts/npm
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: ts-sdk-tarballs
          path: .artifacts/npm/*.tgz

  typescript-sdk-smoke:
    needs:
      - classify-changes
      - typescript-core-packages
    if: >-
      github.event_name == 'push' ||
      needs.classify-changes.outputs.run_typescript_conformance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # actions/download-artifact@v4
        with:
          name: ts-sdk-tarballs
          path: .artifacts/npm
      - name: Smoke test TypeScript SDK exports
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT
          cd "${tmp_dir}"
          cat > package.json <<'PKGEOF'
          {
            "name": "nova-typescript-sdk-smoke",
            "private": true,
            "type": "module"
          }
          PKGEOF
          npm install --no-package-lock "${GITHUB_WORKSPACE}/.artifacts/npm/"*.tgz
          node --input-type=module <<'NODEEOF'
          import { createNovaFileClient } from "@nova/sdk-file/client";
          import { operations as fileOperations } from "@nova/sdk-file/operations";
          import { buildOperationDescriptorUrl, buildOperationUrl } from "@nova/sdk-fetch/url";

          const fileUrl = buildOperationUrl(
            "https://nova.example/",
            "/v1/jobs/{job_id}",
            { job_id: "job-123" },
            { include: "events" },
          );
          if (fileUrl !== "https://nova.example/v1/jobs/job-123?include=events") {
            throw new Error(`unexpected file URL: ${fileUrl}`);
          }

          const descriptorUrl = buildOperationDescriptorUrl(
            "https://nova.example/",
            fileOperations.get_job_status,
            { job_id: "job-123" },
            { include: "events" },
          );
          if (descriptorUrl !== "https://nova.example/v1/jobs/job-123?include=events") {
            throw new Error(`unexpected descriptor URL: ${descriptorUrl}`);
          }

          if ("update_job_result" in fileOperations) {
            throw new Error("internal file operation leaked into public SDK");
          }

          const fileClient = createNovaFileClient({
            baseUrl: "https://nova.example/",
            fetchImpl: async (input) => {
              const url = typeof input === "string" ? input : input instanceof URL ? input.toString() : input.url;
              if (url !== "https://nova.example/v1/jobs/job-123") {
                throw new Error(`unexpected file client URL: ${url}`);
              }
              return new Response(JSON.stringify({
                job: {
                  job_id: "job-123",
                  status: "queued",
                  created_at: "2026-03-09T00:00:00Z",
                  updated_at: "2026-03-09T00:00:00Z",
                  events: [],
                },
              }), {
                status: 200,
                headers: { "content-type": "application/json" },
              });
            },
          });
          const fileResponse = await fileClient.get_job_status({
            pathParams: { job_id: "job-123" },
          });
          if (!fileResponse.ok || fileResponse.data?.job?.job_id !== "job-123") {
            throw new Error("unexpected file client response");
          }
          NODEEOF

  dash-conformance:
    needs:
      - classify-changes
      - generated-clients
    if: >-
      github.event_name == 'push' ||
      needs.classify-changes.outputs.run_dash_conformance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"
          save-cache: "false"
      - name: Validate Dash lane fixtures
        run: uv run python scripts/conformance/validate_lane.py --lane dash
      - name: Validate contract fixtures against runtime models
        run: uv run pytest -q scripts/release/tests/test_contract_fixtures_v1.py

  shiny-conformance:
    needs:
      - classify-changes
      - generated-clients
    if: >-
      github.event_name == 'push' ||
      needs.classify-changes.outputs.run_shiny_conformance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"
          save-cache: "false"
      - name: Validate Shiny lane fixtures
        run: uv run python scripts/conformance/validate_lane.py --lane shiny
      - uses: r-lib/actions/setup-r@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.2"
      - name: Install R dependencies for nova.sdk.r.file
        uses: r-lib/actions/setup-r-dependencies@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: packages/nova_sdk_r_file
      - name: Build and check generated R SDK packages
        run: |
          set -euo pipefail
          bash scripts/checks/verify_r_cmd_check.sh packages/nova_sdk_r_file

  typescript-conformance:
    needs:
      - classify-changes
      - generated-clients
    if: >-
      github.event_name == 'push' ||
      needs.classify-changes.outputs.run_typescript_conformance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install TypeScript conformance dependencies
        run: npm ci
      - name: Typecheck TypeScript conformance and generated catalogs
        run: npm run -w @nova/contracts-ts-conformance typecheck
      - name: Build TypeScript SDK dependency graph
        run: npm run build:typescript:sdk-graph
      - name: Verify TypeScript fixture conformance
        run: npm run -w @nova/contracts-ts-conformance verify
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"
          save-cache: "false"
      - name: Validate TypeScript lane fixtures
        run: uv run python scripts/conformance/validate_lane.py --lane typescript
