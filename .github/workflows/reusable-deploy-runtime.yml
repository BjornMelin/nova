name: Reusable Deploy Runtime

on:
  workflow_call:
    inputs:
      app_type:
        description: Runtime app type lane (dash, rshiny, react-next).
        required: true
        type: string
      environment:
        description: Runtime environment label.
        required: true
        type: string
      stack_name:
        description: CloudFormation runtime stack name.
        required: true
        type: string
      template_file:
        description: Runtime CloudFormation template path.
        required: true
        type: string
      parameter_file:
        description: Optional JSON parameter file path.
        required: false
        default: ""
        type: string
      image_digest:
        description: Optional image digest override.
        required: false
        default: ""
        type: string
      size_profile:
        description: Size profile (small, medium, large, custom).
        required: false
        default: medium
        type: string
      runtime_cost_mode:
        description: Runtime cost posture (standard, saver, paused).
        required: true
        type: string
      enable_worker:
        description: Worker lane toggle.
        required: false
        default: false
        type: boolean
      custom_container_port:
        description: Custom container port for size_profile=custom.
        required: false
        default: 0
        type: number
      custom_task_cpu:
        description: Custom task cpu for size_profile=custom.
        required: false
        default: 0
        type: number
      custom_task_memory:
        description: Custom task memory for size_profile=custom.
        required: false
        default: 0
        type: number
      custom_desired_count:
        description: Custom desired count for size_profile=custom.
        required: false
        default: 0
        type: number
      approval_environment:
        description: Optional GitHub environment for approval policies.
        required: false
        default: ""
        type: string
      aws_region:
        description: AWS region.
        required: false
        default: us-east-1
        type: string
      capabilities:
        description: CloudFormation capabilities.
        required: false
        default: CAPABILITY_NAMED_IAM
        type: string
      pipeline_name:
        description: Optional pipeline name for evidence collection.
        required: false
        default: ""
        type: string
    secrets:
      deploy_role_arn:
        description: OIDC-assumable role for deployment.
        required: true
      cfn_execution_role_arn:
        description: Optional CloudFormation service role ARN.
        required: false
    outputs:
      stack_name:
        description: Stack name.
        value: ${{ jobs.deploy.outputs.stack_name }}
      change_set_name:
        description: Change set name used for deployment.
        value: ${{ jobs.deploy.outputs.change_set_name }}
      pipeline_execution_id:
        description: Optional pipeline execution id when orchestration calls pipeline APIs.
        value: ${{ jobs.deploy.outputs.pipeline_execution_id }}
      validation_report_path:
        description: Validation/evidence artifact path.
        value: ${{ jobs.deploy.outputs.validation_report_path }}
      manifest_sha256:
        description: Optional immutable release manifest hash (when supplied by caller).
        value: ${{ jobs.deploy.outputs.manifest_sha256 }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      stack_name: ${{ steps.outputs.outputs.stack_name }}
      change_set_name: ${{ steps.deploy.outputs.change-set-name }}
      pipeline_execution_id: ${{ steps.outputs.outputs.pipeline_execution_id }}
      validation_report_path: ${{ steps.outputs.outputs.validation_report_path }}
      manifest_sha256: ${{ steps.outputs.outputs.manifest_sha256 }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: ./.github/actions/configure-aws-oidc
        with:
          role-to-assume: ${{ secrets.deploy_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - id: profile
        name: Resolve runtime size profile
        uses: ./.github/actions/resolve-size-profile
        with:
          app-type: ${{ inputs.app_type }}
          size-profile: ${{ inputs.size_profile }}
          custom-container-port: ${{ inputs.custom_container_port }}
          custom-task-cpu: ${{ inputs.custom_task_cpu }}
          custom-task-memory: ${{ inputs.custom_task_memory }}
          custom-desired-count: ${{ inputs.custom_desired_count }}

      - name: Build CloudFormation parameter payload
        env:
          PARAMETER_FILE: ${{ inputs.parameter_file }}
          ENVIRONMENT: ${{ inputs.environment }}
          IMAGE_DIGEST: ${{ inputs.image_digest }}
          ENABLE_WORKER: ${{ inputs.enable_worker }}
          RUNTIME_COST_MODE: ${{ inputs.runtime_cost_mode }}
          CONTAINER_PORT: ${{ steps.profile.outputs.container-port }}
          TASK_CPU: ${{ steps.profile.outputs.task-cpu }}
          TASK_MEMORY: ${{ steps.profile.outputs.task-memory }}
          DESIRED_COUNT: ${{ steps.profile.outputs.desired-count }}
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload: dict[str, str] = {}
          src = os.environ.get("PARAMETER_FILE", "").strip()
          if src:
            data = json.loads(Path(src).read_text(encoding="utf-8"))
            if isinstance(data, list):
              for item in data:
                key = item.get("ParameterKey")
                value = item.get("ParameterValue")
                if key is not None and value is not None:
                  payload[str(key)] = str(value)
            elif isinstance(data, dict):
              for k, v in data.items():
                payload[str(k)] = str(v)
            else:
              raise SystemExit("parameter_file must contain JSON object or parameter list")

          runtime_cost_mode = os.environ["RUNTIME_COST_MODE"].strip()
          if runtime_cost_mode not in {"standard", "saver", "paused"}:
              raise SystemExit(
                  "runtime_cost_mode must be one of: standard, saver, paused"
              )

          container_port = int(os.environ["CONTAINER_PORT"])
          task_cpu = int(os.environ["TASK_CPU"])
          task_memory = int(os.environ["TASK_MEMORY"])
          desired_count = int(os.environ["DESIRED_COUNT"])
          enable_worker = os.environ["ENABLE_WORKER"].lower() == "true"

          if runtime_cost_mode == "saver":
              task_cpu = 512
              task_memory = 1024
              desired_count = 1
          elif runtime_cost_mode == "paused":
              desired_count = 0
              enable_worker = False

          payload["Environment"] = os.environ["ENVIRONMENT"]
          payload["DockerContainerPort"] = str(container_port)
          payload["TaskCpu"] = str(task_cpu)
          payload["TaskMemory"] = str(task_memory)
          payload["DesiredCount"] = str(desired_count)
          payload["EnableWorker"] = "true" if enable_worker else "false"

          image_digest = os.environ.get("IMAGE_DIGEST", "").strip()
          if image_digest:
            payload["ImageDigest"] = image_digest

          rows = [
            {"ParameterKey": key, "ParameterValue": value}
            for key, value in sorted(payload.items())
          ]
          Path(".artifacts/runtime-parameters.json").write_text(
            json.dumps(rows, indent=2), encoding="utf-8"
          )
          PY

      - id: deploy
        name: Deploy runtime stack (change-set first)
        uses: ./.github/actions/cfn-change-set-lifecycle
        with:
          stack-name: ${{ inputs.stack_name }}
          template-file: ${{ inputs.template_file }}
          parameters-file: .artifacts/runtime-parameters.json
          capabilities: ${{ inputs.capabilities }}
          aws-region: ${{ inputs.aws_region }}
          execution-role-arn: ${{ secrets.cfn_execution_role_arn }}

      - name: Collect deploy evidence
        uses: ./.github/actions/collect-deploy-evidence
        with:
          stack-name: ${{ inputs.stack_name }}
          aws-region: ${{ inputs.aws_region }}
          pipeline-name: ${{ inputs.pipeline_name }}
          output-file: .artifacts/deploy-evidence.json

      - id: outputs
        run: |
          set -euo pipefail
          manifest_sha256="$(sha256sum .artifacts/deploy-evidence.json | awk '{print $1}')"
          # This workflow does not invoke pipeline APIs, so no execution id is available.
          pipeline_execution_id=""
          {
            echo "stack_name=${{ inputs.stack_name }}"
            echo "pipeline_execution_id=${pipeline_execution_id}"
            echo "validation_report_path=.artifacts/deploy-evidence.json"
            echo "manifest_sha256=${manifest_sha256}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload deploy evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: deploy-evidence
          path: .artifacts/deploy-evidence.json
