name: Reusable Deploy Runtime

on:
  workflow_call:
    inputs:
      release_apply_run_id:
        description: Workflow run id for the immutable release-apply artifacts.
        required: true
        type: string
      release_apply_artifact_name:
        description: Artifact name containing immutable release-apply outputs.
        required: false
        default: release-apply-artifacts
        type: string
      api_domain_name:
        description: Canonical public API domain for the runtime deploy.
        required: true
        type: string
      certificate_arn:
        description: ACM certificate ARN for the Regional custom domain.
        required: true
        type: string
      hosted_zone_id:
        description: Route 53 hosted zone id that owns the API alias record.
        required: true
        type: string
      hosted_zone_name:
        description: Route 53 hosted zone name that owns the API alias record.
        required: true
        type: string
      jwt_issuer:
        description: JWT issuer URL for API authentication.
        required: true
        type: string
      jwt_audience:
        description: JWT audience for API authentication.
        required: true
        type: string
      jwt_jwks_url:
        description: JWKS URL for API authentication.
        required: true
        type: string
      aws_region:
        description: AWS region for the runtime deploy.
        required: false
        default: us-east-1
        type: string
      environment_name:
        description: Runtime environment name exposed to the application.
        required: false
        default: dev
        type: string
      allowed_origins:
        description: Optional JSON or comma-delimited browser origin allowlist.
        required: false
        default: ""
        type: string
      deploy_output_artifact_name:
        description: Uploaded artifact name for deploy-output authority files.
        required: false
        default: deploy-runtime-output
        type: string
      deploy_output_path:
        description: Path for the authoritative deploy-output JSON.
        required: false
        default: .artifacts/deploy-output.json
        type: string
      deploy_output_sha256_path:
        description: Path for the deploy-output SHA256 sidecar.
        required: false
        default: .artifacts/deploy-output.sha256
        type: string
      runtime_cfn_execution_role_arn:
        description: CloudFormation service role ARN for runtime updates.
        required: true
        type: string
    secrets:
      runtime_deploy_aws_role_arn:
        description: OIDC-assumable AWS role for runtime deployment.
        required: true
    outputs:
      deploy_output_artifact_name:
        description: Uploaded artifact name for deploy-output authority files.
        value: ${{ jobs.deploy-runtime.outputs.deploy_output_artifact_name }}
      deploy_output_path:
        description: Workspace path used for deploy-output.json.
        value: ${{ jobs.deploy-runtime.outputs.deploy_output_path }}
      deploy_output_sha256_path:
        description: Workspace path used for deploy-output.sha256.
        value: ${{ jobs.deploy-runtime.outputs.deploy_output_sha256_path }}
      deploy_output_sha256:
        description: SHA256 digest of the authoritative deploy-output payload.
        value: ${{ jobs.deploy-runtime.outputs.deploy_output_sha256 }}
      public_base_url:
        description: Canonical public base URL resolved from the deployed stack.
        value: ${{ jobs.deploy-runtime.outputs.public_base_url }}
      runtime_version:
        description: Runtime package version deployed to the stack.
        value: ${{ jobs.deploy-runtime.outputs.runtime_version }}
      release_commit_sha:
        description: Signed release commit SHA deployed to the runtime.
        value: ${{ jobs.deploy-runtime.outputs.release_commit_sha }}
      stack_name:
        description: Runtime CloudFormation stack name.
        value: ${{ jobs.deploy-runtime.outputs.stack_name }}

permissions:
  id-token: write
  contents: read
  attestations: write

concurrency:
  group: reusable-deploy-runtime-${{ github.ref }}-${{ inputs.aws_region }}
  cancel-in-progress: false

jobs:
  deploy-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      deploy_output_artifact_name: ${{ steps.emit-deploy-output.outputs.deploy_output_artifact_name }}
      deploy_output_path: ${{ steps.emit-deploy-output.outputs.deploy_output_path }}
      deploy_output_sha256_path: ${{ steps.emit-deploy-output.outputs.deploy_output_sha256_path }}
      deploy_output_sha256: ${{ steps.emit-deploy-output.outputs.deploy_output_sha256 }}
      public_base_url: ${{ steps.emit-deploy-output.outputs.public_base_url }}
      runtime_version: ${{ steps.emit-deploy-output.outputs.runtime_version }}
      release_commit_sha: ${{ steps.release-commit.outputs.release_commit_sha }}
      stack_name: ${{ steps.emit-deploy-output.outputs.stack_name }}
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download immutable release-apply artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python -m scripts.release.download_run_artifact \
            --repo "${{ github.repository }}" \
            --run-id "${{ inputs.release_apply_run_id }}" \
            --artifact-name "${{ inputs.release_apply_artifact_name }}" \
            --output-dir .artifacts/release-apply

      - name: Checkout immutable release commit
        id: release-commit
        run: |
          set -euo pipefail
          RELEASE_COMMIT_SHA="$(python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(
              Path(".artifacts/release-apply/release-apply-metadata.json").read_text(
                  encoding="utf-8"
              )
          )
          print(payload["release_commit_sha"])
          PY
          )"
          git checkout "${RELEASE_COMMIT_SHA}"
          echo "release_commit_sha=${RELEASE_COMMIT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # astral-sh/setup-uv@v8.0.0
        with:
          version-file: pyproject.toml
          enable-cache: true
          prune-cache: true

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Setup Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # docker/setup-buildx-action@v4

      - name: Sync
        run: uv sync --locked --all-packages --all-extras --dev

      - name: Configure AWS Credentials (OIDC)
        uses: ./.github/actions/configure-aws-oidc
        with:
          role-to-assume: ${{ secrets.runtime_deploy_aws_role_arn }}
          role-session-name: nova-deploy-runtime-${{ github.run_id }}
          aws-region: ${{ inputs.aws_region }}

      - name: Capture AWS account id
        id: aws-account
        run: |
          set -euo pipefail
          echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Export immutable API Lambda artifact coordinates
        run: |
          set -euo pipefail
          eval "$(
            uv run python scripts/release/emit_api_lambda_artifact_env.py \
              --manifest-path .artifacts/release-apply/api-lambda-artifact.json
          )"
          {
            printf 'API_LAMBDA_ARTIFACT_BUCKET=%s\n' "$API_LAMBDA_ARTIFACT_BUCKET"
            printf 'API_LAMBDA_ARTIFACT_KEY=%s\n' "$API_LAMBDA_ARTIFACT_KEY"
            printf 'API_LAMBDA_ARTIFACT_SHA256=%s\n' "$API_LAMBDA_ARTIFACT_SHA256"
          } >> "$GITHUB_ENV"

      - name: Deploy runtime stack with CDK
        env:
          API_DOMAIN_NAME: ${{ inputs.api_domain_name }}
          CERTIFICATE_ARN: ${{ inputs.certificate_arn }}
          CDK_DEFAULT_ACCOUNT: ${{ steps.aws-account.outputs.account_id }}
          CDK_DEFAULT_REGION: ${{ inputs.aws_region }}
          ENVIRONMENT: ${{ inputs.environment_name }}
          HOSTED_ZONE_ID: ${{ inputs.hosted_zone_id }}
          HOSTED_ZONE_NAME: ${{ inputs.hosted_zone_name }}
          JWT_AUDIENCE: ${{ inputs.jwt_audience }}
          JWT_ISSUER: ${{ inputs.jwt_issuer }}
          JWT_JWKS_URL: ${{ inputs.jwt_jwks_url }}
          STACK_ALLOWED_ORIGINS: ${{ inputs.allowed_origins }}
        run: |
          set -euo pipefail
          npx aws-cdk@2.1107.0 deploy \
            --app "uv run --package nova-cdk python infra/nova_cdk/app.py" \
            --output "${RUNNER_TEMP}/nova-runtime-cdk.out" \
            --require-approval never \
            --role-arn "${{ inputs.runtime_cfn_execution_role_arn }}" \
            NovaRuntimeStack

      - name: Describe deployed runtime stack
        run: |
          set -euo pipefail
          aws cloudformation describe-stacks \
            --stack-name NovaRuntimeStack \
            --region "${{ inputs.aws_region }}" \
            --query 'Stacks[0]' \
            --output json \
            > "${RUNNER_TEMP}/nova-runtime-stack-description.json"

      - name: Build deploy-output authority artifact
        run: |
          set -euo pipefail
          uv run python scripts/release/resolve_deploy_output.py build \
            --api-lambda-artifact-path .artifacts/release-apply/api-lambda-artifact.json \
            --stack-description-path "${RUNNER_TEMP}/nova-runtime-stack-description.json" \
            --stack-name NovaRuntimeStack \
            --region "${{ inputs.aws_region }}" \
            --environment-name "${{ inputs.environment_name }}" \
            --repository "${{ github.repository }}" \
            --deploy-run-id "${{ github.run_id }}" \
            --deploy-run-attempt "${{ github.run_attempt }}" \
            --deploy-workflow-ref "${{ github.workflow_ref }}" \
            --output-path "${{ inputs.deploy_output_path }}" \
            --sha256-path "${{ inputs.deploy_output_sha256_path }}"

      - name: Emit deploy-output workflow outputs
        id: emit-deploy-output
        run: |
          set -euo pipefail
          uv run python scripts/release/resolve_deploy_output.py emit \
            --deploy-output-path "${{ inputs.deploy_output_path }}" \
            --sha256-path "${{ inputs.deploy_output_sha256_path }}" \
            --github-output-path "$GITHUB_OUTPUT"
          {
            echo "deploy_output_artifact_name=${{ inputs.deploy_output_artifact_name }}"
            echo "deploy_output_path=${{ inputs.deploy_output_path }}"
            echo "deploy_output_sha256_path=${{ inputs.deploy_output_sha256_path }}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload deploy-output authority artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # actions/upload-artifact@v7
        with:
          name: ${{ inputs.deploy_output_artifact_name }}
          path: |
            ${{ inputs.deploy_output_path }}
            ${{ inputs.deploy_output_sha256_path }}
            ${{ runner.temp }}/nova-runtime-stack-description.json

      - name: Generate deploy-output attestation
        continue-on-error: true
        uses: actions/attest@v4
        with:
          subject-path: ${{ inputs.deploy_output_path }}
