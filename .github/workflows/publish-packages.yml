name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      expected_manifest_sha256:
        description: Optional expected SHA256 of RELEASE-VERSION-MANIFEST.md
        required: false
        type: string
      release_apply_run_id:
        description: Workflow run id that uploaded release-apply-artifacts.
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  actions: read

concurrency:
  group: publish-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-staging:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      RELEASE_AWS_ROLE_ARN: ${{ secrets.RELEASE_AWS_ROLE_ARN }}
      RELEASE_SIGNING_SECRET_ID: ${{ secrets.RELEASE_SIGNING_SECRET_ID }}
      CODEARTIFACT_DOMAIN: ${{ vars.CODEARTIFACT_DOMAIN }}
      CODEARTIFACT_STAGING_REPOSITORY: ${{ vars.CODEARTIFACT_STAGING_REPOSITORY }}
      EXPECTED_MANIFEST_SHA256: ${{ inputs.expected_manifest_sha256 }}
      RELEASE_APPLY_RUN_ID: ${{ inputs.release_apply_run_id }}
    steps:
      - name: Validate release-apply workflow run id
        uses: actions/github-script@v7
        env:
          EXPECTED_RELEASE_APPLY_WORKFLOW_NAME: Nova Release Apply
          EXPECTED_RELEASE_APPLY_WORKFLOW_PATH: .github/workflows/release-apply.yml
          EXPECTED_RELEASE_APPLY_EVENT: workflow_dispatch
          EXPECTED_RELEASE_BRANCH: main
        with:
          github-token: ${{ github.token }}
          script: |
            const runIdRaw = process.env.RELEASE_APPLY_RUN_ID;
            if (!runIdRaw || !/^\d+$/.test(runIdRaw.trim())) {
              core.setFailed(
                `RELEASE_APPLY_RUN_ID must be a numeric workflow run id, got: ${runIdRaw ?? "<empty>"}`,
              );
              return;
            }

            const runId = Number.parseInt(runIdRaw.trim(), 10);
            const expectedWorkflowName = process.env.EXPECTED_RELEASE_APPLY_WORKFLOW_NAME;
            const expectedWorkflowPath = process.env.EXPECTED_RELEASE_APPLY_WORKFLOW_PATH;
            const expectedRunEvent = process.env.EXPECTED_RELEASE_APPLY_EVENT;
            const expectedBranch = process.env.EXPECTED_RELEASE_BRANCH;
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");

            const runResponse = await github.rest.actions.getWorkflowRun({
              owner,
              repo,
              run_id: runId,
            });
            const run = runResponse.data;

            const workflowResponse = await github.rest.actions.getWorkflow({
              owner,
              repo,
              workflow_id: run.workflow_id,
            });
            const workflow = workflowResponse.data;

            const errors = [];
            if (workflow.name !== expectedWorkflowName) {
              errors.push(
                `workflow name mismatch: expected "${expectedWorkflowName}", got "${workflow.name}"`,
              );
            }
            if (workflow.path !== expectedWorkflowPath) {
              errors.push(
                `workflow path mismatch: expected "${expectedWorkflowPath}", got "${workflow.path}"`,
              );
            }
            if (run.event !== expectedRunEvent) {
              errors.push(
                `run event mismatch: expected "${expectedRunEvent}", got "${run.event}"`,
              );
            }
            if (run.conclusion !== "success") {
              errors.push(`run conclusion must be "success", got "${run.conclusion}"`);
            }
            if (run.head_branch !== expectedBranch) {
              errors.push(
                `run head_branch mismatch: expected "${expectedBranch}", got "${run.head_branch}"`,
              );
            }

            if (errors.length > 0) {
              core.setFailed(
                `Invalid RELEASE_APPLY_RUN_ID ${runId}: ${errors.join("; ")}`,
              );
              return;
            }

            core.info(
              `Validated release apply run ${run.id} for workflow "${workflow.name}" on branch "${run.head_branch}".`,
            );
            core.exportVariable("RELEASE_APPLY_RUN_ID", String(run.id));

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.10"
          enable-cache: true
          prune-cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate required CodeArtifact variables
        run: |
          set -euo pipefail
          [[ -n "${RELEASE_AWS_ROLE_ARN}" ]] || { echo "RELEASE_AWS_ROLE_ARN is required" >&2; exit 1; }
          [[ -n "${CODEARTIFACT_DOMAIN}" ]] || { echo "CODEARTIFACT_DOMAIN is required" >&2; exit 1; }
          [[ -n "${CODEARTIFACT_STAGING_REPOSITORY}" ]] || { echo "CODEARTIFACT_STAGING_REPOSITORY is required" >&2; exit 1; }
          [[ -n "${RELEASE_APPLY_RUN_ID}" ]] || { echo "RELEASE_APPLY_RUN_ID is required" >&2; exit 1; }

      - name: Download immutable release-apply artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python -m scripts.release.download_run_artifact \
            --repo "${{ github.repository }}" \
            --run-id "${RELEASE_APPLY_RUN_ID}" \
            --artifact-name release-apply-artifacts \
            --output-dir .artifacts

      - name: Checkout immutable release commit
        run: |
          set -euo pipefail
          RELEASE_COMMIT_SHA="$(python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(
              Path(".artifacts/release-apply-metadata.json").read_text(
                  encoding="utf-8"
              )
          )
          print(payload["release_commit_sha"])
          PY
          )"
          git fetch --depth=1 origin "${RELEASE_COMMIT_SHA}"
          git checkout "${RELEASE_COMMIT_SHA}"

      - name: Sync
        run: uv sync --locked

      - name: Install npm workspace dependencies
        run: npm ci

      - name: Detect changed release units
        id: release-units
        run: |
          set -euo pipefail
          uv run python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          from scripts.release import common

          repo_root = Path(".").resolve()
          version_plan = json.loads(
              (repo_root / ".artifacts/version-plan.json").read_text(
                  encoding="utf-8"
              )
          )
          units = common.load_workspace_units(repo_root)
          r_unit_ids = common.order_units_for_release(
              units,
              {
                  item["unit_id"]
                  for item in version_plan.get("units", [])
                  if item.get("format") == "r"
              },
          )
          print(f"r_unit_ids={json.dumps(r_unit_ids)}")
          print(f"has_r_units={'true' if r_unit_ids else 'false'}")
          print(f"r_unit_count={len(r_unit_ids)}")
          PY

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.RELEASE_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure release signing
        if: steps.release-units.outputs.has_r_units == 'true'
        uses: ./.github/actions/configure-release-signing
        with:
          signing-secret-id: ${{ env.RELEASE_SIGNING_SECRET_ID }}

      - name: Build changed Python packages
        run: |
          uv run python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          data = json.loads(Path('.artifacts/version-plan.json').read_text())
          units = [
              item['unit_id']
              for item in data.get('units', [])
              if item.get('format', 'pypi') == 'pypi'
          ]
          if not units:
              print('No Python package version changes detected; nothing to build.')
              raise SystemExit(0)
          for unit in units:
              subprocess.run(['uv', 'build', unit], check=True)
          PY

      - name: Verify AWS CLI version for npm CodeArtifact support
        run: |
          python - <<'PY'
          import re
          import subprocess

          result = subprocess.run(
              ["aws", "--version"],
              check=True,
              text=True,
              capture_output=True,
          )
          version_output = " ".join(
              part.strip() for part in (result.stderr, result.stdout) if part.strip()
          )
          match = re.search(r"aws-cli/(\d+)\.(\d+)\.(\d+)", version_output)
          if match is None:
              raise SystemExit(f"Could not parse AWS CLI version: {version_output}")
          version = tuple(int(part) for part in match.groups())
          if version < (2, 9, 5):
              raise SystemExit(
                  "AWS CLI >= 2.9.5 is required for npm 10 CodeArtifact login, "
                  f"found {version_output}"
              )
          print(f"Using {version_output}")
          PY

      - name: Build changed npm packages
        run: |
          uv run python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          from scripts.release import common

          version_plan = json.loads(
              Path('.artifacts/version-plan.json').read_text(encoding='utf-8')
          )
          units = common.load_workspace_units(Path('.').resolve())
          npm_units = common.order_units_for_release(
              units,
              {
                  item['unit_id']
                  for item in version_plan.get('units', [])
                  if item.get('format') == 'npm'
              },
          )
          if not npm_units:
              print('No npm package version changes detected; nothing to build.')
              raise SystemExit(0)
          for unit in npm_units:
              subprocess.run(
                  ['npm', 'run', 'build', '--workspace', unit],
                  check=True,
              )
          PY

      - name: Prepare npm publish artifacts
        run: |
          set -euo pipefail
          NPM_REGISTRY_URL="$(aws codeartifact get-repository-endpoint \
            --domain "$CODEARTIFACT_DOMAIN" \
            --repository "$CODEARTIFACT_STAGING_REPOSITORY" \
            --format npm \
            --region "$AWS_REGION" \
            --query repositoryEndpoint \
            --output text)"
          uv run python -m scripts.release.npm_publish \
            --repo-root . \
            --version-plan .artifacts/version-plan.json \
            --registry-url "$NPM_REGISTRY_URL" \
            --output-dir .artifacts/npm-publish \
            --report-out .artifacts/npm-publish-report.json

      - name: Setup R
        if: steps.release-units.outputs.has_r_units == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.2"

      - name: Install R dependencies for nova.sdk.r.file
        if: contains(fromJson(steps.release-units.outputs.r_unit_ids), 'packages/nova_sdk_r_file')
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: packages/nova_sdk_r_file

      - name: Build, check, and sign R packages
        if: steps.release-units.outputs.has_r_units == 'true'
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import hashlib
          import json
          import shutil
          import subprocess
          from pathlib import Path

          from scripts.release import common

          repo_root = Path(".").resolve()
          version_plan = json.loads(
              (repo_root / ".artifacts/version-plan.json").read_text(
                  encoding="utf-8"
              )
          )
          units = common.load_workspace_units(repo_root)
          r_unit_ids = common.order_units_for_release(
              units,
              {
                  item["unit_id"]
                  for item in version_plan.get("units", [])
                  if item.get("format") == "r"
              },
          )
          if not r_unit_ids:
              print("No R packages changed; skipping R build/sign.")
              raise SystemExit(0)

          artifact_root = repo_root / ".artifacts/r-publish"
          artifact_root.mkdir(parents=True, exist_ok=True)
          report: dict[str, object] = {
              "schema_version": "1.0",
              "generated_at": common.iso_timestamp(),
              "packages": [],
          }

          for unit_id in r_unit_ids:
              unit = units[unit_id]
              description_path = unit.path / "DESCRIPTION"
              description_data: dict[str, str] = {}
              for line in description_path.read_text(encoding="utf-8").splitlines():
                  if ":" not in line:
                      continue
                  key, value = line.split(":", 1)
                  description_data[key.strip()] = value.strip()

              package_name = description_data.get("Package")
              package_version = description_data.get("Version")
              if not package_name or not package_version:
                  raise SystemExit(
                      f"{description_path}: missing Package/Version fields"
                  )

              tarball_name = f"{package_name}_{package_version}.tar.gz"
              tarball_path = repo_root / tarball_name
              subprocess.run(
                  [
                      "bash",
                      str(
                          repo_root
                          / "scripts"
                          / "checks"
                          / "verify_r_cmd_check.sh"
                      ),
                      str(unit.path),
                      "--keep-tarball",
                  ],
                  check=True,
                  cwd=repo_root,
              )

              tarball_sha256 = hashlib.sha256(
                  tarball_path.read_bytes()
              ).hexdigest()
              subprocess.run(
                  [
                      "ssh-keygen",
                      "-Y",
                      "sign",
                      "-f",
                      str(Path.home() / ".ssh" / "release_signing_key"),
                      "-n",
                      "file",
                      str(tarball_path),
                  ],
                  check=True,
                  cwd=repo_root,
              )
              signature_path = Path(f"{tarball_path}.sig")
              signature_sha256 = hashlib.sha256(
                  signature_path.read_bytes()
              ).hexdigest()

              package_artifact_dir = artifact_root / unit_id
              package_artifact_dir.mkdir(parents=True, exist_ok=True)
              tarball_artifact_path = package_artifact_dir / tarball_name
              signature_artifact_path = (
                  package_artifact_dir / signature_path.name
              )
              shutil.copy2(tarball_path, tarball_artifact_path)
              shutil.copy2(signature_path, signature_artifact_path)
              tarball_path.unlink(missing_ok=True)
              signature_path.unlink(missing_ok=True)
              (package_artifact_dir / "SHA256SUMS").write_text(
                  f"{tarball_sha256}  {tarball_name}\n",
                  encoding="utf-8",
              )

              report["packages"].append(
                  {
                      "unit_id": unit_id,
                      "package": package_name,
                      "version": package_version,
                      "format": unit.package_format,
                      "codeartifact_format": common.resolve_codeartifact_format(
                          unit
                      ),
                      "namespace": unit.namespace,
                      "tarball_path": str(
                          tarball_artifact_path.relative_to(repo_root)
                      ),
                      "signature_path": str(
                          signature_artifact_path.relative_to(repo_root)
                      ),
                      "tarball_sha256": tarball_sha256,
                      "signature_sha256": signature_sha256,
                  }
              )

          report_path = repo_root / ".artifacts/r-publish-report.json"
          report_path.write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run CodeArtifact release gates
        run: |
          set -euo pipefail
          R_PUBLISH_REPORT_ARGS=()
          EXPECTED_MANIFEST_SHA256_ARGS=()
          if [[ "${{ steps.release-units.outputs.has_r_units }}" == "true" ]]; then
            R_PUBLISH_REPORT_ARGS=(--r-publish-report .artifacts/r-publish-report.json)
          fi
          if [[ -n "${EXPECTED_MANIFEST_SHA256:-}" ]]; then
            EXPECTED_MANIFEST_SHA256_ARGS=(--expected-manifest-sha256 "${EXPECTED_MANIFEST_SHA256}")
          fi
          uv run python -m scripts.release.codeartifact_gate \
            --repo-root . \
            --manifest-path docs/release/RELEASE-VERSION-MANIFEST.md \
            --changed-units .artifacts/changed-units.json \
            --version-plan .artifacts/version-plan.json \
            "${EXPECTED_MANIFEST_SHA256_ARGS[@]}" \
            "${R_PUBLISH_REPORT_ARGS[@]}" \
            --gate-report-out .artifacts/codeartifact-gate-report.json \
            --promotion-candidates-out .artifacts/codeartifact-promotion-candidates.json

      - name: Publish to CodeArtifact staging repository
        run: |
          set -euo pipefail
          uv run twine --version
          aws codeartifact login \
            --tool twine \
            --domain "$CODEARTIFACT_DOMAIN" \
            --repository "$CODEARTIFACT_STAGING_REPOSITORY" \
            --region "$AWS_REGION"

          mapfile -t DIST_FILES < <(
            uv run python - <<'PY'
          import json
          from pathlib import Path

          plan = json.loads(Path(".artifacts/version-plan.json").read_text(encoding="utf-8"))
          for item in plan.get("units", []):
              unit = Path(item["unit_id"])
              dist = unit / "dist"
              if not dist.exists():
                  continue
              for path in sorted(dist.glob("*.whl")):
                  print(path)
              for path in sorted(dist.glob("*.tar.gz")):
                  print(path)
          PY
          )
          if [[ "${#DIST_FILES[@]}" -eq 0 ]]; then
            echo "No package dists found; skipping publish."
            exit 0
          fi

          uv run twine upload --repository codeartifact --skip-existing "${DIST_FILES[@]}"

      - name: Publish npm packages to CodeArtifact staging repository
        run: |
          set -euo pipefail
          PACKAGE_COUNT="$(uv run python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path('.artifacts/npm-publish-report.json').read_text(encoding='utf-8')
          )
          print(len(report.get('packages', [])))
          PY
          )"
          if [[ "$PACKAGE_COUNT" == "0" ]]; then
            echo "No npm packages prepared; skipping npm publish."
            exit 0
          fi

          NPM_REGISTRY_URL="$(aws codeartifact get-repository-endpoint \
            --domain "$CODEARTIFACT_DOMAIN" \
            --repository "$CODEARTIFACT_STAGING_REPOSITORY" \
            --format npm \
            --region "$AWS_REGION" \
            --query repositoryEndpoint \
            --output text)"

          aws codeartifact login \
            --tool npm \
            --domain "$CODEARTIFACT_DOMAIN" \
            --repository "$CODEARTIFACT_STAGING_REPOSITORY" \
            --region "$AWS_REGION"

          mapfile -t NPM_PUBLISH_DIRS < <(
            uv run python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path(".artifacts/npm-publish-report.json").read_text(encoding="utf-8")
          )
          for item in report.get("packages", []):
              print(item["publish_dir"])
          PY
          )
          for publish_dir in "${NPM_PUBLISH_DIRS[@]}"; do
            package_name="$(uv run python - <<'PY' "$publish_dir"
          import json
          import sys
          from pathlib import Path

          package_json = Path(sys.argv[1]) / "package.json"
          payload = json.loads(package_json.read_text(encoding="utf-8"))
          print(payload["name"])
          PY
            )"
            package_version="$(uv run python - <<'PY' "$publish_dir"
          import json
          import sys
          from pathlib import Path

          package_json = Path(sys.argv[1]) / "package.json"
          payload = json.loads(package_json.read_text(encoding="utf-8"))
          print(payload["version"])
          PY
            )"
            if npm view "${package_name}@${package_version}" version --registry "$NPM_REGISTRY_URL" >/dev/null 2>&1; then
              echo "Package ${package_name}@${package_version} already exists in staging; skipping publish."
              continue
            fi
            (
              cd "$publish_dir"
              npm publish --no-progress --registry "$NPM_REGISTRY_URL"
            )
          done

      - name: Publish R packages to CodeArtifact staging repository
        if: steps.release-units.outputs.has_r_units == 'true'
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          report = json.loads(
              Path(".artifacts/r-publish-report.json").read_text(encoding="utf-8")
          )
          packages = report.get("packages", [])
          if not packages:
              print("No R packages prepared; skipping R publish.")
              raise SystemExit(0)

          for item in packages:
              tarball_path = Path(item["tarball_path"])
              signature_path = Path(item["signature_path"])
              package_name = item["package"]
              package_version = item["version"]
              tarball_name = tarball_path.name
              signature_name = signature_path.name
              if not tarball_path.exists():
                  raise SystemExit(f"Missing R tarball artifact: {tarball_path}")
              if not signature_path.exists():
                  raise SystemExit(
                      f"Missing R signature artifact: {signature_path}"
                  )

              published_assets = []
              describe_command = [
                  "aws",
                  "codeartifact",
                  "describe-package-version",
                  "--domain",
                  os.environ["CODEARTIFACT_DOMAIN"],
                  "--repository",
                  os.environ["CODEARTIFACT_STAGING_REPOSITORY"],
                  "--format",
                  "generic",
                  "--namespace",
                  item["namespace"],
                  "--package",
                  package_name,
                  "--package-version",
                  package_version,
                  "--region",
                  os.environ["AWS_REGION"],
                  "--output",
                  "json",
              ]
              describe = subprocess.run(
                  describe_command,
                  check=False,
                  text=True,
                  capture_output=True,
              )
              published_asset_names = set()
              if describe.returncode == 0:
                  description = json.loads(describe.stdout or "{}")
                  package_version_payload = description.get("packageVersion", {})
                  raw_assets = (
                      package_version_payload.get("assetList")
                      or package_version_payload.get("assets")
                      or package_version_payload.get("assetSummaries")
                      or []
                  )
                  for raw_asset in raw_assets:
                      if not isinstance(raw_asset, dict):
                          continue
                      raw_name = raw_asset.get("name")
                      if isinstance(raw_name, str) and raw_name:
                          published_asset_names.add(raw_name)
              else:
                  error_text = (describe.stderr or describe.stdout or "").lower()
                  if "does not exist" not in error_text and "not found" not in error_text:
                      raise SystemExit(
                          f"failed to describe package-version {package_name} "
                          f"{package_version}: {error_text or 'unknown error'}"
                      )

              has_tarball_asset = tarball_name in published_asset_names
              has_signature_asset = signature_name in published_asset_names
              if has_tarball_asset and has_signature_asset:
                  item["published_assets"] = [
                      {
                          "asset_name": tarball_name,
                          "asset_path": str(tarball_path),
                          "asset_sha256": item["tarball_sha256"],
                          "asset_exists": True,
                          "skipped": True,
                      },
                      {
                          "asset_name": signature_name,
                          "asset_path": str(signature_path),
                          "asset_sha256": item["signature_sha256"],
                          "asset_exists": True,
                          "skipped": True,
                      },
                  ]
                  item["publish_output"] = {
                      "status": "skipped",
                      "reason": "all assets already present",
                  }
                  continue
              if has_tarball_asset != has_signature_asset:
                  raise SystemExit(
                      "partial R publish state detected for "
                      f"{package_name} {package_version}: "
                      f"tarball_present={has_tarball_asset}, "
                      f"signature_present={has_signature_asset}"
                  )

              for asset_path, asset_name, asset_sha256, unfinished in (
                  (
                      tarball_path,
                      tarball_name,
                      item["tarball_sha256"],
                      True,
                  ),
                  (
                      signature_path,
                      signature_name,
                      item["signature_sha256"],
                      False,
                  ),
              ):
                  command = [
                      "aws",
                      "codeartifact",
                      "publish-package-version",
                      "--domain",
                      os.environ["CODEARTIFACT_DOMAIN"],
                      "--repository",
                      os.environ["CODEARTIFACT_STAGING_REPOSITORY"],
                      "--format",
                      "generic",
                      "--namespace",
                      item.get("namespace") or "nova",
                      "--package",
                      package_name,
                      "--package-version",
                      package_version,
                      "--asset-content",
                      str(asset_path),
                      "--asset-name",
                      asset_name,
                      "--asset-sha256",
                      asset_sha256,
                  ]
                  if unfinished:
                      command.append("--unfinished")
                  command.extend(
                      [
                          "--region",
                          os.environ["AWS_REGION"],
                          "--output",
                          "json",
                      ]
                  )
                  result = subprocess.run(
                      command,
                      check=True,
                      text=True,
                      capture_output=True,
                  )
                  publish_output = json.loads(result.stdout or "{}")
                  published_assets.append(
                      {
                          "asset_name": asset_name,
                          "asset_path": str(asset_path),
                          "asset_sha256": asset_sha256,
                          "unfinished": unfinished,
                          "publish_output": publish_output,
                      }
                  )

              item["published_assets"] = published_assets
              item["publish_output"] = published_assets[-1]["publish_output"]

          Path(".artifacts/r-publish-report.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Smoke test npm packages from CodeArtifact staging
        run: |
          set -euo pipefail
          mapfile -t NPM_INSTALL_SPECS < <(
            uv run python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path(".artifacts/npm-publish-report.json").read_text(encoding="utf-8")
          )
          for item in report.get("packages", []):
              print(f"{item['package']}@{item['version']}")
          PY
          )
          if [[ "${#NPM_INSTALL_SPECS[@]}" -eq 0 ]]; then
            echo "No npm packages published; skipping staging smoke test."
            exit 0
          fi

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT
          cd "${tmp_dir}"
          cat > package.json <<'EOF'
          {
            "name": "nova-codeartifact-smoke",
            "private": true,
            "type": "module"
          }
          EOF
          npm install --no-progress "${NPM_INSTALL_SPECS[@]}"
          export NOVA_EXPECTED_NPM_PACKAGES="$(uv run python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path(".artifacts/npm-publish-report.json").read_text(encoding="utf-8")
          )
          print(
              json.dumps(
                  sorted(
                      package["package"]
                      for package in report.get("packages", [])
                      if isinstance(package, dict) and package.get("package")
                  )
              )
          )
          PY
          )"
          cat > smoke.mjs <<'EOF'
          const expectedPackages = new Set(
            JSON.parse(process.env.NOVA_EXPECTED_NPM_PACKAGES ?? "[]"),
          );
          let buildDescriptorUrl = null;
          let fileOperations = null;
          let createFileClient = null;

          try {
            ({ buildOperationDescriptorUrl: buildDescriptorUrl } = await import("@nova/sdk-fetch/url"));
          } catch (error) {
            if (expectedPackages.has("@nova/sdk-fetch")) {
              throw error;
            }
          }
          try {
            ({ operations: fileOperations } = await import("@nova/sdk-file/operations"));
            ({ createNovaFileClient: createFileClient } = await import("@nova/sdk-file/client"));
          } catch (error) {
            if (expectedPackages.has("@nova/sdk-file")) {
              throw error;
            }
          }

          if (expectedPackages.has("@nova/sdk-fetch") && !buildDescriptorUrl) {
            throw new Error("@nova/sdk-fetch smoke import did not load buildOperationDescriptorUrl");
          }
          if (expectedPackages.has("@nova/sdk-file") && (!fileOperations || !createFileClient)) {
            throw new Error("@nova/sdk-file smoke import did not load expected entrypoints");
          }

          if (buildDescriptorUrl && fileOperations) {
            const descriptorUrl = buildDescriptorUrl(
              "https://nova.example/",
              fileOperations.get_job_status,
              { job_id: "job-123" },
              { include: "events" },
            );
            if (descriptorUrl !== "https://nova.example/v1/jobs/job-123?include=events") {
              throw new Error(`unexpected descriptor URL: ${descriptorUrl}`);
            }
          }

          if ("update_job_result" in (fileOperations ?? {})) {
            throw new Error("internal file operation leaked into published SDK");
          }

          if (createFileClient) {
            const fileClient = createFileClient({
              baseUrl: "https://nova.example/",
              fetchImpl: async (input) => {
                const url = typeof input === "string" ? input : input instanceof URL ? input.toString() : input.url;
                if (url !== "https://nova.example/v1/jobs/job-123") {
                  throw new Error(`unexpected file client URL: ${url}`);
                }
                return new Response(JSON.stringify({
                  job: {
                    job_id: "job-123",
                    status: "queued",
                    created_at: "2026-03-09T00:00:00Z",
                    updated_at: "2026-03-09T00:00:00Z",
                    events: [],
                  },
                }), {
                  status: 200,
                  headers: { "content-type": "application/json" },
                });
              },
            });
            const fileResponse = await fileClient.get_job_status({
              pathParams: { job_id: "job-123" },
            });
          if (!fileResponse.ok || fileResponse.data?.job?.job_id !== "job-123") {
            throw new Error("unexpected published file client response");
          }
          }
          EOF
          node smoke.mjs

      - name: Upload package gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codeartifact-release-gate-artifacts
          path: .artifacts/
