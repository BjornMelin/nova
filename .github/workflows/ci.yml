name: Nova CI

on:
  pull_request:
  merge_group:
    types:
      - checks_requested
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  classify-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      changed_files_json: ${{ steps.scope.outputs.changed_files_json }}
      affected_units_json: ${{ steps.scope.outputs.affected_units_json }}
      docs_only: ${{ steps.scope.outputs.docs_only }}
      run_runtime_ci: ${{ steps.scope.outputs.run_runtime_ci }}
      run_generated_clients: ${{ steps.scope.outputs.run_generated_clients }}
      run_dash_conformance: ${{ steps.scope.outputs.run_dash_conformance }}
      run_shiny_conformance: ${{ steps.scope.outputs.run_shiny_conformance }}
      run_typescript_conformance: ${{ steps.scope.outputs.run_typescript_conformance }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect workflow scopes
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.event.merge_group.head_sha || github.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before }}
        run: |
          python3 scripts/ci/detect_workflow_scopes.py \
            --event-name "${EVENT_NAME}" \
            --head-sha "${HEAD_SHA}" \
            --base-sha "${BASE_SHA}"

  quality-gates:
    needs: classify-changes
    if: needs.classify-changes.outputs.run_runtime_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"

      - name: Lock Check
        run: uv lock --check

      - name: Ruff Check
        run: uv run ruff check .

      - name: Ruff Import Check
        run: uv run ruff check . --select I

      - name: Ruff Format
        run: uv run ruff format . --check

      - name: Ty
        run: uv run ty check --force-exclude --output-format github packages scripts

      - name: Mypy
        run: uv run mypy

      - name: Runtime/Security/Reliability Gates
        run: |
          uv run pytest -q -m runtime_gate

      - name: Pytest
        run: |
          uv run pytest -q -m "not runtime_gate and not generated_smoke"

      - name: Generated Client Smoke
        run: |
          uv run pytest -q -m generated_smoke

      - name: Runtime Config Contract
        run: |
          uv run python scripts/release/generate_runtime_config_contract.py --check

      - name: Workspace Build
        run: |
          for p in \
            packages/nova_file_api \
            packages/nova_dash_bridge \
            packages/nova_runtime_support; do
            uv build "$p"
          done

      - name: Canonical Route Policy Guard
        run: bash scripts/checks/verify_canonical_route_policy.sh

  python-compatibility:
    needs: classify-changes
    if: needs.classify-changes.outputs.run_runtime_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.11"
          save-cache: "false"

      - name: Pytest (Python 3.11)
        run: uv run --python 3.11 pytest -q

      - name: Workspace Build (Python 3.11)
        run: |
          for p in \
            packages/nova_file_api \
            packages/nova_dash_bridge \
            packages/nova_runtime_support \
            packages/nova_sdk_py; do
            uv build --python 3.11 "$p"
          done

      - name: Setup Python and uv (Python 3.12)
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"
          save-cache: "false"

      - name: Pytest (Python 3.12)
        run: uv run --python 3.12 pytest -q

      - name: Workspace Build (Python 3.12)
        run: |
          for p in \
            packages/nova_file_api \
            packages/nova_dash_bridge \
            packages/nova_runtime_support \
            packages/nova_sdk_py; do
            uv build --python 3.12 "$p"
          done

  generated-clients:
    needs: classify-changes
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      needs.classify-changes.outputs.run_generated_clients == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"
          save-cache: "false"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install root npm dependencies
        run: npm ci
      - name: Enforce TypeScript module policy
        run: uv run python scripts/conformance/check_typescript_module_policy.py
      - name: Verify generated TS/R client catalogs
        run: uv run python scripts/release/generate_clients.py --check
      - name: Verify generated OpenAPI artifacts
        run: uv run python scripts/contracts/export_openapi.py --check
      - name: Verify generated Python SDK artifacts
        run: uv run python scripts/release/generate_python_clients.py --check

  typescript-core-packages:
    needs: classify-changes
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      needs.classify-changes.outputs.run_typescript_conformance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install package dependencies
        run: npm ci
      - name: Build TypeScript SDK dependency graph
        run: npm run build:typescript:sdk-graph
      - name: Typecheck packages
        run: |
          npm run -w @nova/sdk typecheck
      - name: Build TypeScript SDK package
        run: npm run -w @nova/sdk build
      - name: Pack TypeScript SDK tarballs
        run: |
          set -euo pipefail
          mkdir -p .artifacts/npm
          npm pack -w @nova/sdk --pack-destination .artifacts/npm
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # actions/upload-artifact@v7
        with:
          name: ts-sdk-tarballs
          path: .artifacts/npm/*.tgz
          retention-days: 30

  typescript-sdk-smoke:
    needs:
      - classify-changes
      - typescript-core-packages
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      needs.classify-changes.outputs.run_typescript_conformance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # actions/setup-node@v6
        with:
          node-version: "24"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact@v8
        with:
          name: ts-sdk-tarballs
          path: .artifacts/npm
      - name: Smoke test TypeScript SDK exports
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT
          cd "${tmp_dir}"
          cat > package.json <<'PKGEOF'
          {
            "name": "nova-typescript-sdk-smoke",
            "private": true,
            "type": "module"
          }
          PKGEOF
          npm install --no-package-lock "${GITHUB_WORKSPACE}/.artifacts/npm/"*.tgz
          cp "${GITHUB_WORKSPACE}/scripts/conformance/typescript_sdk_smoke.mjs" ./smoke.mjs
          node ./smoke.mjs

  dash-conformance:
    needs: classify-changes
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      needs.classify-changes.outputs.run_dash_conformance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"
          save-cache: "false"
      - name: Validate Dash lane fixtures
        run: uv run python scripts/conformance/validate_lane.py --lane dash
      - name: Validate contract fixtures against runtime models
        run: uv run pytest -q scripts/release/tests/test_contract_fixtures_v1.py

  shiny-conformance:
    needs: classify-changes
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      needs.classify-changes.outputs.run_shiny_conformance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"
          save-cache: "false"
      - name: Validate Shiny lane fixtures
        run: uv run python scripts/conformance/validate_lane.py --lane shiny
      - uses: r-lib/actions/setup-r@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.2"
      - name: Install R dependencies for nova
        uses: r-lib/actions/setup-r-dependencies@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: packages/nova_sdk_r
      - name: Build and check generated R SDK packages
        run: |
          set -euo pipefail
          bash scripts/checks/verify_r_cmd_check.sh packages/nova_sdk_r

  typescript-conformance:
    needs: classify-changes
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      needs.classify-changes.outputs.run_typescript_conformance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install TypeScript conformance dependencies
        run: npm ci
      - name: Typecheck TypeScript conformance and generated catalogs
        run: npm run -w @nova/contracts-ts-conformance typecheck
      - name: Build TypeScript SDK dependency graph
        run: npm run build:typescript:sdk-graph
      - name: Verify TypeScript fixture conformance
        run: npm run -w @nova/contracts-ts-conformance verify
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"
          save-cache: "false"
      - name: Validate TypeScript lane fixtures
        run: uv run python scripts/conformance/validate_lane.py --lane typescript
