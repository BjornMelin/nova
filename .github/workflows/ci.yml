name: Nova CI

on:
  pull_request:
  merge_group:
    types:
      - checks_requested
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  classify-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      changed_files_json: ${{ steps.scope.outputs.changed_files_json }}
      affected_units_json: ${{ steps.scope.outputs.affected_units_json }}
      docs_only: ${{ steps.scope.outputs.docs_only }}
      run_runtime_ci: ${{ steps.scope.outputs.run_runtime_ci }}
      run_generated_clients: ${{ steps.scope.outputs.run_generated_clients }}
      run_dash_conformance: ${{ steps.scope.outputs.run_dash_conformance }}
      run_shiny_conformance: ${{ steps.scope.outputs.run_shiny_conformance }}
      run_typescript_conformance: ${{ steps.scope.outputs.run_typescript_conformance }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect workflow scopes
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.event.merge_group.head_sha || github.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before }}
        run: |
          python3 scripts/ci/detect_workflow_scopes.py \
            --event-name "${EVENT_NAME}" \
            --head-sha "${HEAD_SHA}" \
            --base-sha "${BASE_SHA}"

  quality-gates:
    needs: classify-changes
    if: needs.classify-changes.outputs.run_runtime_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"

      - name: Lock Check
        run: uv lock --check

      - name: Ruff Check
        run: uv run ruff check .

      - name: Ruff Import Check
        run: uv run ruff check . --select I

      - name: Ruff Format
        run: uv run ruff format . --check

      - name: Ty
        run: uv run ty check --force-exclude --output-format github packages scripts

      - name: Mypy
        run: uv run mypy

      - name: Runtime/Security/Reliability Gates
        run: |
          uv run pytest -q \
            packages/nova_file_api/tests/test_runtime_security_reliability_gates.py \
            packages/nova_file_api/tests/test_auth.py::test_local_auth_error_maps_common_jwt_claim_failures \
            packages/nova_file_api/tests/test_auth.py::test_required_scope_is_enforced_from_principal_claims \
            packages/nova_file_api/tests/test_container_config.py::test_runtime_state_requires_sqs_queue_url_when_jobs_enabled \
            packages/nova_file_api/tests/test_jobs.py::test_enqueue_failure_is_not_idempotency_cached \
            packages/nova_file_api/tests/test_jobs.py::test_job_service_update_result_rejects_invalid_transition \
            packages/nova_file_api/tests/test_jobs_dynamo.py::test_dynamo_job_repository_update_if_status_enforces_expected_state \
            packages/nova_file_api/tests/test_activity_dynamo.py::test_dynamo_activity_store_uses_conditional_first_seen_markers

      - name: Pytest
        run: |
          uv run pytest -q \
            --deselect=packages/nova_file_api/tests/test_auth.py::test_local_auth_error_maps_common_jwt_claim_failures \
            --deselect=packages/nova_file_api/tests/test_auth.py::test_required_scope_is_enforced_from_principal_claims \
            --deselect=packages/nova_file_api/tests/test_container_config.py::test_runtime_state_requires_sqs_queue_url_when_jobs_enabled \
            --deselect=packages/nova_file_api/tests/test_jobs.py::test_enqueue_failure_is_not_idempotency_cached \
            --deselect=packages/nova_file_api/tests/test_jobs.py::test_job_service_update_result_rejects_invalid_transition \
            --deselect=packages/nova_file_api/tests/test_jobs_dynamo.py::test_dynamo_job_repository_update_if_status_enforces_expected_state \
            --deselect=packages/nova_file_api/tests/test_activity_dynamo.py::test_dynamo_activity_store_uses_conditional_first_seen_markers \
            --ignore=packages/nova_file_api/tests/test_runtime_security_reliability_gates.py \
            --ignore=packages/nova_file_api/tests/test_generated_client_smoke.py

      - name: Generated Client Smoke
        run: |
          uv run pytest -q \
            packages/nova_file_api/tests/test_generated_client_smoke.py

      - name: Runtime Config Contract
        run: |
          uv run python scripts/release/generate_runtime_config_contract.py --check

      - name: Workspace Build
        run: |
          for p in \
            packages/nova_file_api \
            packages/nova_dash_bridge; do
            uv build "$p"
          done

      - name: Canonical Route Policy Guard
        run: bash scripts/checks/verify_canonical_route_policy.sh

  generated-clients:
    needs: classify-changes
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      needs.classify-changes.outputs.run_generated_clients == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"
          save-cache: "false"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install root npm dependencies
        run: npm ci
      - name: Enforce TypeScript module policy
        run: uv run python scripts/conformance/check_typescript_module_policy.py
      - name: Verify generated TS/R client catalogs
        run: uv run python scripts/release/generate_clients.py --check
      - name: Verify generated OpenAPI artifacts
        run: uv run python scripts/contracts/export_openapi.py --check
      - name: Verify generated Python SDK artifacts
        run: uv run python scripts/release/generate_python_clients.py --check

  typescript-core-packages:
    needs: classify-changes
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      needs.classify-changes.outputs.run_typescript_conformance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install package dependencies
        run: npm ci
      - name: Build TypeScript SDK dependency graph
        run: npm run build:typescript:sdk-graph
      - name: Typecheck packages
        run: |
          npm run -w @nova/sdk-file typecheck
      - name: Pack TypeScript SDK tarballs
        run: |
          set -euo pipefail
          mkdir -p .artifacts/npm
          npm pack -w @nova/sdk-file --pack-destination .artifacts/npm
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # actions/upload-artifact@v7
        with:
          name: ts-sdk-tarballs
          path: .artifacts/npm/*.tgz
          retention-days: 30

  typescript-sdk-smoke:
    needs:
      - classify-changes
      - typescript-core-packages
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      needs.classify-changes.outputs.run_typescript_conformance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # actions/setup-node@v6
        with:
          node-version: "22"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact@v8
        with:
          name: ts-sdk-tarballs
          path: .artifacts/npm
      - name: Smoke test TypeScript SDK exports
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT
          cd "${tmp_dir}"
          cat > package.json <<'PKGEOF'
          {
            "name": "nova-typescript-sdk-smoke",
            "private": true,
            "type": "module"
          }
          PKGEOF
          npm install --no-package-lock "${GITHUB_WORKSPACE}/.artifacts/npm/"*.tgz
          node --input-type=module <<'NODEEOF'
          import { createNovaFileClient } from "@nova/sdk-file/client";
          import { operations as fileOperations } from "@nova/sdk-file/operations";

          if (fileOperations.get_job_status.path !== "/v1/jobs/{job_id}") {
            throw new Error(`unexpected job-status path: ${fileOperations.get_job_status.path}`);
          }

          if ("update_job_result" in fileOperations) {
            throw new Error("internal file operation leaked into public SDK");
          }

          const fileClient = createNovaFileClient({
            baseUrl: "https://nova.example/",
            fetch: async (input) => {
              const url = input.url;
              if (url !== "https://nova.example/v1/jobs/job-123") {
                throw new Error(`unexpected file client URL: ${url}`);
              }
              return new Response(JSON.stringify({
                job: {
                  job_id: "job-123",
                  status: "queued",
                  created_at: "2026-03-09T00:00:00Z",
                  updated_at: "2026-03-09T00:00:00Z",
                  events: [],
                },
              }), {
                status: 200,
                headers: { "content-type": "application/json" },
              });
            },
          });
          const fileResponse = await fileClient.GET(fileOperations.get_job_status.path, {
            params: { path: { job_id: "job-123" } },
          });
          if (fileResponse.error || fileResponse.data?.job?.job_id !== "job-123") {
            throw new Error("unexpected file client response");
          }
          NODEEOF

  dash-conformance:
    needs: classify-changes
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      needs.classify-changes.outputs.run_dash_conformance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"
          save-cache: "false"
      - name: Validate Dash lane fixtures
        run: uv run python scripts/conformance/validate_lane.py --lane dash
      - name: Validate contract fixtures against runtime models
        run: uv run pytest -q scripts/release/tests/test_contract_fixtures_v1.py

  shiny-conformance:
    needs: classify-changes
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      needs.classify-changes.outputs.run_shiny_conformance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"
          save-cache: "false"
      - name: Validate Shiny lane fixtures
        run: uv run python scripts/conformance/validate_lane.py --lane shiny
      - uses: r-lib/actions/setup-r@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.2"
      - name: Install R dependencies for nova.sdk.r.file
        uses: r-lib/actions/setup-r-dependencies@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: packages/nova_sdk_r_file
      - name: Build and check generated R SDK packages
        run: |
          set -euo pipefail
          bash scripts/checks/verify_r_cmd_check.sh packages/nova_sdk_r_file

  typescript-conformance:
    needs: classify-changes
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      needs.classify-changes.outputs.run_typescript_conformance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install TypeScript conformance dependencies
        run: npm ci
      - name: Typecheck TypeScript conformance and generated catalogs
        run: npm run -w @nova/contracts-ts-conformance typecheck
      - name: Build TypeScript SDK dependency graph
        run: npm run build:typescript:sdk-graph
      - name: Verify TypeScript fixture conformance
        run: npm run -w @nova/contracts-ts-conformance verify
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.12"
          save-cache: "false"
      - name: Validate TypeScript lane fixtures
        run: uv run python scripts/conformance/validate_lane.py --lane typescript
