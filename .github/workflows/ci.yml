name: Nova CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-security-reliability-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Lock and Sync
        run: |
          uv lock --check
          uv sync --locked --python 3.12

      - name: Runtime/Security/Reliability Gates
        run: |
          uv run pytest -q \
            packages/nova_file_api/tests/test_runtime_security_reliability_gates.py \
            packages/nova_file_api/tests/test_auth.py::test_local_auth_error_maps_common_jwt_claim_failures \
            packages/nova_file_api/tests/test_auth.py::test_required_scope_is_enforced_from_principal_claims \
            packages/nova_auth_api/tests/test_errors.py \
            packages/nova_file_api/tests/test_container_config.py::test_create_container_requires_sqs_queue_url_when_jobs_enabled \
            packages/nova_file_api/tests/test_jobs.py::test_enqueue_failure_is_not_idempotency_cached \
            packages/nova_file_api/tests/test_jobs.py::test_job_service_update_result_rejects_invalid_transition \
            packages/nova_file_api/tests/test_jobs_dynamo.py::test_dynamo_job_repository_update_if_status_enforces_expected_state \
            packages/nova_file_api/tests/test_activity_dynamo.py::test_dynamo_activity_store_uses_conditional_first_seen_markers

  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Lock and Sync
        run: |
          uv lock --check
          uv sync --locked

      - name: Ruff Check
        run: uv run ruff check .

      - name: Ruff Import Check
        run: uv run ruff check . --select I

      - name: Ruff Format
        run: uv run ruff format . --check

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest -q

      - name: Generated Client Smoke
        run: |
          uv run pytest -q \
            packages/nova_file_api/tests/test_generated_client_smoke.py

      - name: Workspace Build
        run: |
          for p in \
            packages/nova_file_api \
            packages/nova_auth_api \
            packages/nova_dash_bridge \
            apps/nova_file_api_service \
            apps/nova_auth_api_service; do
            uv build "$p"
          done

      - name: Canonical Route Policy Guard
        run: |
          echo "Verifying canonical route references and literals..."
          REQUIRED_LITERALS=(
            "/v1/transfers/uploads/initiate"
            "/v1/transfers/uploads/sign-parts"
            "/v1/transfers/uploads/complete"
            "/v1/transfers/uploads/abort"
            "/v1/transfers/downloads/presign"
            "/v1/jobs"
            "/v1/jobs/{job_id}"
            "/v1/jobs/{job_id}/cancel"
            "/v1/jobs/{job_id}/retry"
            "/v1/jobs/{job_id}/events"
            "/v1/internal/jobs/{job_id}/result"
            "/v1/capabilities"
            "/v1/resources/plan"
            "/v1/releases/info"
            "/v1/health/live"
            "/v1/health/ready"
            "/v1/token/verify"
            "/v1/token/introspect"
            "/metrics/summary"
          )
          ROUTE_LITERAL_PATTERN="/v1/jobs/\\{job_id\\}/events"
          ROUTE_LITERAL_PATTERN_ALT="/jobs/\\{job_id\\}/events"
          RUNTIME_PATHS=(
            "apps/nova_file_api_service/src"
            "apps/nova_auth_api_service/src"
            "packages/nova_file_api/src"
            "packages/nova_auth_api/src"
            "packages/nova_dash_bridge/src"
          )
          RG_PATH_EXCLUDES=(
            --glob '!**/tests/**'
            --glob '!**/fixtures/**'
          )
          if command -v rg >/dev/null 2>&1; then
            echo "Using rg to validate route references."
            for literal in "${REQUIRED_LITERALS[@]}"; do
              found_literal=0
              literal_candidates=("$literal")
              if [[ "$literal" == /v1/transfers/* ]]; then
                literal_candidates+=("${literal#/v1/transfers}")
              fi
              if [[ "$literal" == /v1/* ]]; then
                literal_candidates+=("${literal#/v1}")
              fi
              for candidate in "${literal_candidates[@]}"; do
                if rg -n -F "${RG_PATH_EXCLUDES[@]}" "$candidate" "${RUNTIME_PATHS[@]}" >/dev/null; then
                  found_literal=1
                  break
                fi
              done
              if [[ "$found_literal" -ne 1 ]]; then
                echo "::error::Required canonical route literal not found: $literal"
                exit 1
              fi
            done
            rg -n "${RG_PATH_EXCLUDES[@]}" "($ROUTE_LITERAL_PATTERN|$ROUTE_LITERAL_PATTERN_ALT)" "${RUNTIME_PATHS[@]}" || { echo "::error::Required regex route literal not found: $ROUTE_LITERAL_PATTERN"; exit 1; }
            if rg -n "/api/|/healthz|/readyz" \
              "${RUNTIME_PATHS[@]}"; then
              echo "::error::Forbidden legacy runtime route references detected."
              exit 1
            fi
          else
            echo "Using grep to validate route references."
            for literal in "${REQUIRED_LITERALS[@]}"; do
              found_literal=0
              literal_candidates=("$literal")
              if [[ "$literal" == /v1/transfers/* ]]; then
                literal_candidates+=("${literal#/v1/transfers}")
              fi
              if [[ "$literal" == /v1/* ]]; then
                literal_candidates+=("${literal#/v1}")
              fi
              for candidate in "${literal_candidates[@]}"; do
                if grep -RIn --fixed-strings \
                  --exclude-dir=tests \
                  --exclude-dir=fixtures \
                  "$candidate" "${RUNTIME_PATHS[@]}" >/dev/null; then
                  found_literal=1
                  break
                fi
              done
              if [[ "$found_literal" -ne 1 ]]; then
                echo "::error::Required canonical route literal not found: $literal"
                exit 1
              fi
            done
            grep -RInE \
              --exclude-dir=tests \
              --exclude-dir=fixtures \
              "($ROUTE_LITERAL_PATTERN|$ROUTE_LITERAL_PATTERN_ALT)" "${RUNTIME_PATHS[@]}" || { echo "::error::Required regex route literal not found: $ROUTE_LITERAL_PATTERN"; exit 1; }
            if grep -RInE "/api/|/healthz|/readyz" \
              "${RUNTIME_PATHS[@]}"; then
              echo "::error::Forbidden legacy runtime route references detected."
              exit 1
            fi
          fi
          uv run python - <<'PY'
          from __future__ import annotations
          import ast
          import sys
          from pathlib import Path

          files = [
              Path("packages/nova_file_api/src/nova_file_api/api.py"),
              Path("packages/nova_file_api/src/nova_file_api/app.py"),
          ]
          methods = {
              "get",
              "post",
              "put",
              "patch",
              "delete",
              "options",
              "head",
              "api_route",
          }
          violations: list[str] = []

          for file in files:
              content = file.read_text(encoding="utf-8")
              tree = ast.parse(content, filename=str(file))
              prefixes: dict[str, str] = {}

              for node in tree.body:
                  if not isinstance(node, ast.Assign) or len(node.targets) != 1:
                      continue
                  target = node.targets[0]
                  if not isinstance(target, ast.Name):
                      continue
                  value = node.value
                  if not isinstance(value, ast.Call):
                      continue
                  if not isinstance(value.func, ast.Name):
                      continue
                  if value.func.id != "APIRouter":
                      continue
                  for keyword in value.keywords:
                      if (
                          keyword.arg == "prefix"
                          and isinstance(keyword.value, ast.Constant)
                          and isinstance(keyword.value.value, str)
                      ):
                          prefixes[target.id] = keyword.value.value

              for node in ast.walk(tree):
                  if not isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)):
                      continue
                  for decorator in node.decorator_list:
                      if not isinstance(decorator, ast.Call):
                          continue
                      func = decorator.func
                      if not isinstance(func, ast.Attribute):
                          continue
                      if func.attr not in methods:
                          continue
                      if not isinstance(func.value, ast.Name):
                          continue

                      route_path: str | None = None
                      if decorator.args and isinstance(decorator.args[0], ast.Constant):
                          first_arg = decorator.args[0]
                          if isinstance(first_arg.value, str):
                              route_path = first_arg.value
                      if not route_path:
                          for keyword in decorator.keywords:
                              if (
                                  keyword is not None
                                  and keyword.arg == "path"
                                  and isinstance(keyword.value, ast.Constant)
                                  and isinstance(keyword.value.value, str)
                              ):
                                  route_path = keyword.value.value
                                  break

                      if not route_path:
                          continue

                      prefix = prefixes.get(func.value.id, "")
                      full_path = f"{prefix}{route_path}" if prefix else route_path
                      if (
                          full_path != "/metrics/summary"
                          and not full_path.startswith("/v1/")
                      ):
                          violations.append(
                              f"{file}:{node.name}:{func.value.id}:{route_path} -> {full_path}"
                          )

          if violations:
              print("::error::Route decorator policy violation detected:")
              for violation in violations:
                  print(violation)
              sys.exit(1)
          PY
          uv run python - <<'PY'
          from __future__ import annotations
          import sys

          from nova_file_api.app import create_app
          from nova_auth_api.app import create_app as create_auth_app

          def validate_openapi_paths(schema: dict, app_label: str) -> None:
              paths = schema.get("paths", {})
              if not isinstance(paths, dict):
                  print(
                      f"::error::{app_label} OpenAPI paths payload is not a mapping."
                  )
                  sys.exit(1)

              invalid_paths = [
                  path
                  for path in paths
                  if path != "/metrics/summary" and not path.startswith("/v1/")
              ]
              if invalid_paths:
                  print(
                      f"::error::{app_label} OpenAPI path policy violation detected:"
                  )
                  for path in sorted(invalid_paths):
                      print(path)
                  sys.exit(1)

              operation_ids: set[str] = set()
              duplicates: set[str] = set()
              for path_methods in paths.values():
                  if not isinstance(path_methods, dict):
                      continue
                  for operation in path_methods.values():
                      if not isinstance(operation, dict):
                          continue
                      operation_id = operation.get("operationId")
                      if not isinstance(operation_id, str):
                          continue
                      if operation_id in operation_ids:
                          duplicates.add(operation_id)
                      operation_ids.add(operation_id)

              if duplicates:
                  print(f"::error::{app_label} Duplicate OpenAPI operationId values detected:")
                  for operation_id in sorted(duplicates):
                      print(operation_id)
                  sys.exit(1)

          validate_openapi_paths(create_app().openapi(), "nova_file_api")
          validate_openapi_paths(create_auth_app().openapi(), "nova_auth_api")
          PY
          uv run python scripts/contracts/export_openapi.py --check
          echo "Canonical route policy guard check passed."
