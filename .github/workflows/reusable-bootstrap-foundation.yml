name: Reusable Bootstrap Foundation

on:
  workflow_call:
    inputs:
      stack_name:
        description: Foundation stack name.
        required: true
        type: string
      project:
        description: Project name.
        required: true
        type: string
      application:
        description: Application name.
        required: true
        type: string
      artifact_bucket_name:
        description: Artifact bucket name.
        required: true
        type: string
      codeartifact_domain_name:
        description: CodeArtifact domain name.
        required: true
        type: string
      ecr_repository_arn:
        description: ECR repository ARN.
        required: true
        type: string
      ecr_repository_name:
        description: ECR repository name.
        required: true
        type: string
      ecr_repository_uri:
        description: ECR repository URI.
        required: true
        type: string
      connection_name:
        description: Optional CodeConnections resource name.
        required: false
        default: nova-codeconnection
        type: string
      existing_connection_arn:
        description: Optional existing connection ARN.
        required: false
        default: ""
        type: string
      manual_approval_topic_arn:
        description: Optional existing SNS topic ARN.
        required: false
        default: ""
        type: string
      manual_approval_topic_name:
        description: Optional SNS topic name to create when ARN is absent.
        required: false
        default: ""
        type: string
      aws_region:
        description: AWS region.
        required: false
        default: us-east-1
        type: string
    secrets:
      deploy_role_arn:
        description: OIDC-assumable role for deployment.
        required: true
    outputs:
      stack_name:
        description: Foundation stack name.
        value: ${{ jobs.bootstrap.outputs.stack_name }}
      change_set_name:
        description: Last change set name.
        value: ${{ jobs.bootstrap.outputs.change_set_name }}

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    outputs:
      stack_name: ${{ steps.set_outputs.outputs.stack_name }}
      change_set_name: ${{ steps.deploy.outputs.change-set-name }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: ./.github/actions/configure-aws-oidc
        with:
          role-to-assume: ${{ secrets.deploy_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Prepare parameters
        shell: bash
        env:
          PROJECT: ${{ inputs.project }}
          APPLICATION: ${{ inputs.application }}
          ARTIFACT_BUCKET_NAME: ${{ inputs.artifact_bucket_name }}
          CODEARTIFACT_DOMAIN: ${{ inputs.codeartifact_domain_name }}
          ECR_REPOSITORY_ARN: ${{ inputs.ecr_repository_arn }}
          ECR_REPOSITORY_NAME: ${{ inputs.ecr_repository_name }}
          ECR_REPOSITORY_URI: ${{ inputs.ecr_repository_uri }}
          CONNECTION_NAME: ${{ inputs.connection_name }}
          EXISTING_CONNECTION_ARN: ${{ inputs.existing_connection_arn }}
          MANUAL_APPROVAL_TOPIC_ARN: ${{ inputs.manual_approval_topic_arn }}
          MANUAL_APPROVAL_TOPIC_NAME: ${{ inputs.manual_approval_topic_name }}
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          jq -n -e \
            --arg project "$PROJECT" \
            --arg application "$APPLICATION" \
            --arg artifact_bucket_name "$ARTIFACT_BUCKET_NAME" \
            --arg codeartifact_domain_name "$CODEARTIFACT_DOMAIN" \
            --arg ecr_repository_arn "$ECR_REPOSITORY_ARN" \
            --arg ecr_repository_name "$ECR_REPOSITORY_NAME" \
            --arg ecr_repository_uri "$ECR_REPOSITORY_URI" \
            --arg connection_name "$CONNECTION_NAME" \
            --arg existing_connection_arn "$EXISTING_CONNECTION_ARN" \
            --arg manual_approval_topic_arn "$MANUAL_APPROVAL_TOPIC_ARN" \
            --arg manual_approval_topic_name "$MANUAL_APPROVAL_TOPIC_NAME" \
            '[
              {"ParameterKey":"Project","ParameterValue":$project},
              {"ParameterKey":"Application","ParameterValue":$application},
              {"ParameterKey":"ArtifactBucketName","ParameterValue":$artifact_bucket_name},
              {"ParameterKey":"CodeArtifactDomainName","ParameterValue":$codeartifact_domain_name},
              {"ParameterKey":"EcrRepositoryArn","ParameterValue":$ecr_repository_arn},
              {"ParameterKey":"EcrRepositoryName","ParameterValue":$ecr_repository_name},
              {"ParameterKey":"EcrRepositoryUri","ParameterValue":$ecr_repository_uri},
              {"ParameterKey":"ConnectionName","ParameterValue":$connection_name},
              {"ParameterKey":"ExistingConnectionArn","ParameterValue":$existing_connection_arn},
              {"ParameterKey":"ManualApprovalTopicArn","ParameterValue":$manual_approval_topic_arn},
              {"ParameterKey":"ManualApprovalTopicName","ParameterValue":$manual_approval_topic_name}
            ]' > .artifacts/foundation-parameters.json

      - id: deploy
        name: Deploy foundation stack (change-set first)
        uses: ./.github/actions/cfn-change-set-lifecycle
        with:
          stack-name: ${{ inputs.stack_name }}
          template-file: infra/nova/nova-foundation.yml
          parameters-file: .artifacts/foundation-parameters.json
          aws-region: ${{ inputs.aws_region }}

      - id: set_outputs
        run: echo "stack_name=${{ inputs.stack_name }}" >> "$GITHUB_OUTPUT"
