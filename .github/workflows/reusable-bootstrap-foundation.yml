name: Reusable Bootstrap Foundation

on:
  workflow_call:
    inputs:
      stack_name:
        description: Foundation stack name.
        required: true
        type: string
      project:
        description: Project name.
        required: true
        type: string
      application:
        description: Application name.
        required: true
        type: string
      artifact_bucket_name:
        description: Artifact bucket name.
        required: true
        type: string
      codeartifact_domain_name:
        description: CodeArtifact domain name.
        required: true
        type: string
      codeartifact_repository_name:
        description: CodeArtifact repository name.
        required: true
        type: string
      ecr_repository_arn:
        description: ECR repository ARN.
        required: true
        type: string
      ecr_repository_name:
        description: ECR repository name.
        required: true
        type: string
      ecr_repository_uri:
        description: ECR repository URI.
        required: true
        type: string
      connection_name:
        description: Optional CodeConnections resource name.
        required: false
        default: nova-codeconnection
        type: string
      existing_connection_arn:
        description: Optional existing connection ARN.
        required: false
        default: ""
        type: string
      manual_approval_topic_arn:
        description: Optional existing SNS topic ARN.
        required: false
        default: ""
        type: string
      manual_approval_topic_name:
        description: Optional SNS topic name to create when ARN is absent.
        required: false
        default: ""
        type: string
      aws_region:
        description: AWS region.
        required: false
        default: us-east-1
        type: string
    secrets:
      deploy_role_arn:
        description: OIDC-assumable role for deployment.
        required: true
    outputs:
      stack_name:
        description: Foundation stack name.
        value: ${{ jobs.bootstrap.outputs.stack_name }}
      change_set_name:
        description: Last change set name.
        value: ${{ jobs.bootstrap.outputs.change_set_name }}

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    outputs:
      stack_name: ${{ steps.set_outputs.outputs.stack_name }}
      change_set_name: ${{ steps.deploy.outputs.change-set-name }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: ./.github/actions/configure-aws-oidc
        with:
          role-to-assume: ${{ secrets.deploy_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Prepare parameters
        run: |
          mkdir -p .artifacts
          cat > .artifacts/foundation-parameters.json <<JSON
          [
            {"ParameterKey":"Project","ParameterValue":"${{ inputs.project }}"},
            {"ParameterKey":"Application","ParameterValue":"${{ inputs.application }}"},
            {"ParameterKey":"ArtifactBucketName","ParameterValue":"${{ inputs.artifact_bucket_name }}"},
            {"ParameterKey":"CodeArtifactDomainName","ParameterValue":"${{ inputs.codeartifact_domain_name }}"},
            {"ParameterKey":"CodeArtifactRepositoryName","ParameterValue":"${{ inputs.codeartifact_repository_name }}"},
            {"ParameterKey":"EcrRepositoryArn","ParameterValue":"${{ inputs.ecr_repository_arn }}"},
            {"ParameterKey":"EcrRepositoryName","ParameterValue":"${{ inputs.ecr_repository_name }}"},
            {"ParameterKey":"EcrRepositoryUri","ParameterValue":"${{ inputs.ecr_repository_uri }}"},
            {"ParameterKey":"ConnectionName","ParameterValue":"${{ inputs.connection_name }}"},
            {"ParameterKey":"ExistingConnectionArn","ParameterValue":"${{ inputs.existing_connection_arn }}"},
            {"ParameterKey":"ManualApprovalTopicArn","ParameterValue":"${{ inputs.manual_approval_topic_arn }}"},
            {"ParameterKey":"ManualApprovalTopicName","ParameterValue":"${{ inputs.manual_approval_topic_name }}"}
          ]
          JSON

      - id: deploy
        name: Deploy foundation stack (change-set first)
        uses: ./.github/actions/cfn-change-set-lifecycle
        with:
          stack-name: ${{ inputs.stack_name }}
          template-file: infra/nova/nova-foundation.yml
          parameters-file: .artifacts/foundation-parameters.json
          aws-region: ${{ inputs.aws_region }}

      - id: set_outputs
        run: echo "stack_name=${{ inputs.stack_name }}" >> "$GITHUB_OUTPUT"
