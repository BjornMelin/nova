name: CFN Contract Validate

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'tests/infra/**'
      - 'docs/**'
      - '*.md'
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'tests/infra/**'
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cfn-and-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv

      - name: Install cfn-lint
        run: uv pip install cfn-lint==1.46.0

      - name: Validate CloudFormation syntax and schema
        run: |
          set -euo pipefail
          uv run cfn-lint infra/nova/*.yml infra/nova/deploy/*.yml infra/runtime/**/*.yml

      - name: Run infra preflight contract tests
        run: |
          set -euo pipefail
          uv run pytest -q \
            tests/infra/test_absorbed_infra_contracts.py \
            tests/infra/test_release_workflow_contracts.py \
            tests/infra/test_workflow_productization_contracts.py \
            tests/infra/test_workflow_contract_docs.py \
            tests/infra/test_docs_authority_contracts.py
