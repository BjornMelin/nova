name: CFN Contract Validate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: cfn-contract-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  classify-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_files_json: ${{ steps.scope.outputs.changed_files_json }}
      run_cfn: ${{ steps.scope.outputs.run_cfn }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect workflow scopes
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.sha }}
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          python3 scripts/ci/detect_workflow_scopes.py \
            --event-name "${EVENT_NAME}" \
            --head-sha "${HEAD_SHA}" \
            --base-sha "${BASE_SHA}"

  cfn-and-contracts:
    needs: classify-changes
    if: needs.classify-changes.outputs.run_cfn == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv

      - name: Validate CloudFormation syntax and schema
        run: |
          set -euo pipefail
          shopt -s nullglob
          shopt -s globstar
          uv run --with cfn-lint==1.46.0 cfn-lint infra/nova/*.yml infra/nova/deploy/*.yml infra/runtime/**/*.yml

      - name: Run infra preflight contract tests
        run: |
          set -euo pipefail
          uv run --with pytest pytest -q \
            tests/infra/test_absorbed_infra_contracts.py \
            tests/infra/test_ci_scope_detector.py \
            tests/infra/test_workflow_productization_contracts.py \
            tests/infra/test_workflow_contract_docs.py \
            tests/infra/test_docs_authority_contracts.py
