name: Post Deploy Validate

on:
  workflow_dispatch:
    inputs:
      validation_base_url:
        description: Canonical base URL to validate (e.g. https://api.example.com)
        required: false
        type: string
      service_base_url:
        description: Legacy alias for validation_base_url
        required: false
        type: string
      validation_canonical_paths:
        description: Comma-delimited canonical paths that must resolve (non-404).
        required: false
        default: /v1/health/live,/v1/health/ready,/metrics/summary,/v1/capabilities,/v1/releases/info
        type: string
      validation_legacy_404_paths:
        description: Comma-delimited legacy paths that must return 404.
        required: false
        default: /healthz,/readyz,/api/transfers/uploads/initiate,/api/jobs,/api/v1/transfers/uploads/initiate
        type: string

permissions:
  contents: read

jobs:
  post-deploy-validate:
    runs-on: ubuntu-latest
    env:
      VALIDATION_BASE_URL: ${{ inputs.validation_base_url }}
      SERVICE_BASE_URL: ${{ inputs.service_base_url }}
      VALIDATION_CANONICAL_PATHS: ${{ inputs.validation_canonical_paths }}
      VALIDATION_LEGACY_404_PATHS: ${{ inputs.validation_legacy_404_paths }}
    steps:
      - run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from datetime import UTC, datetime
          from urllib.error import HTTPError, URLError
          from urllib.request import Request, urlopen

          DEFAULT_CANONICAL = ",".join(
              [
                  "/v1/health/live",
                  "/v1/health/ready",
                  "/metrics/summary",
                  "/v1/capabilities",
                  "/v1/releases/info",
              ]
          )
          DEFAULT_LEGACY_404 = ",".join(
              [
                  "/healthz",
                  "/readyz",
                  "/api/transfers/uploads/initiate",
                  "/api/jobs",
                  "/api/v1/transfers/uploads/initiate",
              ]
          )

          def parse_paths(value: str) -> list[str]:
              out: list[str] = []
              for token in value.split(","):
                  path = token.strip()
                  if not path:
                      continue
                  if not path.startswith("/"):
                      path = f"/{path}"
                  out.append(path)
              return out

          def fetch_status(url: str) -> int:
              req = Request(url=url, method="GET")
              try:
                  with urlopen(req, timeout=10) as response:
                      return int(response.getcode())
              except HTTPError as exc:
                  return int(exc.code)
              except URLError as exc:
                  raise SystemExit(f"Request failed for {url}: {exc}") from exc

          base = (
              os.getenv("VALIDATION_BASE_URL")
              or os.getenv("SERVICE_BASE_URL")
              or ""
          ).strip()
          if not base:
              raise SystemExit(
                  "Provide validation_base_url (preferred) or service_base_url"
              )
          if not base.startswith("https://"):
              raise SystemExit("Validation base URL must start with https://")
          base = base.rstrip("/")

          canonical_paths = parse_paths(
              os.getenv("VALIDATION_CANONICAL_PATHS", DEFAULT_CANONICAL)
          )
          legacy_paths = parse_paths(
              os.getenv("VALIDATION_LEGACY_404_PATHS", DEFAULT_LEGACY_404)
          )
          if not canonical_paths:
              raise SystemExit("VALIDATION_CANONICAL_PATHS resolved to empty list")
          if not legacy_paths:
              raise SystemExit("VALIDATION_LEGACY_404_PATHS resolved to empty list")

          checks: list[dict[str, object]] = []
          failures: list[str] = []

          for path in canonical_paths:
              status = fetch_status(base + path)
              ok = status != 404 and status < 500
              checks.append(
                  {
                      "kind": "canonical",
                      "path": path,
                      "expected": "status != 404 and < 500",
                      "status_code": status,
                      "ok": ok,
                  }
              )
              if not ok:
                  failures.append(f"canonical path {path} returned {status}")

          for path in legacy_paths:
              status = fetch_status(base + path)
              ok = status == 404
              checks.append(
                  {
                      "kind": "legacy_404",
                      "path": path,
                      "expected": "status == 404",
                      "status_code": status,
                      "ok": ok,
                  }
              )
              if not ok:
                  failures.append(f"legacy path {path} returned {status}")

          report = {
              "timestamp_utc": datetime.now(UTC).isoformat(),
              "base_url": base,
              "canonical_paths": canonical_paths,
              "legacy_404_paths": legacy_paths,
              "checks": checks,
              "status": "failed" if failures else "passed",
              "failures": failures,
          }
          report_path = "post-deploy-validation-report.json"
          with open(report_path, "w", encoding="utf-8") as handle:
              json.dump(report, handle, indent=2, sort_keys=True)
              handle.write("\n")

          if failures:
              raise SystemExit("Validation failed: " + "; ".join(failures))
          PY
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-validation-report
          path: post-deploy-validation-report.json
