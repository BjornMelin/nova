name: Post Deploy Validate

on:
  workflow_dispatch:
    inputs:
      deploy_run_id:
        description: Workflow run id that produced the authoritative deploy-output artifact.
        required: true
        type: string
      deploy_repo:
        description: Repository that owns the deploy-output artifact (owner/repo).
        required: false
        default: ""
        type: string
      deploy_artifact_name:
        description: Artifact name containing deploy-output.json and deploy-output.sha256.
        required: false
        default: deploy-runtime-output
        type: string
      validation_canonical_paths:
        description: Comma-delimited canonical paths that must resolve (non-404).
        required: false
        default: /v1/health/live,/v1/health/ready,/metrics/summary,/v1/capabilities,/v1/releases/info
        type: string
      validation_legacy_404_paths:
        description: Comma-delimited legacy paths that must return 404.
        required: false
        default: /healthz,/readyz,/api/transfers/uploads/initiate,/api/jobs,/api/v1/transfers/uploads/initiate
        type: string
      report_path:
        description: JSON report output path.
        required: false
        default: post-deploy-validation-report.json
        type: string
      artifact_name:
        description: Uploaded artifact name for validation output.
        required: false
        default: post-deploy-validation-report
        type: string

permissions:
  actions: read
  contents: read

jobs:
  post-deploy-validate:
    uses: ./.github/workflows/reusable-post-deploy-validate.yml
    with:
      deploy_run_id: ${{ inputs.deploy_run_id }}
      deploy_repo: ${{ inputs.deploy_repo }}
      deploy_artifact_name: ${{ inputs.deploy_artifact_name }}
      validation_canonical_paths: ${{ inputs.validation_canonical_paths }}
      validation_legacy_404_paths: ${{ inputs.validation_legacy_404_paths }}
      report_path: ${{ inputs.report_path }}
      artifact_name: ${{ inputs.artifact_name }}
