name: Post Deploy Validate

on:
  workflow_dispatch:
    inputs:
      service_base_url:
        description: Base URL to validate (e.g. https://api.example.com)
        required: true
        type: string

permissions:
  contents: read

jobs:
  post-deploy-validate:
    runs-on: ubuntu-latest
    env:
      SERVICE_BASE_URL: ${{ inputs.service_base_url }}
    steps:
      - run: |
          set -euo pipefail
          BASE="${SERVICE_BASE_URL}"
          [[ "${BASE}" =~ ^https://[^[:space:]]+$ ]] || {
            echo "service_base_url must start with https://" >&2
            exit 1
          }
          BASE="${BASE%/}"
          for path in healthz readyz v1/health/live; do
            curl --connect-timeout 5 --max-time 20 --retry 2 --retry-all-errors -fsS "${BASE}/${path}" >/dev/null
          done
