name: Post Deploy Validate

on:
  workflow_dispatch:
    inputs:
      service_base_url:
        description: Base URL to validate (e.g. https://api.example.com)
        required: true
        type: string

permissions:
  contents: read

jobs:
  post-deploy-validate:
    runs-on: ubuntu-latest
    env:
      SERVICE_BASE_URL: ${{ inputs.service_base_url }}
    steps:
      - run: |
          set -euo pipefail
          BASE="${SERVICE_BASE_URL%/}"
          [[ "$BASE" =~ ^https?://[A-Za-z0-9.-]+(:[0-9]+)?(/[A-Za-z0-9._~:/?#\[\]@!$&'"()*+,;=%-]*)?$ ]] || {
            echo "Invalid service_base_url" >&2
            exit 1
          }
          curl -fsS "${BASE}/healthz" >/dev/null
          curl -fsS "${BASE}/readyz" >/dev/null
          curl -fsS "${BASE}/metrics/summary" >/dev/null
