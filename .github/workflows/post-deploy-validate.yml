name: Post Deploy Validate

on:
  workflow_dispatch:
    inputs:
      deploy_run_id:
        description: Workflow run id that produced the authoritative deploy-output artifact.
        required: false
        type: string
      deploy_repo:
        description: Repository that owns the deploy-output artifact (owner/repo).
        required: false
        default: ""
        type: string
      deploy_artifact_name:
        description: Artifact name containing deploy-output.json and deploy-output.sha256.
        required: false
        default: deploy-output
        type: string
      deploy_output_json:
        description: Optional inline deploy-output JSON payload.
        required: false
        default: ""
        type: string
      deploy_output_path:
        description: Optional workspace path to a pre-fetched deploy-output JSON file.
        required: false
        default: ""
        type: string
      aws_role_to_assume:
        description: Optional read-only AWS role ARN used for live runtime observability checks.
        required: false
        default: ""
        type: string
      validation_canonical_paths:
        description: Comma-delimited public canonical paths that must satisfy runtime truth checks.
        required: false
        default: /v1/health/live,/v1/health/ready,/v1/capabilities,/v1/releases/info
        type: string
      validation_protected_paths:
        description: Comma-delimited 'METHOD /path' auth-gate probes.
        required: false
        default: POST /v1/exports
        type: string
      validation_cors_preflight_path:
        description: Protected path used for browser CORS preflight validation.
        required: false
        default: /v1/exports
        type: string
      validation_cors_origin:
        description: Optional origin override used for browser CORS preflight validation.
        required: false
        default: ""
        type: string
      validation_legacy_404_paths:
        description: Comma-delimited legacy paths that must return 404.
        required: false
        default: /healthz,/readyz,/api/transfers/uploads/initiate,/api/jobs,/api/v1/transfers/uploads/initiate
        type: string
      report_path:
        description: JSON report output path.
        required: false
        default: post-deploy-validation-report.json
        type: string
      artifact_name:
        description: Uploaded artifact name for validation output.
        required: false
        default: post-deploy-validation-report
        type: string

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  post-deploy-validate:
    uses: ./.github/workflows/reusable-post-deploy-validate.yml
    with:
      deploy_run_id: ${{ inputs.deploy_run_id }}
      deploy_repo: ${{ inputs.deploy_repo }}
      deploy_artifact_name: ${{ inputs.deploy_artifact_name }}
      deploy_output_json: ${{ inputs.deploy_output_json }}
      deploy_output_path: ${{ inputs.deploy_output_path }}
      aws_role_to_assume: ${{ inputs.aws_role_to_assume }}
      validation_canonical_paths: ${{ inputs.validation_canonical_paths }}
      validation_protected_paths: ${{ inputs.validation_protected_paths }}
      validation_cors_preflight_path: ${{ inputs.validation_cors_preflight_path }}
      validation_cors_origin: ${{ inputs.validation_cors_origin }}
      validation_legacy_404_paths: ${{ inputs.validation_legacy_404_paths }}
      report_path: ${{ inputs.report_path }}
      artifact_name: ${{ inputs.artifact_name }}
