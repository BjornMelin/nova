name: Reusable Release Apply

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Git ref/SHA to checkout before applying release changes.
        required: true
        type: string
      release_artifact_bucket:
        description: S3 bucket for immutable API Lambda release artifacts.
        required: true
        type: string
      aws_region:
        description: AWS region for release role and signing secret lookup.
        required: false
        default: us-east-1
        type: string
      commit_message:
        description: Release commit message.
        required: false
        default: "chore(release): apply selective versions"
        type: string
    secrets:
      release_aws_role_arn:
        description: OIDC-assumable AWS role for release automation.
        required: true
      release_signing_secret_id:
        description: Secrets Manager secret id with SSH signing material.
        required: true

permissions:
  id-token: write
  contents: write

defaults:
  run:
    shell: bash

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      RELEASE_AWS_ROLE_ARN: ${{ secrets.release_aws_role_arn }}
      RELEASE_ARTIFACT_BUCKET: ${{ inputs.release_artifact_bucket }}
      SIGNING_SECRET_ID: ${{ secrets.release_signing_secret_id }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout_ref }}
          persist-credentials: false

      - name: Configure authenticated git remote
        run: git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Guard checkout ref resolves to origin/main
        run: |
          set -euo pipefail
          git fetch origin main --no-tags --depth=1
          main_commit="$(git rev-parse --verify origin/main)"
          head_commit="$(git rev-parse --verify HEAD)"
          if [[ "$head_commit" != "$main_commit" ]]; then
            echo "Ref mismatch: checkout_ref resolved to ${head_commit}, but origin/main is ${main_commit}. Release apply must run on origin/main." >&2
            exit 1
          fi

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv

      - name: Configure AWS Credentials (OIDC)
        uses: ./.github/actions/configure-aws-oidc
        with:
          role-to-assume: ${{ env.RELEASE_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate required release artifact bucket
        run: |
          set -euo pipefail
          [[ -n "${RELEASE_ARTIFACT_BUCKET}" ]] || {
            echo "RELEASE_ARTIFACT_BUCKET is required" >&2
            exit 1
          }

      - name: Recompute release plan
        run: |
          uv run python -m scripts.release.changed_units \
            --repo-root . \
            --output .artifacts/changed-units.json
          uv run python -m scripts.release.version_plan \
            --repo-root . \
            --changed-units .artifacts/changed-units.json \
            --output .artifacts/version-plan.json

      - name: Apply versions + manifest
        run: |
          uv run python -m scripts.release.apply_versions \
            --repo-root . \
            --version-plan .artifacts/version-plan.json
          uv lock
          uv run python -m scripts.release.write_manifest \
            --repo-root . \
            --changed-units .artifacts/changed-units.json \
            --version-plan .artifacts/version-plan.json \
            --manifest-path docs/release/RELEASE-VERSION-MANIFEST.md

      - name: Configure release signing
        uses: ./.github/actions/configure-release-signing
        with:
          signing-secret-id: ${{ env.SIGNING_SECRET_ID }}

      - name: Commit release changes
        id: release_commit
        run: |
          set -euo pipefail

          add_paths=(
            docs/release/RELEASE-VERSION-MANIFEST.md
            uv.lock
            pyproject.toml
          )
          [[ -e apps ]] && add_paths+=(apps)
          [[ -e packages ]] && add_paths+=(packages)

          git add "${add_paths[@]}"

          if git diff --cached --quiet; then
            echo "No release changes detected."
            echo "release_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "release_commit_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -S -m "${{ inputs.commit_message }}"
          echo "release_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "release_commit_created=true" >> "$GITHUB_OUTPUT"

      - name: Build immutable API Lambda artifact
        run: |
          set -euo pipefail
          git checkout "${{ steps.release_commit.outputs.release_commit_sha }}"
          uv run python scripts/release/build_api_lambda_asset.py \
            --output-zip .artifacts/nova-file-api-lambda.zip

      - name: Publish immutable API Lambda artifact
        id: api_lambda_artifact
        run: |
          set -euo pipefail

          API_LAMBDA_ARTIFACT_SHA256="$(sha256sum .artifacts/nova-file-api-lambda.zip | awk '{print $1}')"
          export API_LAMBDA_ARTIFACT_SHA256

          API_LAMBDA_ARTIFACT_KEY="$(python - <<'PY'
          import json
          import os
          import tomllib
          from datetime import datetime, timezone
          from pathlib import Path

          release_commit_sha = "${{ steps.release_commit.outputs.release_commit_sha }}"
          artifact_sha256 = os.environ["API_LAMBDA_ARTIFACT_SHA256"]
          artifact_bucket = os.environ["RELEASE_ARTIFACT_BUCKET"]
          artifact_key = (
              f"runtime/nova-file-api/{release_commit_sha}/"
              f"{artifact_sha256}/nova-file-api-lambda.zip"
          )
          package_meta = tomllib.loads(
              Path("packages/nova_file_api/pyproject.toml").read_text(
                  encoding="utf-8"
              )
          )["project"]
          payload = {
              "release_commit_sha": release_commit_sha,
              "package_name": package_meta["name"],
              "package_version": package_meta["version"],
              "runtime": "python3.13",
              "architecture": "arm64",
              "artifact_bucket": artifact_bucket,
              "artifact_key": artifact_key,
              "artifact_sha256": artifact_sha256,
              "built_at": datetime.now(timezone.utc).isoformat().replace(
                  "+00:00",
                  "Z",
              ),
          }
          Path(".artifacts/api-lambda-artifact.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(artifact_key)
          PY
          )"

          aws s3 cp \
            .artifacts/nova-file-api-lambda.zip \
            "s3://${RELEASE_ARTIFACT_BUCKET}/${API_LAMBDA_ARTIFACT_KEY}"

          {
            echo "artifact_key=${API_LAMBDA_ARTIFACT_KEY}"
            echo "artifact_sha256=${API_LAMBDA_ARTIFACT_SHA256}"
          } >> "$GITHUB_OUTPUT"

      - name: Push signed release commit
        if: steps.release_commit.outputs.release_commit_created == 'true'
        run: |
          set -euo pipefail
          git push origin HEAD:main

      - name: Write release-apply artifact metadata
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          payload = {
              "release_commit_sha": "${{ steps.release_commit.outputs.release_commit_sha }}",
              "api_lambda_artifact_manifest": "api-lambda-artifact.json",
              "api_lambda_artifact_bucket": "${{ inputs.release_artifact_bucket }}",
              "api_lambda_artifact_key": "${{ steps.api_lambda_artifact.outputs.artifact_key }}",
              "api_lambda_artifact_sha256": "${{ steps.api_lambda_artifact.outputs.artifact_sha256 }}",
          }
          Path(".artifacts/release-apply-metadata.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload release-apply artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # actions/upload-artifact@v7
        with:
          name: release-apply-artifacts
          path: .artifacts/
