name: Reusable Release Apply

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Git ref/SHA to checkout before applying release changes.
        required: true
        type: string
      plan_run_id:
        description: Workflow run id that uploaded release-plan-artifacts.
        required: true
        type: string
      aws_region:
        description: AWS region for release role and signing secret lookup.
        required: false
        default: us-east-1
        type: string
      workflow_api_major:
        description: Major version channel for published reusable workflow tags.
        required: false
        default: "1"
        type: string
      commit_message:
        description: Release commit message.
        required: false
        default: "chore(release): apply selective versions [skip release]"
        type: string
    secrets:
      release_aws_role_arn:
        description: OIDC-assumable AWS role for release automation.
        required: true
      release_signing_secret_id:
        description: Secrets Manager secret id with SSH signing material.
        required: true

permissions:
  id-token: write
  contents: write
  actions: read

defaults:
  run:
    shell: bash

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      RELEASE_AWS_ROLE_ARN: ${{ secrets.release_aws_role_arn }}
      SIGNING_SECRET_ID: ${{ secrets.release_signing_secret_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout_ref }}

      - name: Guard checkout ref resolves to origin/main
        run: |
          set -euo pipefail
          git fetch origin main --no-tags --depth=1
          main_commit="$(git rev-parse --verify origin/main)"
          head_commit="$(git rev-parse --verify HEAD)"
          if [[ "$head_commit" != "$main_commit" ]]; then
            echo "Ref mismatch: checkout_ref resolved to ${head_commit}, but origin/main is ${main_commit}. Release apply must run on origin/main." >&2
            exit 1
          fi

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv

      - name: Configure AWS Credentials (OIDC)
        uses: ./.github/actions/configure-aws-oidc
        with:
          role-to-assume: ${{ env.RELEASE_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download immutable release-plan artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          uv run python -m scripts.release.download_run_artifact \
            --repo "${{ github.repository }}" \
            --run-id "${{ inputs.plan_run_id }}" \
            --artifact-name release-plan-artifacts \
            --output-dir .artifacts

      - name: Validate release-plan artifacts
        run: |
          set -euo pipefail
          test -f .artifacts/changed-units.json
          test -f .artifacts/version-plan.json

      - name: Apply versions + manifest
        run: |
          uv run python -m scripts.release.apply_versions \
            --repo-root . \
            --version-plan .artifacts/version-plan.json
          uv lock
          uv run python -m scripts.release.write_manifest \
            --repo-root . \
            --changed-units .artifacts/changed-units.json \
            --version-plan .artifacts/version-plan.json \
            --manifest-path docs/plan/release/RELEASE-VERSION-MANIFEST.md

      - name: Configure release signing
        uses: ./.github/actions/configure-release-signing
        with:
          signing-secret-id: ${{ env.SIGNING_SECRET_ID }}

      - name: Commit and push release changes
        run: |
          set -euo pipefail

          add_paths=(
            docs/plan/release/RELEASE-VERSION-MANIFEST.md
            uv.lock
            pyproject.toml
          )
          [[ -e apps ]] && add_paths+=(apps)
          [[ -e packages ]] && add_paths+=(packages)

          git add "${add_paths[@]}"

          if git diff --cached --quiet; then
            echo "No release changes detected."
            exit 0
          fi

          git commit -S -m "${{ inputs.commit_message }}"
          git push origin HEAD:main

      - name: Publish reusable workflow API tags
        run: |
          set -euo pipefail
          base_commit="$(python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(
              Path(".artifacts/changed-units.json").read_text(encoding="utf-8")
          )
          value = payload.get("base_commit")
          print(value or "")
          PY
          )"
          args=(
            uv run python -m scripts.release.publish_workflow_api_tags
            --repo-root .
            --head-commit HEAD
            --workflow-api-major "${{ inputs.workflow_api_major }}"
            --metadata-path .artifacts/workflow-api-tagging.json
            --remote origin
            --push
          )
          if [ -n "$base_commit" ]; then
            args+=(--base-commit "$base_commit")
          fi
          "${args[@]}"

      - name: Record release apply metadata
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          payload = {
              "release_commit_sha": subprocess.check_output(
                  ["git", "rev-parse", "HEAD"], text=True
              ).strip()
          }
          workflow_tagging = Path(".artifacts/workflow-api-tagging.json")
          if workflow_tagging.exists():
              payload["workflow_api_tagging"] = json.loads(
                  workflow_tagging.read_text(encoding="utf-8")
              )
          Path(".artifacts/release-apply-metadata.json").write_text(
              json.dumps(payload, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload release apply artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apply-artifacts
          path: |
            .artifacts/changed-units.json
            .artifacts/version-plan.json
            .artifacts/workflow-api-tagging.json
            .artifacts/release-apply-metadata.json
