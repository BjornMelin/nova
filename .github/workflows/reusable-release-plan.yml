name: Reusable Release Plan

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Git ref/SHA to checkout before computing release plan.
        required: false
        default: main
        type: string
    outputs:
      changed_count:
        description: Number of changed units detected.
        value: ${{ jobs.plan.outputs.changed_count }}

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      changed_count: ${{ steps.stats.outputs.changed_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout_ref }}

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv

      - name: Compute changed units
        run: |
          uv run python -m scripts.release.changed_units \
            --repo-root . \
            --output .artifacts/changed-units.json

      - name: Compute version plan
        run: |
          uv run python -m scripts.release.version_plan \
            --repo-root . \
            --changed-units .artifacts/changed-units.json \
            --output .artifacts/version-plan.json

      - name: Emit stats
        id: stats
        run: |
          CHANGED_COUNT=$(jq '.changed_units | length' .artifacts/changed-units.json)
          echo "changed_count=${CHANGED_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Upload plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-plan-artifacts
          path: .artifacts/
