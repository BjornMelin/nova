name: Reusable Promote Prod

on:
  workflow_call:
    inputs:
      pipeline_name:
        description: AWS CodePipeline name.
        required: true
        type: string
      manifest_sha256:
        description: SHA256 for docs/release/RELEASE-VERSION-MANIFEST.md.
        required: true
        type: string
      changed_units_json:
        description: Optional JSON object from staged gate artifact.
        required: false
        default: ""
        type: string
      changed_units_path:
        description: Optional file path for changed_units JSON; preferred over changed_units_json when provided.
        required: false
        default: ""
        type: string
      changed_units_sha256:
        description: SHA256 of canonical changed_units payload.
        required: true
        type: string
      version_plan_json:
        description: Optional JSON object from staged gate artifact.
        required: false
        default: ""
        type: string
      version_plan_path:
        description: Optional file path for version_plan JSON; preferred over version_plan_json when provided.
        required: false
        default: ""
        type: string
      version_plan_sha256:
        description: SHA256 of canonical version_plan payload.
        required: true
        type: string
      promotion_candidates_json:
        description: Optional JSON array from codeartifact-promotion-candidates artifact.
        required: false
        default: ""
        type: string
      promotion_candidates_path:
        description: Optional file path for promotion_candidates JSON; preferred over promotion_candidates_json when provided.
        required: false
        default: ""
        type: string
      promotion_candidates_sha256:
        description: SHA256 of canonical promotion_candidates payload.
        required: true
        type: string
      codeartifact_domain:
        description: CodeArtifact domain used for promotion.
        required: true
        type: string
      codeartifact_staging_repository:
        description: Staging repository for gated package publication.
        required: true
        type: string
      codeartifact_prod_repository:
        description: Production repository for promoted package publication.
        required: true
        type: string
      aws_region:
        description: AWS region used for release automation.
        required: false
        default: us-east-1
        type: string
    secrets:
      release_aws_role_arn:
        description: OIDC-assumable AWS role for release automation.
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: reusable-promote-prod-${{ inputs.pipeline_name }}-${{ inputs.aws_region }}
  cancel-in-progress: false

jobs:
  validate-and-promote-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PIPELINE_NAME: ${{ inputs.pipeline_name }}
      AWS_REGION: ${{ inputs.aws_region }}
      RELEASE_AWS_ROLE_ARN: ${{ secrets.release_aws_role_arn }}
      CODEARTIFACT_DOMAIN: ${{ inputs.codeartifact_domain }}
      CODEARTIFACT_STAGING_REPOSITORY: ${{ inputs.codeartifact_staging_repository }}
      CODEARTIFACT_PROD_REPOSITORY: ${{ inputs.codeartifact_prod_repository }}
      INPUT_CHANGED_UNITS_JSON: ${{ inputs.changed_units_json }}
      INPUT_CHANGED_UNITS_PATH: ${{ inputs.changed_units_path }}
      INPUT_VERSION_PLAN_JSON: ${{ inputs.version_plan_json }}
      INPUT_VERSION_PLAN_PATH: ${{ inputs.version_plan_path }}
      INPUT_PROMOTION_CANDIDATES_JSON: ${{ inputs.promotion_candidates_json }}
      INPUT_PROMOTION_CANDIDATES_PATH: ${{ inputs.promotion_candidates_path }}
      EXPECTED_CHANGED_UNITS_SHA256: ${{ inputs.changed_units_sha256 }}
      EXPECTED_VERSION_PLAN_SHA256: ${{ inputs.version_plan_sha256 }}
      EXPECTED_PROMOTION_CANDIDATES_SHA256: ${{ inputs.promotion_candidates_sha256 }}
      EXPECTED_MANIFEST_SHA256: ${{ inputs.manifest_sha256 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv

      - name: Configure AWS Credentials (OIDC)
        uses: ./.github/actions/configure-aws-oidc
        with:
          role-to-assume: ${{ env.RELEASE_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate promotion input policy
        run: |
          set -euo pipefail

          require_nonempty() {
            local name="$1"
            local value="$2"
            [[ -n "$value" ]] || { echo "$name is required" >&2; exit 1; }
          }

          require_sha256() {
            local name="$1"
            local value="$2"
            [[ "$value" =~ ^[A-Fa-f0-9]{64}$ ]] || {
              echo "$name must be a 64-character hex SHA256 digest" >&2
              exit 1
            }
          }

          validate_json_source() {
            local label="$1"
            local json_value="$2"
            local path_value="$3"
            local workspace_root

            if [[ -z "$json_value" && -z "$path_value" ]]; then
              echo "${label}: provide ${label}_json or ${label}_path" >&2
              exit 1
            fi

            if [[ -n "$path_value" ]]; then
              [[ "$path_value" = /* ]] && {
                echo "${label}: absolute path is not allowed (${path_value})" >&2
                exit 1
              }
              workspace_root="$(realpath "$GITHUB_WORKSPACE")"
              path_value="$(realpath -m -- "$path_value")"
              case "$path_value" in
                "$workspace_root" | "$workspace_root"/*) ;;
                *)
                  echo "${label}: path escapes the workspace (${path_value})" >&2
                  exit 1
                  ;;
              esac
              [[ -f "$path_value" ]] || {
                echo "${label}: file not found (${path_value})" >&2
                exit 1
              }
            fi
          }

          require_nonempty "pipeline_name" "$PIPELINE_NAME"
          require_nonempty "CODEARTIFACT_DOMAIN" "$CODEARTIFACT_DOMAIN"
          require_nonempty "CODEARTIFACT_STAGING_REPOSITORY" "$CODEARTIFACT_STAGING_REPOSITORY"
          require_nonempty "CODEARTIFACT_PROD_REPOSITORY" "$CODEARTIFACT_PROD_REPOSITORY"
          require_sha256 "manifest_sha256" "$EXPECTED_MANIFEST_SHA256"
          require_sha256 "changed_units_sha256" "$EXPECTED_CHANGED_UNITS_SHA256"
          require_sha256 "version_plan_sha256" "$EXPECTED_VERSION_PLAN_SHA256"
          require_sha256 "promotion_candidates_sha256" "$EXPECTED_PROMOTION_CANDIDATES_SHA256"

          validate_json_source "changed_units" "$INPUT_CHANGED_UNITS_JSON" "$INPUT_CHANGED_UNITS_PATH"
          validate_json_source "version_plan" "$INPUT_VERSION_PLAN_JSON" "$INPUT_VERSION_PLAN_PATH"
          validate_json_source "promotion_candidates" "$INPUT_PROMOTION_CANDIDATES_JSON" "$INPUT_PROMOTION_CANDIDATES_PATH"

          [[ "$CODEARTIFACT_STAGING_REPOSITORY" != "$CODEARTIFACT_PROD_REPOSITORY" ]] || {
            echo "Staging and prod repositories must be distinct" >&2
            exit 1
          }

          mkdir -p .artifacts
          uv run python - <<'PY'
          import hashlib
          import json
          from datetime import datetime, timezone
          import os
          from pathlib import Path

          def load_payload(label: str, json_text: str, path: str) -> object:
              if path:
                  return json.loads(Path(path).read_text(encoding="utf-8"))
              return json.loads(json_text)

          def canonical_sha256(payload: object) -> str:
              canonical = json.dumps(payload, sort_keys=True, separators=(",", ":"), ensure_ascii=False)
              return hashlib.sha256(canonical.encode("utf-8")).hexdigest()

          payloads = [
              {
                  "label": "changed_units",
                  "payload": load_payload(
                      "changed_units",
                      os.environ.get("INPUT_CHANGED_UNITS_JSON", ""),
                      os.environ.get("INPUT_CHANGED_UNITS_PATH", ""),
                  ),
                  "expected_type": dict,
                  "expected_sha": os.environ["EXPECTED_CHANGED_UNITS_SHA256"].lower(),
                  "output_path": Path(".artifacts/changed-units.json"),
              },
              {
                  "label": "version_plan",
                  "payload": load_payload(
                      "version_plan",
                      os.environ.get("INPUT_VERSION_PLAN_JSON", ""),
                      os.environ.get("INPUT_VERSION_PLAN_PATH", ""),
                  ),
                  "expected_type": dict,
                  "expected_sha": os.environ["EXPECTED_VERSION_PLAN_SHA256"].lower(),
                  "output_path": Path(".artifacts/version-plan.json"),
              },
              {
                  "label": "promotion_candidates",
                  "payload": load_payload(
                      "promotion_candidates",
                      os.environ.get("INPUT_PROMOTION_CANDIDATES_JSON", ""),
                      os.environ.get("INPUT_PROMOTION_CANDIDATES_PATH", ""),
                  ),
                  "expected_type": list,
                  "expected_sha": os.environ["EXPECTED_PROMOTION_CANDIDATES_SHA256"].lower(),
                  "output_path": Path(".artifacts/promotion-candidates.json"),
              },
          ]

          for entry in payloads:
              payload = entry["payload"]
              label = str(entry["label"])
              expected_type = entry["expected_type"]
              expected_sha = str(entry["expected_sha"])
              output_path = entry["output_path"]

              if not isinstance(payload, expected_type):
                  expected_json_type = "object" if expected_type is dict else "array"
                  raise SystemExit(f"{label}: expected top-level JSON {expected_json_type}")

              digest = canonical_sha256(payload)
              if digest != expected_sha:
                  raise SystemExit(
                      f"{label}: sha256 mismatch (expected {expected_sha}, actual {digest})"
                  )

              output_path.write_text(
                  json.dumps(payload, indent=2, sort_keys=True) + "\n",
                  encoding="utf-8",
              )

          r_packages = [
              item
              for item in payloads[2]["payload"]
              if isinstance(item, dict) and item.get("format") == "r"
          ]
          if r_packages:
              generated_at = datetime.now(timezone.utc).replace(
                  microsecond=0
              ).isoformat().replace("+00:00", "Z")
              Path(".artifacts/r-publish-report.json").write_text(
                  json.dumps(
                      {
                          "schema_version": "1.0",
                          "generated_at": generated_at,
                          "packages": [
                              {
                                  "unit_id": item["unit_id"],
                                  "package": item["package"],
                                  "version": item["version"],
                                  "format": item["format"],
                                  "codeartifact_format": item["codeartifact_format"],
                                  "namespace": item.get("namespace"),
                                  "tarball_path": item["tarball_path"],
                                  "signature_path": item["signature_path"],
                                  "tarball_sha256": item["tarball_sha256"],
                                  "signature_sha256": item["signature_sha256"],
                              }
                              for item in r_packages
                          ],
                      },
                      indent=2,
                      sort_keys=True,
                  )
                  + "\n",
                  encoding="utf-8",
              )
          PY

          R_PUBLISH_REPORT_ARGS=()
          if [[ -f .artifacts/r-publish-report.json ]]; then
            R_PUBLISH_REPORT_ARGS=(--r-publish-report .artifacts/r-publish-report.json)
          fi
          uv run python -m scripts.release.codeartifact_gate \
            --repo-root . \
            --manifest-path docs/release/RELEASE-VERSION-MANIFEST.md \
            --changed-units .artifacts/changed-units.json \
            --version-plan .artifacts/version-plan.json \
            --expected-manifest-sha256 "$EXPECTED_MANIFEST_SHA256" \
            "${R_PUBLISH_REPORT_ARGS[@]}" \
            --gate-report-out .artifacts/prod-promotion-gate-report.json \
            --promotion-candidates-out .artifacts/validated-promotion-candidates.json

      - name: Verify promotion candidates match gate output
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import json
          from pathlib import Path

          candidates_path = Path('.artifacts/promotion-candidates.json')
          validated_path = Path('.artifacts/validated-promotion-candidates.json')

          candidates_raw = candidates_path.read_text(encoding='utf-8')
          validated_raw = validated_path.read_text(encoding='utf-8')

          candidates = json.loads(candidates_raw)
          validated = json.loads(validated_raw)

          canonical_candidates = json.dumps(
              candidates, sort_keys=True, separators=(",", ":"), ensure_ascii=False
          )
          canonical_validated = json.dumps(
              validated, sort_keys=True, separators=(",", ":"), ensure_ascii=False
          )

          if canonical_candidates != canonical_validated:
              raise SystemExit(
                  f"Promotion candidates drift detected: "
                  f"{candidates_path} differs from {validated_path}"
              )

          print(f"Verified {candidates_path} matches {validated_path}")
          PY

      - name: Promote package versions staging -> prod
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import json
          import re
          import subprocess
          from pathlib import Path

          candidates = json.loads(Path('.artifacts/validated-promotion-candidates.json').read_text())
          sha256_re = re.compile(r'^[A-Fa-f0-9]{64}$')
          for item in candidates:
              package = item['package']
              codeartifact_format = item.get('codeartifact_format', item.get('format', 'pypi'))
              namespace = item.get('namespace')
              package_name = package
              if item.get('format') == 'r':
                  tarball_sha256 = item.get('tarball_sha256')
                  signature_sha256 = item.get('signature_sha256')
                  if not isinstance(tarball_sha256, str) or not sha256_re.fullmatch(tarball_sha256):
                      raise SystemExit(
                          f"R promotion candidate {package} is missing a valid tarball sha256"
                      )
                  if not isinstance(signature_sha256, str) or not sha256_re.fullmatch(signature_sha256):
                      raise SystemExit(
                          f"R promotion candidate {package} is missing a valid signature sha256"
                      )
              if codeartifact_format == 'npm' and namespace:
                  scoped_prefix = f'@{namespace}/'
                  if not package.startswith(scoped_prefix):
                      raise SystemExit(
                          f'Promotion candidate package {package} does not match namespace {namespace}'
                      )
                  package_name = package.removeprefix(scoped_prefix)
              version = item['version']
              command = [
                  'aws', 'codeartifact', 'copy-package-versions',
                  '--domain', '${{ env.CODEARTIFACT_DOMAIN }}',
                  '--source-repository', '${{ env.CODEARTIFACT_STAGING_REPOSITORY }}',
                  '--destination-repository', '${{ env.CODEARTIFACT_PROD_REPOSITORY }}',
                  '--format', codeartifact_format,
              ]
              if codeartifact_format in {'npm', 'generic'} and namespace:
                  command.extend(['--namespace', namespace])
              command.extend([
                  '--package', package_name,
                  '--versions', version,
                  '--no-cli-pager',
                  '--output', 'json',
              ])
              try:
                  result = subprocess.run(
                      command,
                      check=True,
                      text=True,
                      capture_output=True,
                  )
              except subprocess.CalledProcessError as exc:
                  stderr = (exc.stderr or '').strip()
                  stdout = (exc.stdout or '').strip()
                  raise SystemExit(
                      "CodeArtifact promotion command failed for "
                      f"{package} {version}: returncode={exc.returncode} "
                      f"stdout={stdout!r} stderr={stderr!r}"
                  ) from exc
              payload = json.loads(result.stdout or '{}')
              failed = payload.get('failedVersions') or {}
              unexpected = {
                  ver: meta
                  for ver, meta in failed.items()
                  if str(meta.get('errorCode')).upper() != 'ALREADY_EXISTS'
              }
              if unexpected:
                  raise SystemExit(
                      f'CodeArtifact promotion failed for {package} {version}: '
                      f'{json.dumps(unexpected)}'
                  )
              if failed:
                  print(
                      f'Skipping already-existing promotion for {package} {version}: '
                      f'{json.dumps(failed)}'
                  )
          PY

  approve-prod-pipeline:
    needs: validate-and-promote-packages
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure AWS Credentials (OIDC)
        uses: ./.github/actions/configure-aws-oidc
        with:
          role-to-assume: ${{ secrets.release_aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Approve prod promotion stage
        uses: ./.github/actions/codepipeline-approve
        with:
          pipeline-name: ${{ inputs.pipeline_name }}
          aws-region: ${{ inputs.aws_region }}
