name: Nova Release Plan

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plan:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip release]')
    uses: ./.github/workflows/reusable-release-plan.yml
    with:
      checkout_ref: ${{ github.sha }}
