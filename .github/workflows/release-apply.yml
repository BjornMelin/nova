name: Nova Release Apply

on:
  workflow_run:
    workflows: ["Nova Release Plan"]
    types: [completed]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  apply:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    uses: ./.github/workflows/reusable-release-apply.yml
    with:
      checkout_ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
    secrets:
      release_aws_role_arn: ${{ secrets.RELEASE_AWS_ROLE_ARN }}
      release_signing_secret_id: ${{ secrets.RELEASE_SIGNING_SECRET_ID }}
