name: Reusable Auth0 Tenant Ops

on:
  workflow_call:
    inputs:
      environment:
        description: Target Auth0 tenant overlay environment (dev|qa|pr).
        required: true
        type: string
      mode:
        description: Auth0 operation mode (validate|bootstrap|audit|import|export).
        required: false
        default: validate
        type: string
      input_file:
        description: Tenant YAML input file path.
        required: false
        default: infra/auth0/tenant/tenant.yaml
        type: string
      mapping_file:
        description: Optional mapping file override. Defaults to infra/auth0/mappings/{environment}.json.
        required: false
        default: ""
        type: string
      allow_delete:
        description: Safety control for delete operations. Must remain false.
        required: false
        default: false
        type: boolean
      artifact_name:
        description: Artifact name prefix for report/export outputs.
        required: false
        default: auth0-tenant-ops-report
        type: string
    outputs:
      operation_status:
        description: Overall operation status (passed|failed).
        value: ${{ jobs.auth0-tenant-ops.outputs.operation_status }}
      report_path:
        description: JSON report artifact path.
        value: ${{ jobs.auth0-tenant-ops.outputs.report_path }}
      artifact_name:
        description: Artifact name used for uploaded report/export assets.
        value: ${{ jobs.auth0-tenant-ops.outputs.artifact_name }}

permissions:
  contents: read

jobs:
  auth0-tenant-ops:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: auth0-${{ inputs.environment }}
    outputs:
      operation_status: ${{ steps.set-outputs.outputs.operation_status }}
      report_path: ${{ steps.set-outputs.outputs.report_path }}
      artifact_name: ${{ steps.set-outputs.outputs.artifact_name }}
    env:
      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
      AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
      AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python and uv
        uses: ./.github/actions/setup-python-uv

      - name: Validate mode/environment/safety input contract
        run: |
          set -euo pipefail

          case "${{ inputs.environment }}" in
            dev|qa|pr) ;;
            *)
              echo "Unsupported environment: ${{ inputs.environment }}" >&2
              exit 1
              ;;
          esac

          case "${{ inputs.mode }}" in
            validate|bootstrap|audit|import|export) ;;
            *)
              echo "Unsupported mode: ${{ inputs.mode }}" >&2
              exit 1
              ;;
          esac

          if [[ "${{ inputs.allow_delete }}" == "true" ]]; then
            echo "allow_delete=true is forbidden by policy; AUTH0_ALLOW_DELETE must remain false." >&2
            exit 1
          fi

      - name: Resolve Auth0 mapping file
        id: mapping
        run: |
          set -euo pipefail

          mapping_path="${{ inputs.mapping_file }}"
          if [ -z "$mapping_path" ]; then
            mapping_path="infra/auth0/mappings/${{ inputs.environment }}.json"
          fi

          test -f "$mapping_path"
          test -f "${{ inputs.input_file }}"
          echo "mapping_path=$mapping_path" >> "$GITHUB_OUTPUT"

      - name: Validate Auth0 contract
        id: validate-contract
        run: |
          set -euo pipefail
          uv run python -m scripts.release.validate_auth0_contract

      - name: Write Auth0 temp env
        id: write-env
        if: steps.validate-contract.outcome == 'success'
        run: |
          set -euo pipefail
          tmp_env=".artifacts/auth0-${{ inputs.environment }}.env"
          mkdir -p .artifacts
          cat > "$tmp_env" <<EOF
          AUTH0_DOMAIN=${AUTH0_DOMAIN}
          AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
          AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET}
          AUTH0_ALLOW_DELETE=false
          AUTH0_INCLUDED_ONLY=["tenant","resourceServers","clients","clientGrants"]
          AUTH0_INPUT_FILE=${{ inputs.input_file }}
          AUTH0_KEYWORD_MAPPINGS_FILE=${{ steps.mapping.outputs.mapping_path }}
          EOF
          echo "tmp_env=$tmp_env" >> "$GITHUB_OUTPUT"

      - name: Run Auth0 bootstrap
        id: run-bootstrap
        if: inputs.mode == 'bootstrap' && steps.write-env.outcome == 'success'
        run: |
          set -euo pipefail
          uv run python -m scripts.release.bootstrap_auth0_tenant \
            --env-file "${{ steps.write-env.outputs.tmp_env }}" \
            --report-path ".artifacts/auth0-bootstrap-${{ inputs.environment }}.json"

      - name: Run Auth0 audit
        id: run-audit
        if: inputs.mode == 'audit' && steps.write-env.outcome == 'success'
        run: |
          set -euo pipefail
          uv run python -m scripts.release.audit_auth0_tenant \
            --env-file "${{ steps.write-env.outputs.tmp_env }}" \
            --report-path ".artifacts/auth0-audit-${{ inputs.environment }}.json"

      - name: Run Auth0 import
        id: run-import
        if: inputs.mode == 'import' && steps.write-env.outcome == 'success'
        run: |
          set -euo pipefail
          uv run python -m scripts.release.run_auth0_deploy_cli import \
            --env-file "${{ steps.write-env.outputs.tmp_env }}" \
            --input-file "${{ inputs.input_file }}"

      - name: Run Auth0 export
        id: run-export
        if: inputs.mode == 'export' && steps.write-env.outcome == 'success'
        run: |
          set -euo pipefail
          output_dir=".artifacts/auth0-export/${{ inputs.environment }}"
          mkdir -p "$output_dir"
          uv run python -m scripts.release.run_auth0_deploy_cli export \
            --env-file "${{ steps.write-env.outputs.tmp_env }}" \
            --output-folder "$output_dir"

      - name: Write Auth0 tenant ops report
        if: always()
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          python - <<'PY'
          import json
          from pathlib import Path

          report = {
              "schema_version": "1.0",
              "environment": "${{ inputs.environment }}",
              "mode": "${{ inputs.mode }}",
              "allow_delete": json.loads('${{ toJson(inputs.allow_delete) }}'),
              "input_file": "${{ inputs.input_file }}",
              "mapping_file": "${{ steps.mapping.outputs.mapping_path }}",
              "validation_outcome": "${{ steps.validate-contract.outcome }}",
              "bootstrap_outcome": "${{ steps.run-bootstrap.outcome }}",
              "audit_outcome": "${{ steps.run-audit.outcome }}",
              "import_outcome": "${{ steps.run-import.outcome }}",
              "export_outcome": "${{ steps.run-export.outcome }}",
          }
          Path(".artifacts/auth0-tenant-ops-report.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - id: set-outputs
        if: always()
        run: |
          set -euo pipefail

          mode="${{ inputs.mode }}"
          validate_outcome="${{ steps.validate-contract.outcome }}"
          bootstrap_outcome="${{ steps.run-bootstrap.outcome }}"
          audit_outcome="${{ steps.run-audit.outcome }}"
          import_outcome="${{ steps.run-import.outcome }}"
          export_outcome="${{ steps.run-export.outcome }}"

          status="failed"
          if [[ "$validate_outcome" == "success" ]]; then
            case "$mode" in
              validate)
                status="passed"
                ;;
              bootstrap)
                if [[ "$bootstrap_outcome" == "success" ]]; then
                  status="passed"
                fi
                ;;
              audit)
                if [[ "$audit_outcome" == "success" ]]; then
                  status="passed"
                fi
                ;;
              import)
                if [[ "$import_outcome" == "success" ]]; then
                  status="passed"
                fi
                ;;
              export)
                if [[ "$export_outcome" == "success" ]]; then
                  status="passed"
                fi
                ;;
            esac
          fi

          artifact_name="${{ inputs.artifact_name }}-${{ inputs.environment }}-${{ inputs.mode }}"

          echo "operation_status=$status" >> "$GITHUB_OUTPUT"
          echo "report_path=.artifacts/auth0-tenant-ops-report.json" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

      - if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # actions/upload-artifact@v7
        with:
          name: ${{ steps.set-outputs.outputs.artifact_name }}
          if-no-files-found: ignore
          path: |
            .artifacts/auth0-tenant-ops-report.json
            .artifacts/auth0-bootstrap-*.json
            .artifacts/auth0-audit-*.json
            .artifacts/auth0-export

      - name: Fail when operation status is failed
        if: steps.set-outputs.outputs.operation_status != 'passed'
        run: |
          echo "Auth0 tenant ops workflow failed." >&2
          exit 1
