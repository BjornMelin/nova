name: Deploy Dev

on:
  workflow_dispatch:
    inputs:
      pipeline_name:
        description: AWS CodePipeline name
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/reusable-deploy-dev.yml
    with:
      pipeline_name: ${{ inputs.pipeline_name }}
      aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
    secrets:
      release_aws_role_arn: ${{ secrets.RELEASE_AWS_ROLE_ARN }}
