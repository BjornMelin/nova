name: CloudFormation Change Set Lifecycle
description: Create and execute a CloudFormation change set with fail-fast validation.
inputs:
  stack-name:
    description: CloudFormation stack name.
    required: true
  template-file:
    description: Path to template file in repository workspace.
    required: true
  parameters-file:
    description: Optional JSON parameter file path for --parameters.
    required: false
    default: ""
  capabilities:
    description: CloudFormation capabilities.
    required: false
    default: CAPABILITY_NAMED_IAM
  aws-region:
    description: AWS region.
    required: false
    default: us-east-1
  execution-role-arn:
    description: Optional CloudFormation service role ARN.
    required: false
    default: ""
  no-fail-on-empty-changeset:
    description: Continue successfully when there are no changes.
    required: false
    default: "true"
outputs:
  change-set-name:
    description: Change set name used for this operation.
    value: ${{ steps.lifecycle.outputs.change_set_name }}
  stack-name:
    description: Stack name.
    value: ${{ inputs.stack-name }}
  executed:
    description: Whether a change set was executed.
    value: ${{ steps.lifecycle.outputs.executed }}
runs:
  using: composite
  steps:
    - id: lifecycle
      shell: bash
      env:
        STACK_NAME: ${{ inputs.stack-name }}
        TEMPLATE_FILE: ${{ inputs.template-file }}
        PARAMETERS_FILE: ${{ inputs.parameters-file }}
        CAPABILITIES: ${{ inputs.capabilities }}
        AWS_REGION: ${{ inputs.aws-region }}
        EXECUTION_ROLE_ARN: ${{ inputs.execution-role-arn }}
        NO_FAIL_ON_EMPTY: ${{ inputs.no-fail-on-empty-changeset }}
      run: |
        set -euo pipefail

        [[ "$STACK_NAME" =~ ^[A-Za-z][-A-Za-z0-9]*$ ]] || { echo "Invalid stack-name: $STACK_NAME" >&2; exit 1; }
        [[ -f "$TEMPLATE_FILE" ]] || { echo "Template file not found: $TEMPLATE_FILE" >&2; exit 1; }

        if aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
          CHANGE_SET_TYPE="UPDATE"
        else
          CHANGE_SET_TYPE="CREATE"
        fi

        CHANGE_SET_NAME="cs-${GITHUB_RUN_ID:-manual}-$(date +%Y%m%d%H%M%S)"
        CREATE_ARGS=(
          --stack-name "$STACK_NAME"
          --change-set-name "$CHANGE_SET_NAME"
          --change-set-type "$CHANGE_SET_TYPE"
          --template-body "file://${TEMPLATE_FILE}"
          --capabilities "$CAPABILITIES"
          --region "$AWS_REGION"
        )

        if [[ -n "$PARAMETERS_FILE" ]]; then
          [[ -f "$PARAMETERS_FILE" ]] || { echo "Parameters file not found: $PARAMETERS_FILE" >&2; exit 1; }
          CREATE_ARGS+=(--parameters "file://${PARAMETERS_FILE}")
        fi
        if [[ -n "$EXECUTION_ROLE_ARN" ]]; then
          CREATE_ARGS+=(--role-arn "$EXECUTION_ROLE_ARN")
        fi

        aws cloudformation create-change-set "${CREATE_ARGS[@]}" >/dev/null

        set +e
        aws cloudformation wait change-set-create-complete \
          --stack-name "$STACK_NAME" \
          --change-set-name "$CHANGE_SET_NAME" \
          --region "$AWS_REGION"
        WAIT_STATUS=$?
        set -e

        if [[ $WAIT_STATUS -ne 0 ]]; then
          STATUS_REASON="$(aws cloudformation describe-change-set \
            --stack-name "$STACK_NAME" \
            --change-set-name "$CHANGE_SET_NAME" \
            --region "$AWS_REGION" \
            --query StatusReason \
            --output text 2>/dev/null || true)"

          if [[ "$NO_FAIL_ON_EMPTY" == "true" ]] && grep -qi "didn't contain changes" <<<"$STATUS_REASON"; then
            {
              echo "change_set_name=$CHANGE_SET_NAME"
              echo "executed=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Change set creation failed: $STATUS_REASON" >&2
          exit 1
        fi

        aws cloudformation execute-change-set \
          --stack-name "$STACK_NAME" \
          --change-set-name "$CHANGE_SET_NAME" \
          --region "$AWS_REGION"

        if [[ "$CHANGE_SET_TYPE" == "CREATE" ]]; then
          aws cloudformation wait stack-create-complete --stack-name "$STACK_NAME" --region "$AWS_REGION"
        else
          aws cloudformation wait stack-update-complete --stack-name "$STACK_NAME" --region "$AWS_REGION"
        fi

        {
          echo "change_set_name=$CHANGE_SET_NAME"
          echo "executed=true"
        } >> "$GITHUB_OUTPUT"
