name: Collect Deploy Evidence
description: Collect stack/pipeline state evidence into a JSON artifact.
inputs:
  stack-name:
    description: CloudFormation stack name.
    required: true
  aws-region:
    description: AWS region.
    required: false
    default: us-east-1
  pipeline-name:
    description: Optional CodePipeline name for extra evidence.
    required: false
    default: ""
  output-file:
    description: Evidence output JSON path.
    required: false
    default: .artifacts/deploy-evidence.json
outputs:
  output-file:
    description: Evidence file path.
    value: ${{ inputs.output-file }}
runs:
  using: composite
  steps:
    - shell: bash
      env:
        STACK_NAME: ${{ inputs.stack-name }}
        AWS_REGION: ${{ inputs.aws-region }}
        PIPELINE_NAME: ${{ inputs.pipeline-name }}
        OUTPUT_FILE: ${{ inputs.output-file }}
      run: |
        set -euo pipefail
        mkdir -p "$(dirname "$OUTPUT_FILE")"

        aws cloudformation describe-stacks \
          --stack-name "$STACK_NAME" \
          --region "$AWS_REGION" \
          --query 'Stacks[0]' \
          --output json > /tmp/nova-stack-evidence.json

        if [[ -n "$PIPELINE_NAME" ]]; then
          aws codepipeline get-pipeline-state \
            --name "$PIPELINE_NAME" \
            --region "$AWS_REGION" \
            --output json > /tmp/nova-pipeline-state.json
        else
          echo '{}' > /tmp/nova-pipeline-state.json
        fi

        jq -n \
          --arg collected_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          --arg stack_name "$STACK_NAME" \
          --arg aws_region "$AWS_REGION" \
          --arg pipeline_name "$PIPELINE_NAME" \
          --slurpfile stack /tmp/nova-stack-evidence.json \
          --slurpfile pipeline /tmp/nova-pipeline-state.json \
          '{
            collected_at: $collected_at,
            stack_name: $stack_name,
            aws_region: $aws_region,
            pipeline_name: $pipeline_name,
            stack: ($stack[0] // {}),
            pipeline_state: ($pipeline[0] // {})
          }' > "$OUTPUT_FILE"
