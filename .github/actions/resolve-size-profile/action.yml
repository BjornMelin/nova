name: Resolve Runtime Size Profile
description: Resolve deploy sizing for app_type + size_profile with optional custom overrides.
inputs:
  app-type:
    description: Application type lane (dash, rshiny, react-next).
    required: true
  size-profile:
    description: Size profile (small, medium, large, custom).
    required: false
    default: medium
  profiles-file:
    description: JSON profile definition file.
    required: false
    default: docs/contracts/deploy-size-profiles-v1.json
  custom-container-port:
    description: Required when size-profile is custom.
    required: false
  custom-task-cpu:
    description: Required when size-profile is custom.
    required: false
  custom-task-memory:
    description: Required when size-profile is custom.
    required: false
  custom-desired-count:
    description: Required when size-profile is custom.
    required: false
outputs:
  container-port:
    description: Resolved container port.
    value: ${{ steps.resolve.outputs.container_port }}
  task-cpu:
    description: Resolved task cpu.
    value: ${{ steps.resolve.outputs.task_cpu }}
  task-memory:
    description: Resolved task memory.
    value: ${{ steps.resolve.outputs.task_memory }}
  desired-count:
    description: Resolved desired task count.
    value: ${{ steps.resolve.outputs.desired_count }}
runs:
  using: composite
  steps:
    - id: resolve
      shell: bash
      env:
        APP_TYPE: ${{ inputs.app-type }}
        SIZE_PROFILE: ${{ inputs.size-profile }}
        PROFILES_FILE: ${{ inputs.profiles-file }}
        CUSTOM_CONTAINER_PORT: ${{ inputs.custom-container-port }}
        CUSTOM_TASK_CPU: ${{ inputs.custom-task-cpu }}
        CUSTOM_TASK_MEMORY: ${{ inputs.custom-task-memory }}
        CUSTOM_DESIRED_COUNT: ${{ inputs.custom-desired-count }}
      run: |
        set -euo pipefail
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        app_type = os.environ["APP_TYPE"].strip()
        size_profile = os.environ["SIZE_PROFILE"].strip()
        profiles_file = Path(os.environ["PROFILES_FILE"])

        if app_type not in {"dash", "rshiny", "react-next"}:
            raise SystemExit(f"Unsupported app-type: {app_type}")
        if size_profile not in {"small", "medium", "large", "custom"}:
            raise SystemExit(f"Unsupported size-profile: {size_profile}")
        if not profiles_file.is_file():
            raise SystemExit(f"Profiles file not found: {profiles_file}")

        data = json.loads(profiles_file.read_text(encoding="utf-8"))
        lane = data["profiles"][app_type]

        def _int_env(name: str) -> int:
            raw = os.environ.get(name, "").strip()
            if not raw:
                raise SystemExit(f"Missing required custom input: {name}")
            try:
                return int(raw)
            except ValueError as exc:
                raise SystemExit(f"Invalid integer for {name}: {raw}") from exc

        if size_profile == "custom":
            container_port = _int_env("CUSTOM_CONTAINER_PORT")
            task_cpu = _int_env("CUSTOM_TASK_CPU")
            task_memory = _int_env("CUSTOM_TASK_MEMORY")
            desired_count = _int_env("CUSTOM_DESIRED_COUNT")
        else:
            profile = lane[size_profile]
            container_port = int(lane["container_port"])
            task_cpu = int(profile["task_cpu"])
            task_memory = int(profile["task_memory"])
            desired_count = int(profile["desired_count"])

        if not (1 <= container_port <= 65535):
            raise SystemExit("container_port must be between 1 and 65535")
        if not (256 <= task_cpu <= 16384):
            raise SystemExit("task_cpu must be between 256 and 16384")
        if not (512 <= task_memory <= 65536):
            raise SystemExit("task_memory must be between 512 and 65536")
        if not (0 <= desired_count <= 100):
            raise SystemExit("desired_count must be between 0 and 100")

        out_path = Path(os.environ["GITHUB_OUTPUT"])
        with out_path.open("a", encoding="utf-8") as out:
            out.write(f"container_port={container_port}\n")
            out.write(f"task_cpu={task_cpu}\n")
            out.write(f"task_memory={task_memory}\n")
            out.write(f"desired_count={desired_count}\n")
        PY
