name: Configure AWS OIDC Credentials
description: Configure AWS credentials using OIDC role assumption.
inputs:
  role-to-assume:
    description: IAM role ARN to assume via OIDC.
    required: true
  aws-region:
    description: AWS region for the session.
    required: false
    default: us-east-1
runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}
