name: Setup Python and uv
description: Configure Python and uv, then sync locked dependencies.
inputs:
  python-version:
    description: Python version to install.
    required: false
    default: "3.13"
  sync-locked:
    description: Whether to pass --locked to uv sync (true/false).
    required: false
    default: "true"
  sync-offline:
    description: Whether to pass --offline to uv sync (true/false).
    required: false
    default: "false"
  restore-cache:
    description: Whether to restore the uv cache if found.
    required: false
    default: "true"
  save-cache:
    description: Whether to save the uv cache after the run.
    required: false
    default: "true"
  cache-suffix:
    description: Optional suffix for the setup-uv cache key.
    required: false
    default: ""
  cache-dependency-glob:
    description: Optional multiline glob used to scope the setup-uv cache key.
    required: false
    default: |
      pyproject.toml
      uv.lock
      packages/**/pyproject.toml
runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
    - name: Setup uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # astral-sh/setup-uv@v7
      with:
        version-file: pyproject.toml
        enable-cache: true
        prune-cache: true
        restore-cache: ${{ inputs.restore-cache }}
        save-cache: ${{ inputs.save-cache }}
        cache-suffix: ${{ inputs.cache-suffix }}
        cache-dependency-glob: ${{ inputs.cache-dependency-glob }}
    - name: Sync dependencies
      shell: bash
      env:
        PYTHON_VERSION: ${{ inputs.python-version }}
        SYNC_LOCKED: ${{ inputs.sync-locked }}
        SYNC_OFFLINE: ${{ inputs.sync-offline }}
      run: |
        set -euo pipefail

        if [[ -z "$PYTHON_VERSION" ]]; then
          echo "python-version input must not be empty" >&2
          exit 1
        fi

        case "$SYNC_LOCKED" in
          true|false) ;;
          *)
            echo "Invalid sync-locked value: $SYNC_LOCKED (expected true or false)" >&2
            exit 1
            ;;
        esac

        case "$SYNC_OFFLINE" in
          true|false) ;;
          *)
            echo "Invalid sync-offline value: $SYNC_OFFLINE (expected true or false)" >&2
            exit 1
            ;;
        esac

        SYNC_ARGS=()
        if [[ "$SYNC_LOCKED" == "true" ]]; then
          SYNC_ARGS+=(--locked)
        fi
        if [[ "$SYNC_OFFLINE" == "true" ]]; then
          SYNC_ARGS+=(--offline)
        fi

        SYNC_ARGS+=(--python "$PYTHON_VERSION")
        SYNC_ARGS+=(--all-packages --all-extras --dev)
        uv sync "${SYNC_ARGS[@]}"
