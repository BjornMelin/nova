[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "nova-auth-api"
version = "0.2.0"
description = "Dedicated token verification service for nova."
readme = "README.md"
requires-python = ">=3.12,<3.14"
dependencies = [
  "anyio>=4.11.0",
  "fastapi>=0.129.0",
  "oidc-jwt-verifier>=0.1.5",
  "pydantic>=2.12.5",
  "pydantic-settings>=2.12.0",
  "structlog>=25.5.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/nova_auth_api"]
