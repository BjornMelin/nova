[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "nova-dash-bridge"
version = "0.3.1"
description = "Browser and Dash helpers for Nova transfer APIs."
readme = "README.md"
requires-python = ">=3.11,<3.14"

[project.optional-dependencies]
dash = ["dash>=3.2.0,<5.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/nova_dash_bridge"]
