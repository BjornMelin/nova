[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "nova-workflows"
version = "0.1.0"
description = "Step Functions task handlers for Nova export workflows."
readme = "README.md"
requires-python = ">=3.11,<3.14"
dependencies = [
  "nova-runtime-support>=0.1.0",
  "structlog>=25.5.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/nova_workflows"]
