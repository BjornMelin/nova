[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "nova-runtime-support"
version = "0.1.0"
description = "Internal shared runtime helpers for Nova services."
readme = "README.md"
requires-python = ">=3.11,<3.14"
dependencies = [
  "fastapi>=0.135.3",
  "oidc-jwt-verifier>=0.1.6",
  "pydantic>=2.12.5",
  "structlog>=25.5.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/nova_runtime_support"]
