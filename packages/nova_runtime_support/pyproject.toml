[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "nova-runtime-support"
version = "0.1.0"
description = "Internal shared runtime helpers for Nova services."
readme = "README.md"
requires-python = ">=3.12,<3.14"
dependencies = [
  "fastapi>=0.129.0",
  "oidc-jwt-verifier>=0.1.5",
  "structlog>=25.5.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/nova_runtime_support"]
