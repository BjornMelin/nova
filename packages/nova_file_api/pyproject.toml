[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "nova-file-api"
version = "0.5.0"
description = "FastAPI control-plane for file transfer and async jobs."
readme = "README.md"
requires-python = ">=3.12,<3.14"
dependencies = [
  "anyio>=4.11.0",
  "aioboto3==15.5.0",
  "fastapi>=0.129.0",
  "httpx>=0.28.1",
  "oidc-jwt-verifier>=0.1.5",
  "pydantic>=2.12.5",
  "pydantic-settings>=2.12.0",
  "redis>=7.1.1",
  "structlog>=25.5.0",
]

[project.scripts]
nova-file-worker = "nova_file_api.worker:cli"

[tool.fastapi]
entrypoint = "nova_file_api.main:app"

[tool.hatch.build.targets.wheel]
packages = ["src/nova_file_api"]
