[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "nova-file-api"
version = "0.5.0"
description = "FastAPI control plane for Nova transfer and export APIs."
readme = "README.md"
requires-python = ">=3.11,<3.14"
dependencies = [
  "anyio>=4.11.0",
  "aioboto3>=15.5.0,<16",
  "fastapi>=0.135.2",
  "httpx>=0.28.1",
  "mangum>=0.21.0",
  "nova-runtime-support>=0.1.0",
  "oidc-jwt-verifier>=0.1.5",
  "pydantic>=2.12.5",
  "pydantic-settings>=2.13.1",
  "structlog>=25.5.0",
]

[tool.fastapi]
entrypoint = "nova_file_api.main:app"

[tool.hatch.build.targets.wheel]
packages = ["src/nova_file_api"]
